<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root { --bg: #fdfbf7; --accent: #fb923c; }
        body { background: var(--bg); color: #444; }
        .glass-header { background: rgba(253, 251, 247, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* 浮遊するBlob背景 */
        .blob { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        /* おしゃれな検索バーの質感 */
        .search-outer { border: 2px solid #f3f1ed; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .search-outer:focus-within { border-color: var(--accent); box-shadow: 0 10px 40px -10px rgba(251, 146, 60, 0.2); transform: translateY(-2px); }

        /* 教材カード */
        .material-card { background: white; border-radius: 2.5rem; border: 2px solid #f8f6f2; transition: all 0.5s ease; }
        .material-card:hover { transform: translateY(-8px); border-color: #fb923c33; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.04); }

        /* タブ */
        .tab-btn { transition: all 0.3s; position: relative; font-weight: 900; color: #a1a1aa; }
        .tab-btn.active { color: #fb923c; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <div class="blob" style="width:500px; height:500px; background:rgba(251,146,60,0.06); top:-100px; left:-100px;"></div>
    <div class="blob" style="width:400px; height:400px; background:rgba(99,102,241,0.05); bottom:-50px; right:-50px; animation-delay:-5s;"></div>

    <header class="sticky top-0 z-[100] glass-header border-b-2 border-orange-50/50">
        <div class="container mx-auto px-6 h-20 md:h-28 flex items-center justify-between max-w-7xl">
            <button onclick="location.reload()" class="active:scale-95 transition-all">
                <img src="logo.svg" alt="タマベン" class="h-12 md:h-20 w-auto">
            </button>
            <button onclick="openSettingsModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border-2 border-orange-50 hover:bg-orange-400 group transition-all">
                <i data-lucide="user" class="w-5 h-5 text-orange-400 group-hover:text-white"></i>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-6 max-w-6xl pb-32">
        <section class="py-16 md:py-24 text-center reveal">
            <h1 class="text-4xl md:text-6xl font-black mb-8 leading-[1.2]">
                学びを、もっと<br/>
                <span class="inline-block px-5 py-1 bg-orange-100 text-orange-500 rounded-3xl rotate-[-2deg]">自由に。</span>
            </h1>
            
            <!-- 検索エリア -->
            <div class="mt-12 max-w-2xl mx-auto">
                <div class="search-outer flex items-center bg-white rounded-[2.5rem] px-8 py-5">
                    <i data-lucide="search" class="w-6 h-6 text-orange-200 mr-4"></i>
                    <input type="text" id="search-input" placeholder="例：計算、歴史、小1、ぶんしょうだい..." class="w-full bg-transparent outline-none font-bold text-slate-600 placeholder:text-slate-200">
                </div>
                <div class="flex flex-wrap justify-center gap-2 mt-6">
                    <button onclick="quickSearch('計算')" class="px-4 py-2 rounded-full bg-white border border-orange-50 text-[10px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#計算</button>
                    <button onclick="quickSearch('漢字')" class="px-4 py-2 rounded-full bg-white border border-orange-50 text-[10px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#漢字</button>
                    <button onclick="quickSearch('生き物')" class="px-4 py-2 rounded-full bg-white border border-orange-50 text-[10px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#生き物</button>
                    <button onclick="quickSearch('テスト')" class="px-4 py-2 rounded-full bg-white border border-orange-50 text-[10px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#テスト対策</button>
                </div>
            </div>
        </section>

        <!-- タブナビ -->
        <div class="sticky top-24 md:top-32 z-40 mb-12 flex justify-center reveal">
            <div class="inline-flex bg-orange-50/40 p-1.5 rounded-[2rem] border-2 border-white backdrop-blur-md shadow-sm">
                <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-btn active px-10 py-3 rounded-[1.6rem] text-sm font-black">小学生</button>
                <button onclick="switchTab('junior')" id="tab-junior" class="tab-btn px-10 py-3 rounded-[1.6rem] text-sm font-black">中学生</button>
            </div>
        </div>

        <!-- 教材一覧 -->
        <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <footer class="bg-white/50 border-t-2 border-orange-50 py-20 text-center">
        <img src="logo.svg" alt="タマベン" class="h-10 mx-auto mb-8 opacity-20 grayscale">
        <p class="text-[10px] text-slate-300 font-black tracking-[0.2em] uppercase">&copy; 2026 Tamaben. All Rights Reserved.</p>
    </footer>

    <!-- スクリプトの読み込み -->
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                if (reveals[i].getBoundingClientRect().top < window.innerHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;
        
        function quickSearch(val) {
            const input = document.getElementById('search-input');
            input.value = val;
            renderMaterials();
            document.getElementById('learning-materials-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
