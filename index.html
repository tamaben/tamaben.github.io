<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 手書き感のあるKiwi Maruを追加 -->
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --sketch-border: 255px 15px 225px 15px / 15px 225px 15px 255px;
        }

        body {
            font-family: 'Kiwi Maru', 'Zen Maru Gothic', sans-serif;
            background-color: #fdfcf8; /* 紙のような色 */
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* ドット方眼 */
        }

        /* 手書き風の歪んだ枠線 */
        .sketch-card {
            border: 2px solid #474742;
            border-radius: var(--sketch-border);
            transition: transform 0.3s ease;
        }
        .sketch-card:hover {
            transform: rotate(-1deg) scale(1.02);
        }

        /* ぷるぷるアニメーション */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-0.5deg); }
            50% { transform: rotate(0.5deg); }
        }
        .animate-wiggle {
            animation: wiggle 2s infinite ease-in-out;
        }

        .glass-header { 
            background: rgba(253, 252, 248, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid #474742;
        }

        /* スクロールバー */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 10px; 
            border: 2px solid #f1f1f1;
        }

        .marker-yellow {
            background: linear-gradient(transparent 60%, #fef9c3 60%);
        }

        /* ロゴのテキスト色調整（白から暗いグレーへ） */
        .main-logo-svg path[stroke="#ffffff"] {
            stroke: #474742 !important;
        }
    </style>
</head>
<body class="min-h-screen text-slate-700 relative overflow-x-hidden selection:bg-yellow-200">

    <!-- 背景レイヤー -->
    <div id="sky-background" class="fixed inset-0 -z-20 transition-colors duration-[3000ms]">
        <div id="stars" class="absolute inset-0 opacity-0 transition-opacity duration-1000"></div>
    </div>

    <!-- ヘッダー -->
    <header class="sticky top-0 z-50 glass-header shadow-sm">
        <div class="container mx-auto px-4 lg:px-8 h-16 md:h-24 flex items-center justify-between max-w-6xl">
            <button onclick="goHome()" class="flex items-center gap-3 group active:scale-95 transition-transform">
                <!-- ロゴ挿入エリア -->

                                <path d="M243.09,187.37l-7.14,-6.8"></path>
                                <path d="M219.4,172.63c0,0 -1.33,2.93 -2.41,4.4c-1.03,1.4 -2.34,2.29 -2.34,2.29"></path>
                                <path d="M218.5,175.47c0,0 7.39,-0.42 8.05,0c0.69,0.69 -1.04,4.66 -3.72,7.39c-3.1,3.16 -5.57,4.06 -5.57,4.06"></path>
                                <path d="M219.86,179.89l2.95,2.38"></path>
                                <path d="M252.13,183.1c0,0 5.3,-6.6 6.01,-6.58c0.69,-0.49 9.87,9.3 9.87,9.3"></path>

                                <path d="M267.9,173.77l1.7,3.1"></path>
                                <path d="M280.34,177.53l-4.4,-4"></path>

                            </g>
                        </g>
                    </svg>
                </div>
            </button>

            <div class="flex items-center gap-3">
                <button onclick="openSettingsModal()" class="sketch-card bg-white px-4 py-2 flex items-center gap-2 hover:bg-yellow-50 transition-colors">
                    <i data-lucide="user-cog" class="w-5 h-5"></i>
                    <span class="text-sm font-bold hidden md:inline">せってい</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 pb-32 max-w-5xl">
        
        <!-- === ホーム画面 === -->
        <div id="view-home">
            
            <!-- ヒーローセクション -->
            <section class="sketch-card bg-white p-8 md:p-14 mb-12 flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden">
                <div class="relative z-10 max-w-2xl text-left">
                    <span class="marker-yellow text-sm font-bold mb-4 inline-block">
                        <i data-lucide="sparkles" class="w-4 h-4 inline mr-1"></i> <span id="season-name"></span>の学び
                    </span>
                    <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight text-slate-800">
                        寄り添う、<br/>
                        <span class="text-orange-400">やさしい学び。</span>
                    </h1>
                    <p class="text-slate-500 font-medium text-lg leading-relaxed">
                        ひとりひとりのペースを大切に。<br>
                        今日も、新しい発見を見つけにいこう。
                    </p>
                </div>
                <!-- 季節のアイコン -->
                <div class="w-32 h-32 md:w-48 md:h-48 bg-yellow-50 rounded-full border-4 border-dashed border-yellow-200 flex items-center justify-center animate-wiggle">
                    <i id="main-season-icon" class="text-yellow-400 w-20 h-20"></i>
                </div>
            </section>

            <!-- 学年切り替え -->
            <div class="flex justify-center mb-12">
                <div class="inline-flex bg-slate-100 p-2 rounded-full border-2 border-slate-200">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="px-8 py-3 rounded-full text-sm font-bold transition-all">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="px-8 py-3 rounded-full text-sm font-bold transition-all">中学生</button>
                </div>
            </div>

            <!-- 教材リスト -->
            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- JSでカードが挿入される -->
                <p class="col-span-full text-center py-20 text-slate-400 font-bold">読み込み中...</p>
            </div>
        </div>

        <!-- === 詳細ページ === -->
        <div id="view-detail" class="hidden animate-in slide-in-from-bottom-10 duration-500">
            <button onclick="goHome()" class="sketch-card bg-white px-6 py-2 mb-6 flex items-center gap-2 hover:bg-slate-50 transition-all">
                <i data-lucide="chevron-left" class="w-5 h-5"></i> 一覧にもどる
            </button>

            <div class="sketch-card bg-white overflow-hidden">
                <div id="detail-header" class="p-8 md:p-12 text-center border-b-2 border-slate-100 bg-yellow-50">
                    <div class="inline-block px-4 py-1 rounded-full border-2 border-slate-800 text-xs font-bold mb-4 bg-white">
                        <span id="detail-grade"></span> / <span id="detail-subject"></span>
                    </div>
                    <h1 id="detail-title" class="text-3xl md:text-5xl font-black text-slate-800"></h1>
                </div>

                <div class="p-8 md:p-12 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 基本問題 -->
                    <div onclick="openPdf('basic')" class="sketch-card p-8 bg-white hover:bg-emerald-50 cursor-pointer group border-emerald-400">
                        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mb-4 text-emerald-600">
                            <i data-lucide="book-open" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">基本問題</h3>
                        <p class="text-sm text-slate-500">まずはここから！基本をしっかり確認しよう。</p>
                    </div>
                    <!-- 応用問題 -->
                    <div onclick="openPdf('advanced')" class="sketch-card p-8 bg-white hover:bg-orange-50 cursor-pointer group border-orange-400">
                        <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mb-4 text-orange-600">
                            <i data-lucide="zap" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">応用問題</h3>
                        <p class="text-sm text-slate-500">レベルアップ！難しい問題に挑戦してみよう。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer class="bg-white border-t-4 border-slate-800 py-12 mt-20">
        <div class="container mx-auto px-4 text-center">
            <div class="w-32 md:w-40 mx-auto opacity-50 grayscale mb-6">
                <!-- ロゴ（フッター用） -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110.2 28.05" class="main-logo-svg w-full h-auto">

                        <path d="M190.659,184.74c0,-5.43 1.84,-9.84 6.65,-9.84c4.8,0 6.65,4.4 6.65,9.84c0,5.43 -2.66,6.65 -6.65,6.65c-3.98,0 -6.65,-1.21 -6.65,-6.65z" fill="#f7f7cb"></path>

                        <g stroke="#474742" stroke-width="3.5" stroke-linecap="round" fill="none">

                            <path d="M243.09,187.37l-7.14,-6.8"></path>

                            <path d="M218.5,175.47c0,0 7.39,-0.42 8.05,0c0.69,0.69 -1.04,4.66 -3.72,7.39c-3.1,3.16 -5.57,4.06 -5.57,4.06"></path>
                            <path d="M252.13,183.1c0,0 5.3,-6.6 6.01,-6.58c0.69,-0.49 9.87,9.3 9.87,9.3"></path>
                            <path d="M280.34,177.53l-4.4,-4"></path>
                            <path d="M289.34,177.73c0,0 -3.3,4.5 -5.48,5.98c-2.43,1.64 -8.41,3.41 -8.41,3.41"></path>

                </svg>
            </div>
            <p class="text-xs text-slate-400 font-bold">&copy; 2026 Tamaben. しゅみでつくっています。</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
