<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-base: #fefaf6; /* ミルクティーベージュ */
            --text-main: #5d5752;
            --accent-peach: #f9dcc4;
            --accent-mint: #d8e2dc;
        }

        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; font-feature-settings: "palt"; }

        /* 背景：ゆっくり動くオーガニック・シェイプ */
        .blob { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1; animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1); pointer-events: none; opacity: 0.5; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(15%, 15%); } }

        .glass-nav { background: rgba(254, 250, 246, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(93, 87, 82, 0.05); }

        /* 教材カード */
        .premium-card { background: white; border-radius: 2.5rem; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); border: 1.5px solid #f8f3ef; box-shadow: 0 4px 20px rgba(93, 87, 82, 0.02); }
        .premium-card:hover { transform: translateY(-10px); box-shadow: 0 40px 80px rgba(93, 87, 82, 0.06); border-color: var(--accent-peach); }

        /* 検索バー */
        .search-field { background: white; border: 1.5px solid #ece4de; transition: all 0.4s ease; }
        .search-field:focus-within { border-color: #d8c8bd; box-shadow: 0 10px 30px rgba(93, 87, 82, 0.04); }

        /* タブ */
        .tab-pill { transition: all 0.4s ease; color: #bcaea3; }
        .tab-pill.active { background: white; color: #5d5752; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }

        /* アニメーション */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        #settings-modal { opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 200; }
        #settings-modal.active { opacity: 1; pointer-events: auto; }

        /* 教材がない場合の無効化スタイル */
        .btn-disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <div class="blob" style="width: 700px; height: 700px; background: var(--accent-peach); top: -200px; left: -100px;"></div>
    <div class="blob" style="width: 500px; height: 500px; background: var(--accent-mint); bottom: -100px; right: -100px; animation-delay: -5s;"></div>

    <header class="sticky top-0 z-[100] glass-nav">
        <div class="container mx-auto px-6 h-16 md:h-20 flex items-center justify-between max-w-6xl">
            <button onclick="goHome()" class="active:scale-95 transition-all">
                <img src="logo.svg" alt="タマベン" class="h-8 md:h-10 w-auto">
            </button>
            <div class="flex items-center gap-4">
                <div id="grade-badge" class="hidden md:flex flex-col items-end mr-1">
                    <span class="text-[9px] font-black text-[#bcaea3] uppercase tracking-widest leading-none mb-1">Status</span>
                    <span id="user-grade-label" class="text-[11px] font-black text-[#5d5752]">未設定</span>
                </div>
                <button onclick="openSettingsModal()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-[#ece4de] shadow-sm hover:bg-[#faf6f2] transition-all">
                    <i data-lucide="user" class="w-4 h-4 text-[#bcaea3]"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 max-w-6xl pb-32">
        
        <!-- ホーム画面 -->
        <div id="view-home">
            <section class="py-16 md:py-28 text-center reveal">
                <h1 class="text-3xl md:text-6xl font-black mb-8 tracking-tight text-[#4a4541] leading-tight">
                    学びを、もっと<br/>
                    <span class="inline-block px-5 py-1 bg-white text-[#d4a373] rounded-full shadow-sm border border-[#f5ebe0] my-2 rotate-[-1deg]">自由に。</span>
                </h1>
                
                <div class="mt-12 max-w-xl mx-auto">
                    <div class="search-field flex items-center rounded-[2rem] px-8 py-4">
                        <i data-lucide="search" class="w-6 h-6 text-[#d8c8bd] mr-4"></i>
                        <input type="text" id="search-input" placeholder="漢字、計算、歴史、1年生..." class="w-full bg-transparent outline-none font-bold text-[#5d5752] placeholder:text-[#dcd0c6] text-lg">
                    </div>
                </div>
            </section>

            <!-- 学年ナビ -->
            <div class="sticky top-20 md:top-24 z-40 mb-16 flex justify-center reveal">
                <div class="inline-flex bg-[#f5ebe0]/60 p-2 rounded-[2.2rem] border border-white backdrop-blur-md shadow-sm">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-pill active px-10 py-3 rounded-[1.8rem] text-sm font-black">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="tab-pill px-10 py-3 rounded-[1.8rem] text-sm font-black">中学生</button>
                </div>
            </div>

            <!-- 教材グリッド -->
            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mb-20"></div>
        </div>

        <!-- 詳細画面 -->
        <div id="view-detail" class="hidden py-12">
            <button onclick="goHome()" class="flex items-center gap-2 text-[#bcaea3] font-black hover:text-[#5d5752] mb-10 transition-colors group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> 一覧に戻る
            </button>
            <div id="detail-content" class="bg-white rounded-[4rem] overflow-hidden shadow-2xl border border-[#f5ebe0] min-h-[500px]"></div>
        </div>

    </main>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 flex items-center justify-center bg-stone-900/10 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[3.5rem] p-12 w-full max-w-sm shadow-2xl">
            <div class="text-center">
                <h3 class="text-xl font-black text-[#5d5752] mb-2">学年の設定</h3>
                <p class="text-xs text-[#bcaea3] font-bold mb-10 text-center leading-relaxed">生年月日を入力すると<br>おすすめ教材を表示します</p>
                <input type="date" id="birthdate-input" class="w-full px-6 py-4 rounded-2xl bg-[#faf6f2] border border-[#ece4de] outline-none font-black text-center mb-10 text-sm">
                <div class="space-y-4">
                    <button onclick="saveBirthDate()" class="w-full py-5 bg-[#5d5752] text-white rounded-2xl font-black text-sm active:scale-95 shadow-lg">保存する</button>
                    <button onclick="clearBirthDate()" class="w-full py-2 text-[#bcaea3] text-[10px] font-black hover:text-red-400">リセット</button>
                </div>
                <button onclick="closeSettingsModal()" class="mt-8 text-[10px] font-black text-[#dcd0c6]">閉じる</button>
            </div>
        </div>
    </div>

    <footer class="py-24 text-center opacity-30">
        <img src="logo.svg" alt="タマベン" class="h-8 mx-auto grayscale">
        <p class="text-[9px] text-stone-400 font-black tracking-widest uppercase mt-4">&copy; 2026 Tamaben.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                if (reveals[i].getBoundingClientRect().top < window.innerHeight - 100) reveals[i].classList.add("active");
            }
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;
    </script>
</body>
</html>
