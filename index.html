<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        /* テーマカラー変数 */
        :root {
            --bg-base: #f4f8f4;
            --text-main: #2e3d30;
            --text-dark: #1b261c;
            --text-muted: #84a589;
            --text-light: #b5ccb8;
            --accent-main: #4CAF50;
            --accent-dark: #388E3C;
            --bg-sub: #e6f0e7;
            --bg-card: #ffffff;
            --border-color: #d1e2d3;
            --blob-1: #aed581;
            --blob-2: #81c784;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            overflow-x: hidden;
            font-feature-settings: "palt";
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 背景Blob */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(8vw);
            z-index: -1;
            animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
            pointer-events: none;
            opacity: 0.5;
            width: clamp(300px, 60vw, 800px);
            height: clamp(300px, 60vw, 800px);
            will-change: transform;
        }
        @keyframes move {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(15%, 15%) rotate(90deg); }
        }

        .glass-nav {
            background: color-mix(in srgb, var(--bg-base) 85%, transparent);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding-top: env(safe-area-inset-top);
        }

        .fade-in-up { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-appear {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-appear.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* カードコンテナ */
        .premium-card {
            background: transparent;
            border: none;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: visible;
        }

        /* プレビューラッパー */
        .pdf-thumbnail-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1.414;
            background: transparent;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        /* PDFキャンバス（そのままの画像として表示） */
        .pdf-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #ffffff;
            border-radius: 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        
        .premium-card:hover .pdf-canvas { 
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        /* テキストエリアのアニメーション */
        .card-text-area {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .premium-card:hover .card-text-area {
            transform: translateY(-2px);
        }

        .pdf-loading { position: absolute; color: var(--accent-main); animation: pulse 2s infinite; z-index: -1; }

        .search-field { background: var(--bg-card); border: 1.5px solid var(--border-color); transition: all 0.4s ease; }
        .search-field:focus-within { border-color: var(--accent-main); box-shadow: 0 10px 30px rgba(0,0,0,0.05); transform: scale(1.01); }

        .tab-pill { transition: all 0.4s ease; color: var(--text-muted); }
        .tab-pill.active { background: var(--bg-card); color: var(--text-main); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }

        .loading-pulse { animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        #settings-modal { opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 200; }
        #settings-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { max-height: 90vh; overflow-y: auto; background: var(--bg-card); }

        .btn-disabled {
            opacity: 0.5;
            pointer-events: none;
            background: var(--bg-sub) !important;
            color: var(--text-muted) !important;
            border-color: var(--border-color) !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        .badge-disabled {
            background-color: transparent;
            color: #94a3b8;
            border: 1px dashed #cbd5e1;
        }

        .fluid-title { font-size: clamp(1.8rem, 6vw, 4.5rem); leading-trim: both; text-edge: cap; }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        <div id="view-detail" class="hidden py-8 md:py-12">

    <div id="settings-modal" class="fixed inset-0 flex items-center justify-center bg-[#1b261c]/40 backdrop-blur-md p-4 sm:p-6">

                    <button onclick="clearBirthDate()" class="w-full py-2 text-[var(--text-muted)] text-[10px] md:text-xs font-black outline-none hover:text-[var(--text-main)]">リセット</button>

    <script>
        let MATERIAL_DATA = [];
        let currentTab = 'elementary';

        async function loadMaterials() {
            try {
                const response = await fetch('data.json');
                if(!response.ok) throw new Error('Network response was not ok');
                MATERIAL_DATA = await response.json();
            } catch (e) {
                MATERIAL_DATA = [
                    { id: 1, tab: 'elementary', subject: '算数', grade: '小学1年生', title: 'たしざん・ひきざん', pdfBasic: 'sample.pdf', pdfAdv: '', pdfAns: '' },
                    { id: 2, tab: 'elementary', subject: '国語', grade: '小学2年生', title: 'かん字のれんしゅう (準備中)', pdfBasic: '#', pdfAdv: '#', pdfAns: '#' },
                    { id: 3, tab: 'elementary', subject: '理科', grade: '小学3年生', title: '植物のそだちかた', pdfBasic: 'sample.pdf', pdfAdv: '', pdfAns: '' },
                    { id: 4, tab: 'junior', subject: '英語', grade: '中学1年生', title: 'アルファベット (準備中)', pdfBasic: '', pdfAdv: '', pdfAns: '' }
                ];
            }
            renderMaterials();
        }

        async function renderPDFThumbnail(url, canvasId) {
            try {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
                const wrapper = canvas.parentElement;
                const loader = wrapper.querySelector('.pdf-loading');
                if(loader) loader.remove();
            } catch (error) {
                const canvas = document.getElementById(canvasId);
                if(canvas) {
                    const wrapper = canvas.parentElement;
                    wrapper.innerHTML = `<div class="text-[var(--text-light)] flex flex-col items-center gap-1"><i data-lucide="file-question" class="w-6 h-6"></i><span class="text-[9px] font-bold">No Preview</span></div>`;
                    lucide.createIcons();
                }
            }
        }

        function renderMaterials() {
            const container = document.getElementById('learning-materials-container');
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const filterValue = document.getElementById('material-filter').value;
            
            if (!container) return;

            const filtered = MATERIAL_DATA.filter(item => {
                const matchTab = item.tab === currentTab;
                const matchText = item.title.toLowerCase().includes(query) || item.subject.toLowerCase().includes(query) || item.grade.includes(query);
                const hasAnyMaterial = (item.pdfBasic && item.pdfBasic !== "#") || 
                                       (item.pdfAdv && item.pdfAdv !== "#") || 
                                       (item.pdfAns && item.pdfAns !== "#");
                
                let matchFilter = true;
                if (filterValue === 'available') matchFilter = hasAnyMaterial;
                if (filterValue === 'unavailable') matchFilter = !hasAnyMaterial;

                return matchTab && (query === "" || matchText) && matchFilter;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-[var(--text-light)] font-black text-sm flex flex-col items-center"><i data-lucide="telescope" class="w-10 h-10 mb-4 opacity-50"></i>条件に一致する教材が見つかりません。</div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = "";
            filtered.forEach((item, index) => {
                const hasAnyMaterial = (item.pdfBasic && item.pdfBasic !== "#") || (item.pdfAdv && item.pdfAdv !== "#") || (item.pdfAns && item.pdfAns !== "#");
                
                const card = document.createElement('div');
                const canvasId = `pdf-thumb-${Date.now()}-${index}`;
                
                card.className = "premium-card cursor-pointer group card-appear flex flex-col";
                card.innerHTML = `
                    <div class="pdf-thumbnail-wrapper">
                        <i data-lucide="loader-2" class="w-6 h-6 pdf-loading animate-spin"></i>
                        <canvas id="${canvasId}" class="pdf-canvas"></canvas>
                    </div>
                    
                    <div class="py-4 px-1 flex-grow flex flex-col bg-transparent relative z-10 card-text-area">
                        <div class="flex items-center gap-2 mb-2 flex-wrap">
                            <span class="px-2 py-1 bg-white/80 backdrop-blur-md text-[var(--accent-dark)] text-[9px] sm:text-[10px] font-black rounded-lg border border-white">${item.subject}</span>
                            <span class="text-[9px] sm:text-[10px] font-bold text-[var(--text-muted)]">${item.grade}</span>
                            ${!hasAnyMaterial ? `<span class="badge-disabled px-2 py-1 text-[9px] sm:text-[10px] font-black rounded-lg">準備中</span>` : ''}
                        </div>
                        <h3 class="text-sm sm:text-base font-black text-[var(--text-main)] group-hover:text-[var(--accent-dark)] transition-colors leading-snug flex-grow drop-shadow-sm">${item.title}</h3>
                    </div>
                `;
                
                card.onclick = () => openDetail(item, hasAnyMaterial);
                container.appendChild(card);

                if (item.pdfBasic && item.pdfBasic !== "#") { 
                    renderPDFThumbnail(item.pdfBasic, canvasId); 
                } else { 
                    document.getElementById(canvasId).parentElement.innerHTML = `
                        <div class="w-full h-full bg-white shadow-sm flex flex-col items-center justify-center gap-2 text-[var(--text-light)] border-2 border-dashed border-[var(--border-color)]">
                            <i data-lucide="hammer" class="w-8 h-8 opacity-50 mb-1"></i>
                            <span class="text-[10px] font-bold">教材つくってます！</span>
                        </div>`; 
                }

                setTimeout(() => { card.classList.add('show'); }, index * 50); 
            });
            lucide.createIcons();
        }

        function openDetail(item, hasAnyMaterial) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            
            const hasBasic = !!item.pdfBasic && item.pdfBasic !== "#";
            const hasAdv = !!item.pdfAdv && item.pdfAdv !== "#";
            const hasAns = !!item.pdfAns && item.pdfAns !== "#";

            document.getElementById('detail-content').innerHTML = `
                <div class="flex flex-col md:flex-row items-center md:items-start gap-8 md:gap-16">
                    <div class="w-full md:w-1/2 flex items-center justify-center relative overflow-visible group">
                         <div class="w-full max-w-sm aspect-[1/1.414] bg-transparent flex items-center justify-center relative transition-transform duration-700 ease-out group-hover:scale-[1.02]">
                             ${hasBasic ? `<i data-lucide="loader-2" class="w-8 h-8 pdf-loading animate-spin absolute"></i><canvas id="detail-pdf-canvas" class="w-full h-full object-cover bg-white shadow-[0_10px_30px_rgba(0,0,0,0.08)] ring-1 ring-black/5 relative z-10 transition-transform duration-500"></canvas>` : `<div class="w-full h-full bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center gap-3 border-2 border-dashed border-[var(--border-color)] text-[var(--text-light)]"><i data-lucide="hammer" class="w-12 h-12 opacity-50"></i><span class="font-bold text-sm">一生懸命作っています！</span></div>`}
                         </div>
                    </div>
                    
                    <div class="w-full md:w-1/2 text-center md:text-left flex flex-col justify-center pt-4 md:pt-10">
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-6">
                            <span class="px-5 py-2 bg-white/80 backdrop-blur-md text-[var(--accent-dark)] text-xs font-black rounded-xl shadow-sm border border-white">${item.grade} / ${item.subject}</span>
                            ${!hasAnyMaterial ? `<span class="badge-disabled px-4 py-1.5 text-[11px] font-black rounded-lg">現在準備中です</span>` : ''}
                        </div>
                        <h2 class="text-3xl sm:text-4xl md:text-5xl font-black text-[var(--text-main)] mb-8 md:mb-12 leading-tight tracking-tight">${item.title}</h2>
                        
                        <div class="flex flex-col gap-4 max-w-sm mx-auto md:mx-0 w-full">
                            <button ${hasBasic ? `onclick="window.open('${item.pdfBasic}')"` : 'disabled'} class="flex items-center justify-center gap-3 p-4 rounded-2xl font-black text-sm border-2 ${hasBasic ? 'bg-white/90 backdrop-blur-sm border-[var(--border-color)] text-[var(--text-main)] hover:border-[var(--accent-main)] hover:text-[var(--accent-main)] hover:bg-white' : 'btn-disabled'} transition-all hover:shadow-[0_10px_25px_rgba(76,175,80,0.15)] hover:-translate-y-1">
                                <i data-lucide="file-text" class="w-5 h-5"></i>
                                ${hasBasic ? '基本問題をひらく' : '準備中'}
                            </button>
                            
                            <button ${hasAdv ? `onclick="window.open('${item.pdfAdv}')"` : 'disabled'} class="flex items-center justify-center gap-3 p-4 rounded-2xl font-black text-sm border-2 ${hasAdv ? 'bg-white/90 backdrop-blur-sm border-[var(--border-color)] text-[var(--text-main)] hover:border-orange-400 hover:text-orange-500 hover:bg-white' : 'btn-disabled'} transition-all hover:shadow-[0_10px_25px_rgba(251,146,60,0.15)] hover:-translate-y-1">
                                <i data-lucide="zap" class="w-5 h-5"></i>
                                ${hasAdv ? '練習問題に挑戦' : '準備中'}
                            </button>
                            
                            <button ${hasAns ? `onclick="window.open('${item.pdfAns}')"` : 'disabled'} class="flex items-center justify-center gap-3 p-4 rounded-2xl font-black text-sm mt-2 ${hasAns ? 'bg-[var(--text-main)] text-white shadow-[0_10px_20px_rgba(46,61,48,0.2)] hover:bg-[var(--text-dark)] hover:-translate-y-1 hover:shadow-[0_15px_30px_rgba(46,61,48,0.3)]' : 'btn-disabled'} transition-all">
                                <i data-lucide="check-circle" class="w-5 h-5"></i>
                                ${hasAns ? '解答・解説を確認する' : '準備中'}
                            </button>
                        </div>
                    </div>
                </div>`;
            
            if(hasBasic) renderPDFThumbnail(item.pdfBasic, 'detail-pdf-canvas');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        function goHome() { document.getElementById('view-home').classList.remove('hidden'); document.getElementById('view-detail').classList.add('hidden'); renderMaterials(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        /* --- ユーザー設定 --- */
        function saveBirthDate() {
            const val = document.getElementById('birthdate-input').value;
            if (!val) return;
            localStorage.setItem('tamaben_birthdate', val);
            applySettings(val);
            closeSettingsModal();
        }
        function clearBirthDate() { localStorage.removeItem('tamaben_birthdate'); location.reload(); }
        
        function applySettings(dateStr) {
            const today = new Date();
            const birth = new Date(dateStr);
            let schoolYear = today.getFullYear() - (today.getMonth() + 1 < 4 ? 1 : 0);
            let birthYear = birth.getFullYear() - (birth.getMonth() + 1 < 4 || (birth.getMonth() + 1 === 4 && birth.getDate() === 1) ? 1 : 0);
            const age = schoolYear - birthYear;
            const badge = document.getElementById('grade-badge');
            const label = document.getElementById('user-grade-label');
            if (age >= 6 && age <= 11) { label.textContent = `小学${age - 5}年生`; badge.classList.remove('hidden'); switchTab('elementary'); }
            else if (age >= 12 && age <= 14) { label.textContent = `中学${age - 11}年生`; badge.classList.remove('hidden'); switchTab('junior'); }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-elementary').classList.toggle('active', tab === 'elementary');
            document.getElementById('tab-junior').classList.toggle('active', tab === 'junior');
            renderMaterials();
        }

        function openSettingsModal() { document.getElementById('settings-modal').classList.add('active'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('active'); }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('search-input').oninput = renderMaterials;
            const saved = localStorage.getItem('tamaben_birthdate');
            if (saved){ document.getElementById('birthdate-input').value = saved; applySettings(saved); }
            loadMaterials();
        });
    </script>
</body>
</html>
