<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        /* テーマカラー変数 */
        :root {
            --bg-base: #f4f8f4;
            --text-main: #2e3d30;
            --text-dark: #1b261c;
            --text-muted: #84a589;
            --text-light: #b5ccb8;
            --accent-main: #4CAF50;
            --accent-dark: #388E3C;
            --bg-sub: #e6f0e7;
            --bg-card: #ffffff;
            --border-color: #d1e2d3;
            --blob-1: #aed581;
            --blob-2: #81c784;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            overflow-x: hidden;
            font-feature-settings: "palt";
            padding-bottom: env(safe-area-inset-bottom);
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(8vw);
            z-index: -1;
            animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
            pointer-events: none;
            opacity: 0.5;
            width: clamp(300px, 60vw, 800px);
            height: clamp(300px, 60vw, 800px);
        }
        @keyframes move {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(15%, 15%) rotate(90deg); }
        }

        .glass-nav {
            background: color-mix(in srgb, var(--bg-base) 85%, transparent);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-field { background: var(--bg-card); border: 1.5px solid var(--border-color); transition: all 0.4s ease; }
        .search-field:focus-within { border-color: var(--accent-main); box-shadow: 0 10px 30px rgba(0,0,0,0.05); transform: scale(1.01); }
        .form-input { background: var(--bg-card); border: 1.5px solid var(--border-color); transition: all 0.3s ease; }
        .form-input:focus { border-color: var(--accent-main); box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1); outline: none; }

        .tab-pill { transition: all 0.4s ease; color: var(--text-muted); }
        .tab-pill.active { background: var(--bg-card); color: var(--text-main); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }

        .progress-bar-container { width: 100%; height: 8px; background: var(--bg-sub); border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-main); width: 0%; transition: width 0.3s ease; }

        .premium-card { background: white; border-radius: 1.5rem; overflow: hidden; border: 1px solid var(--border-color); transition: all 0.3s ease; }
        .premium-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.05); border-color: var(--accent-main); }

        /* ▼ A4プリント用紙のスタイル（ビジュアルエディタ） ▼ */
        .worksheet-wrapper {
            background-color: #e5e7eb;
            padding: 1.5rem;
            border-radius: 1rem;
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }
        
        .a4-paper {
            background-color: #ffffff;
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif;
            color: #111;
            position: relative;
            outline: none; /* contenteditableのフォーカス枠を消す */
        }

        .a4-paper:focus {
            box-shadow: 0 0 0 3px var(--accent-main), 0 10px 25px rgba(0,0,0,0.1);
        }

        /* プリント内のデザイン要素 */
        .print-header { border-bottom: 2px solid #111; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .print-title { font-size: 24px; font-weight: bold; }
        .print-info { font-size: 14px; display: flex; gap: 20px; }
        .print-name-box { border-bottom: 1px dotted #111; width: 200px; display: inline-block; }
        
        .print-section { margin-bottom: 30px; }
        .print-q-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .print-q-item { margin-bottom: 15px; padding-left: 20px; font-size: 15px; line-height: 1.8; }
        .print-line { border-bottom: 1px solid #111; display: inline-block; min-width: 150px; }
        
        .print-box { border: 2px rounded #111; padding: 15px; border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; }
        .print-graph-area { width: 100%; height: 150px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; margin: 10px 0; background-color: #fff; }

        /* 印刷用スタイル */
        @media print {
            body * { visibility: hidden; }
            .hide-on-print { display: none !important; }
            #a4-canvas, #a4-canvas * { visibility: visible; }
            #a4-canvas {
                position: absolute; left: 0; top: 0;
                width: 210mm; min-height: 297mm;
                padding: 10mm; margin: 0; box-shadow: none;
            }
            @page { margin: 0; size: A4 portrait; }
        }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <div class="blob" style="background: var(--blob-1); top: -10%; left: -10%;"></div>
    <div class="blob" style="background: var(--blob-2); bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <header class="sticky top-0 z-[100] glass-nav hide-on-print">
        <div class="container mx-auto px-4 h-16 md:h-20 flex items-center justify-between max-w-7xl">
            <button onclick="goHome()" class="font-black text-[var(--text-main)] text-xl md:text-2xl outline-none flex items-center gap-2">
                <img src="logo.svg" alt="タマベンロゴ" class="h-8 w-auto hidden sm:block" onerror="this.style.display='none'">
                <span>タマベン</span>
            </button>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="openCreateView()" class="h-10 px-4 md:h-12 md:px-5 flex items-center justify-center gap-2 rounded-xl bg-[var(--accent-main)] text-white shadow-sm hover:bg-[var(--accent-dark)] hover:-translate-y-1 transition-all outline-none">
                    <i data-lucide="pen-tool" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <span class="text-xs md:text-sm font-black">プリントを作る</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 md:px-8 max-w-5xl pb-16 pt-8 hide-on-print">
        
        <!-- ▼ 一覧画面（ホーム） ▼ -->
        <div id="view-home">
            <section class="py-8 text-center fade-in-up">
                <h1 class="text-3xl md:text-5xl font-black mb-8 text-[var(--text-dark)] leading-tight">
                    学びを、もっと<br class="sm:hidden"/><span class="inline-block px-4 py-1 bg-white text-[var(--accent-main)] rounded-full shadow-sm rotate-[-2deg] border-2 border-[var(--accent-main)] my-2">自由に。</span>
                </h1>

                <div class="w-full max-w-2xl mx-auto flex flex-col sm:flex-row gap-3">
                    <div class="search-field flex-grow flex items-center rounded-full px-6 py-3 bg-white/90">
                        <i data-lucide="search" class="w-5 h-5 text-[var(--text-light)] mr-3"></i>
                        <input type="text" placeholder="教材を探す..." class="w-full bg-transparent outline-none font-bold text-[var(--text-main)] text-sm">
                    </div>
                </div>
            </section>

            <div class="flex w-full max-w-sm mx-auto bg-[var(--bg-sub)] p-1.5 rounded-full mb-8 shadow-inner fade-in-up" style="animation-delay: 0.1s;">
                <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-pill active flex-1 py-2 rounded-full text-sm font-black">小学生</button>
                <button onclick="switchTab('junior')" id="tab-junior" class="tab-pill flex-1 py-2 rounded-full text-sm font-black">中学生</button>
            </div>

            <div id="learning-materials-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 fade-in-up" style="animation-delay: 0.2s;">
                <!-- 教材一覧 -->
            </div>
        </div>

        <!-- ▼ AIプリント作成（ビジュアルエディタ版） ▼ -->
        <div id="view-create" class="hidden max-w-4xl mx-auto fade-in-up">
            <div class="flex items-center justify-between mb-6">
                <button onclick="goHome()" class="flex items-center gap-2 text-[var(--text-muted)] font-black hover:text-[var(--text-main)] transition-colors group px-4 py-2 bg-white/50 rounded-full">
                    <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> 戻る
                </button>
            </div>
            
            <div class="bg-white/90 backdrop-blur-md rounded-[2rem] p-6 md:p-8 shadow-sm border border-[var(--border-color)]">
                
                <!-- STEP 1: 入力フォーム -->
                <div id="create-step-1">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-xl bg-[var(--bg-sub)] text-[var(--accent-main)] flex items-center justify-center"><i data-lucide="layout-template" class="w-5 h-5"></i></div>
                        <div>
                            <h2 class="text-xl font-black text-[var(--text-main)]">デザインプリント生成</h2>
                            <p class="text-xs font-bold text-[var(--text-muted)]">文字だけでなく、図解や解答欄のレイアウトも自動で作ります。</p>
                        </div>
                    </div>
                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-black text-[var(--text-dark)] mb-2">学年</label>
                                <select id="create-grade" class="form-input w-full px-4 py-3 rounded-xl font-bold text-sm">
                                    <option value="中1">中学1年生</option>
                                    <option value="中2">中学2年生</option>
                                    <option value="中3" selected>中学3年生</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-black text-[var(--text-dark)] mb-2">教科</label>
                                <select id="create-subject" class="form-input w-full px-4 py-3 rounded-xl font-bold text-sm">
                                    <option value="英語">英語</option>
                                    <option value="数学" selected>数学</option>
                                    <option value="理科">理科</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-black text-[var(--text-dark)] mb-2">学習内容・テーマ</label>
                            <textarea id="create-topic" rows="2" placeholder="例：二次関数のグラフの基本と、変化の割合を求める問題" class="form-input w-full px-4 py-3 rounded-xl font-bold text-sm resize-none"></textarea>
                        </div>
                        <button onclick="startAIGeneration()" class="w-full py-4 rounded-xl bg-[var(--text-main)] text-white font-black text-sm hover:bg-[var(--text-dark)] hover:-translate-y-1 transition-all shadow-md">
                            レイアウトを生成する
                        </button>
                    </div>
                </div>

                <!-- STEP 2: 生成中 -->
                <div id="create-step-loading" class="hidden py-12 text-center">
                    <i data-lucide="loader-2" class="w-10 h-10 text-[var(--accent-main)] animate-spin mx-auto mb-4"></i>
                    <h3 class="text-lg font-black text-[var(--text-main)] mb-2">骨組みとデザインを作成中...</h3>
                    <div class="progress-bar-container max-w-xs mx-auto mt-4"><div id="progress-bar" class="progress-bar"></div></div>
                </div>

                <!-- STEP 3: ビジュアルエディタ -->
                <div id="create-step-editor" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <div>
                            <h3 class="text-lg font-black text-[var(--text-main)] flex items-center gap-2">
                                <i data-lucide="mouse-pointer-click" class="w-5 h-5 text-[var(--accent-main)]"></i>直接クリックして編集できます
                            </h3>
                        </div>
                        <button onclick="window.print()" class="w-full md:w-auto px-6 py-3 bg-[var(--accent-main)] text-white font-black text-sm rounded-xl hover:bg-[var(--accent-dark)] shadow-sm flex items-center justify-center gap-2 transition-all">
                            <i data-lucide="printer" class="w-4 h-4"></i> 印刷 / PDF保存
                        </button>
                    </div>
                    
                    <!-- プレビュー＆編集エリア -->
                    <div class="worksheet-wrapper">
                        <!-- この a4-canvas が実際の印刷対象。contenteditable="true" で直接編集可能 -->
                        <div id="a4-canvas" class="a4-paper" contenteditable="true">
                            <!-- JSでレイアウトが挿入されます -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const MATERIALS = [
            { type: 'elementary', subject: '算数', title: '小3 割り算のひっ算' },
            { type: 'elementary', subject: '国語', title: '小4 漢字まとめプリント' },
            { type: 'junior', subject: '英語', title: '中3 Unit2 現在完了形' },
            { type: 'junior', subject: '数学', title: '中2 一次関数のグラフ' },
        ];

        function switchTab(tab) {
            document.getElementById('tab-elementary').classList.toggle('active', tab === 'elementary');
            document.getElementById('tab-junior').classList.toggle('active', tab === 'junior');
            
            const container = document.getElementById('learning-materials-container');
            container.innerHTML = '';
            MATERIALS.filter(m => m.type === tab).forEach(item => {
                container.innerHTML += `
                    <div class="premium-card p-5 cursor-pointer flex flex-col justify-between">
                        <div>
                            <span class="px-2 py-1 bg-[var(--bg-sub)] text-[var(--accent-dark)] text-[10px] font-black rounded-lg">${item.subject}</span>
                            <h3 class="text-base font-black text-[var(--text-main)] mt-3 leading-snug">${item.title}</h3>
                        </div>
                        <div class="mt-4 text-right"><i data-lucide="arrow-right" class="w-4 h-4 text-[var(--text-light)] inline"></i></div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function goHome() {
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            switchTab('junior');
        }

        function openCreateView() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-create').classList.remove('hidden');
            
            document.getElementById('create-step-1').classList.remove('hidden');
            document.getElementById('create-step-loading').classList.add('hidden');
            document.getElementById('create-step-editor').classList.add('hidden');
        }

        function startAIGeneration() {
            const topic = document.getElementById('create-topic').value || "基本問題";
            const subject = document.getElementById('create-subject').value;
            const grade = document.getElementById('create-grade').value;
            
            document.getElementById('create-step-1').classList.add('hidden');
            document.getElementById('create-step-loading').classList.remove('hidden');
            
            const bar = document.getElementById('progress-bar');
            setTimeout(() => { bar.style.width = '50%'; }, 800);
            
            setTimeout(() => {
                document.getElementById('create-step-loading').classList.add('hidden');
                document.getElementById('create-step-editor').classList.remove('hidden');
                
                // 教科に応じたHTMLテンプレートを生成して挿入
                document.getElementById('a4-canvas').innerHTML = generateVisualLayout(grade, subject, topic);
            }, 2000);
        }

        // ▼ ビジュアルレイアウトの生成（おしゃれな骨組み） ▼
        function generateVisualLayout(grade, subject, topic) {
            const date = new Date();
            const dateStr = `${date.getFullYear()}年 ${date.getMonth()+1}月 ${date.getDate()}日`;

            let html = `
                <div class="print-header">
                    <div class="print-title">${grade} ${subject} 基本確認プリント</div>
                    <div class="print-info">
                        <div>日付: <span class="print-name-box" style="width:100px; text-align:center;">${dateStr}</span></div>
                        <div>氏名: <span class="print-name-box"></span></div>
                    </div>
                </div>
                
                <div style="font-size: 14px; margin-bottom: 20px; color: #555;">
                    ■ テーマ：${topic}
                </div>
            `;

            if (subject === '数学' || subject === '算数') {
                html += `
                    <div class="print-box" style="border: 2px solid #333;">
                        <strong style="font-size: 16px;">💡 公式・ポイントの確認</strong>
                        <p style="margin-top: 10px;">関数 $y = ax^2$ において、変化の割合は一定ではない。<br>xの値が $p$ から $q$ まで増加するときの変化の割合は <strong>$a(p+q)$</strong> で求められる。</p>
                    </div>

                    <div class="print-section">
                        <div class="print-q-title">【1】次の関数のグラフを右の図にかきなさい。</div>
                        <div style="display: flex; gap: 20px;">
                            <div style="flex: 1;">
                                <div class="print-q-item">(1) $y = 2x^2$</div>
                                <div class="print-q-item">(2) $y = -\\frac{1}{2}x^2$</div>
                                <br><br>
                                <div class="print-q-title">【2】$y=2x^2$ について答えなさい。</div>
                                <div class="print-q-item">(1) $x$が1から3まで増加するときの変化の割合。<br>答： <span class="print-line"></span></div>
                            </div>
                            
                            <!-- グラフ配置エリア（ダミーSVG） -->
                            <div style="width: 200px; height: 200px; border: 1px solid #333; position: relative;">
                                <!-- 方眼紙風の背景 -->
                                <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                                    <defs>
                                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ddd" stroke-width="1"/>
                                        </pattern>
                                    </defs>
                                    <rect width="100%" height="100%" fill="url(#grid)" />
                                    <!-- XY軸 -->
                                    <line x1="0" y1="100" x2="200" y2="100" stroke="#111" stroke-width="2"/>
                                    <line x1="100" y1="0" x2="100" y2="200" stroke="#111" stroke-width="2"/>
                                    <text x="185" y="95" font-size="12" font-family="serif">x</text>
                                    <text x="105" y="15" font-size="12" font-family="serif">y</text>
                                    <text x="85" y="115" font-size="12" font-family="serif">O</text>
                                </svg>
                            </div>
                        </div>
                    </div>
                `;
            } else if (subject === '英語') {
                html += `
                    <div class="print-box" style="border: 2px dashed #666;">
                        <strong style="font-size: 16px;">💡 今日の文法：現在完了形（経験）</strong>
                        <p style="margin-top: 10px; font-size: 15px;">
                            形： <strong>have [has] + 過去分詞</strong><br>
                            意味：「今までに〜したことがある」<br>
                            ※一緒に使う単語： ever(今までに), never(一度も〜ない), before(以前に), twice(2回) など
                        </p>
                    </div>

                    <div class="print-section">
                        <div class="print-q-title">【1】次の日本文に合うように、（　）内の単語を並べ替えなさい。</div>
                        <div class="print-q-item">
                            (1) 私は一度もオーストラリアに行ったことがありません。<br>
                            ( never / been / have / Australia / I / to / . )<br>
                            <span style="display:inline-block; width:100%; border-bottom:1px solid #111; margin-top: 15px;"></span>
                        </div>
                        <div class="print-q-item">
                            (2) あなたは今までにこの本を読んだことがありますか。<br>
                            ( read / ever / you / book / this / have / ? )<br>
                            <span style="display:inline-block; width:100%; border-bottom:1px solid #111; margin-top: 15px;"></span>
                        </div>
                    </div>
                    
                    <div class="print-section">
                        <div class="print-q-title">【2】対話文を読んで、下線部を日本語に訳しなさい。</div>
                        <div style="background-color: #f5f5f5; padding: 15px; border-radius: 8px; font-family: sans-serif;">
                            <p><strong>A:</strong> Have you ever eaten natto?</p>
                            <p><strong>B:</strong> No, I haven't. Is it good?</p>
                            <p><strong>A:</strong> Yes! <span style="text-decoration: underline;">I have eaten it many times.</span> It's very healthy.</p>
                        </div>
                        <div class="print-q-item" style="margin-top: 15px;">
                            訳：<span style="display:inline-block; width:80%; border-bottom:1px solid #111;"></span>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="print-section">
                        <div class="print-q-title">【1】${topic}について、以下の問いに答えなさい。</div>
                        <div class="print-q-item">
                            (1) 最も重要なキーワードを3つ答えなさい。<br>
                            <div style="display:flex; gap: 20px; margin-top:10px;">
                                ① <span class="print-line" style="width:100px;"></span>
                                ② <span class="print-line" style="width:100px;"></span>
                                ③ <span class="print-line" style="width:100px;"></span>
                            </div>
                        </div>
                    </div>
                    <div class="print-section">
                        <div class="print-q-title">【2】図や表を書いて、内容をわかりやすくまとめなさい。</div>
                        <div class="print-graph-area" style="height: 250px;">
                            （ここに自由に図解を描き込んでください）
                        </div>
                    </div>
                `;
            }

            html += `<div style="text-align: right; margin-top: 50px; font-size: 11px; color: #999;">Powered by タマベン AI Layout</div>`;
            return html;
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            switchTab('junior');
        });
    </script>
</body>
</html>
