<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        /* テーマカラー変数 */
        :root {
            --bg-base: #f4f8f4;
            --text-main: #2e3d30;
            --text-dark: #1b261c;
            --text-muted: #84a589;
            --text-light: #b5ccb8;
            --accent-main: #4CAF50;
            --accent-dark: #388E3C;
            --bg-sub: #e6f0e7;
            --bg-card: #ffffff;
            --border-color: #d1e2d3;
            --blob-1: #aed581;
            --blob-2: #81c784;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            overflow-x: hidden;
            font-feature-settings: "palt";
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 背景Blob */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(8vw);
            z-index: -1;
            animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
            pointer-events: none;
            opacity: 0.5;
            width: clamp(300px, 60vw, 800px);
            height: clamp(300px, 60vw, 800px);
            will-change: transform;
        }
        @keyframes move {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(15%, 15%) rotate(90deg); }
        }

        .glass-nav {
            background: color-mix(in srgb, var(--bg-base) 85%, transparent);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding-top: env(safe-area-inset-top);
        }

        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-appear {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-appear.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* カード・プレビュー関連 */
        .premium-card { background: transparent; border: none; box-shadow: none; display: flex; flex-direction: column; height: 100%; overflow: visible; }
        .pdf-thumbnail-wrapper { width: 100%; aspect-ratio: 1 / 1.414; background: transparent; position: relative; display: flex; align-items: center; justify-content: center; overflow: visible; }
        .pdf-canvas { width: 100%; height: 100%; object-fit: cover; background-color: #ffffff; border-radius: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease; }
        .premium-card:hover .pdf-canvas { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .card-text-area { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .premium-card:hover .card-text-area { transform: translateY(-2px); }

        .search-field { background: var(--bg-card); border: 1.5px solid var(--border-color); transition: all 0.4s ease; }
        .search-field:focus-within { border-color: var(--accent-main); box-shadow: 0 10px 30px rgba(0,0,0,0.05); transform: scale(1.01); }

        .tab-pill { transition: all 0.4s ease; color: var(--text-muted); }
        .tab-pill.active { background: var(--bg-card); color: var(--text-main); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }

        #settings-modal { opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 200; }
        #settings-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { max-height: 90vh; overflow-y: auto; background: var(--bg-card); }

        .btn-disabled { opacity: 0.5; pointer-events: none; background: var(--bg-sub) !important; color: var(--text-muted) !important; border-color: var(--border-color) !important; cursor: not-allowed; box-shadow: none !important; }
        .badge-disabled { background-color: transparent; color: #94a3b8; border: 1px dashed #cbd5e1; }
        .fluid-title { font-size: clamp(1.8rem, 6vw, 4.5rem); leading-trim: both; text-edge: cap; }

        /* ▼ 新機能用スタイル（診断＆エディタ） ▼ */
        .progress-bar-container { width: 100%; height: 8px; background: var(--bg-sub); border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-main); width: 0%; transition: width 0.3s ease; }

        .worksheet-wrapper { background-color: rgba(229, 231, 235, 0.5); padding: 1.5rem; border-radius: 1rem; overflow-x: auto; display: flex; justify-content: center; border: 1px solid var(--border-color); }
        .a4-paper { background-color: #ffffff; width: 210mm; min-height: 297mm; padding: 15mm; box-shadow: 0 10px 25px rgba(0,0,0,0.08); font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif; color: #111; position: relative; outline: none; }
        .a4-paper:focus { box-shadow: 0 0 0 3px var(--accent-main), 0 10px 25px rgba(0,0,0,0.1); }
        
        .print-header { border-bottom: 2px solid #111; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .print-title { font-size: 24px; font-weight: bold; }
        .print-info { font-size: 14px; display: flex; gap: 20px; }
        .print-name-box { border-bottom: 1px dotted #111; width: 200px; display: inline-block; }
        .print-section { margin-bottom: 30px; }
        .print-q-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .print-q-item { margin-bottom: 15px; padding-left: 20px; font-size: 15px; line-height: 1.8; }
        .print-line { border-bottom: 1px solid #111; display: inline-block; min-width: 150px; }
        .print-box { border: 2px solid #111; padding: 15px; border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; }

        @media print {
            body * { visibility: hidden; }
            .hide-on-print { display: none !important; }
            #a4-canvas, #a4-canvas * { visibility: visible; }
            #a4-canvas { position: absolute; left: 0; top: 0; width: 210mm; min-height: 297mm; padding: 10mm; margin: 0; box-shadow: none; }
            @page { margin: 0; size: A4 portrait; }
        }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <div class="blob" style="background: var(--blob-1); top: -10%; left: -10%;"></div>
    <div class="blob" style="background: var(--blob-2); bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <header class="sticky top-0 z-[100] glass-nav hide-on-print">
        <div class="container mx-auto px-4 sm:px-6 h-14 sm:h-20 md:h-24 flex items-center justify-between max-w-7xl">
            <button onclick="goHome()" class="active:scale-95 transition-all outline-none">
                <img src="logo.svg" alt="タマベンロゴ" class="h-6 sm:h-8 md:h-10 w-auto" onerror="this.outerHTML='<span class=\'font-black text-[var(--text-main)] text-xl\'>タマベン</span>'">
            </button>
            <div class="flex items-center gap-2 md:gap-4">
                <div id="grade-badge" class="hidden sm:flex flex-col items-end mr-2 fade-in-up">
                    <span class="text-[8px] md:text-[9px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] leading-none mb-1">Your Pace</span>
                    <span id="user-grade-label" class="text-[10px] md:text-xs font-black text-[var(--text-main)]">未設定</span>
                </div>
                
                <!-- 新設：AIプリント作成ボタン -->
                <button onclick="openCreateView()" class="h-10 px-3 md:h-12 md:px-5 flex items-center justify-center gap-2 rounded-2xl bg-[var(--text-main)] text-white shadow-sm hover:bg-[var(--accent-dark)] hover:-translate-y-1 transition-all outline-none">
                    <i data-lucide="pen-tool" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <span class="text-xs md:text-sm font-black hidden sm:inline">プリントを作る</span>
                </button>

                <button onclick="openSettingsModal()" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-2xl bg-white/70 backdrop-blur-md border border-[var(--border-color)] shadow-sm hover:scale-105 hover:bg-white transition-all outline-none">
                    <i data-lucide="user-round" class="w-4 h-4 md:w-5 md:h-5 text-[var(--text-muted)]"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 sm:px-6 md:px-8 max-w-7xl pb-16 hide-on-print">
        
        <!-- ▼ ホーム画面 ▼ -->
        <div id="view-home">
            <section class="py-8 sm:py-16 md:py-20 text-center fade-in-up" style="animation-delay: 0.1s;">
                <h1 class="fluid-title font-black mb-6 tracking-tight text-[var(--text-dark)] leading-[1.15]">
                    学びを、もっと<br/>
                    <span class="inline-block px-5 py-2 bg-white text-[var(--accent-main)] rounded-full shadow-sm rotate-[-3deg] border-2 border-[var(--accent-main)] my-2 hover:rotate-0 hover:scale-105 transition-all cursor-default">自由に。</span>
                </h1>

                <!-- 新設：勉強タイプ診断バナー（元のデザインに馴染むスタイル） -->
                <button onclick="openDiagnosis()" class="mx-auto mb-10 flex items-center gap-4 bg-white/60 backdrop-blur-md border border-[var(--accent-main)] p-3 md:p-4 rounded-full shadow-sm hover:shadow-md hover:bg-white transition-all hover:-translate-y-1 group outline-none">
                    <div class="bg-[var(--accent-main)] text-white p-2 rounded-full group-hover:scale-110 transition-transform"><i data-lucide="sparkles" class="w-5 h-5"></i></div>
                    <div class="text-left pr-4">
                        <p class="text-[10px] md:text-xs text-[var(--text-muted)] font-black">あなたに合った学習法が見つかる</p>
                        <p class="text-sm md:text-base font-black text-[var(--text-main)]">詳細版：勉強タイプ診断をはじめる</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-[var(--accent-main)] mr-2 group-hover:translate-x-1 transition-transform"></i>
                </button>

                <div class="w-full max-w-3xl mx-auto px-2 sm:px-0 flex flex-col sm:flex-row gap-3">
                    <div class="search-field flex-grow flex items-center rounded-full px-6 md:px-8 py-3 md:py-4 bg-white/90 backdrop-blur-md">
                        <i data-lucide="search" class="w-5 h-5 md:w-6 md:h-6 text-[var(--text-light)] mr-3 md:mr-4"></i>
                        <input type="text" id="search-input" placeholder="漢字、計算、歴史、1年生..." class="w-full bg-transparent outline-none font-bold text-[var(--text-main)] placeholder:text-[var(--text-light)] text-sm md:text-base">
                    </div>
                    <div class="search-field flex items-center rounded-full px-4 py-3 md:py-4 sm:w-48 shrink-0 relative bg-white/90 backdrop-blur-md">
                        <i data-lucide="filter" class="w-5 h-5 text-[var(--text-light)] mr-2"></i>
                        <select id="material-filter" class="w-full bg-transparent outline-none font-bold text-[var(--text-main)] text-sm cursor-pointer appearance-none" onchange="renderMaterials()">
                            <option value="all">すべて表示</option>
                            <option value="available">教材あり</option>
                            <option value="unavailable">準備中のみ</option>
                        </select>
                        <div class="absolute right-4 pointer-events-none text-[var(--text-light)]"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
                    </div>
                </div>
            </section>

            <!-- 診断レコメンド結果エリア -->
            <div id="recommend-area" class="hidden mb-12 fade-in-up bg-white/80 backdrop-blur-md p-6 md:p-8 rounded-3xl border-2 border-[var(--accent-main)] shadow-sm max-w-3xl mx-auto relative overflow-hidden">
                <div class="absolute -right-10 -top-10 text-[var(--bg-sub)] opacity-50"><i data-lucide="award" class="w-40 h-40"></i></div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="px-3 py-1 bg-[var(--accent-main)] text-white text-[10px] font-black rounded-full tracking-wider">診断結果</span>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-black text-[var(--text-main)] mb-4" id="diag-result-title">あなたのタイプ</h2>
                    <p class="text-sm md:text-base font-bold text-[var(--text-muted)] mb-6 leading-relaxed" id="diag-result-desc">解説テキスト</p>
                    <hr class="border-[var(--border-color)] mb-6">
                    <h3 class="text-sm font-black text-[var(--text-main)] mb-4 flex items-center gap-2"><i data-lucide="star" class="w-4 h-4 text-yellow-500"></i> あなたにおすすめの教材</h3>
                    <div id="recommend-materials" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- JSで挿入 -->
                    </div>
                </div>
            </div>

            <div class="sticky top-16 sm:top-20 md:top-24 z-40 mb-8 md:mb-16 flex justify-center fade-in-up px-2" style="animation-delay: 0.3s;">
                <div class="flex w-full max-w-sm bg-[var(--bg-sub)]/70 p-1.5 md:p-2 rounded-full border border-white/60 backdrop-blur-xl shadow-sm">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-pill active flex-1 py-2.5 md:py-3.5 rounded-full text-xs md:text-sm font-black">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="tab-pill flex-1 py-2.5 md:py-3.5 rounded-full text-xs md:text-sm font-black">中学生</button>
                </div>
            </div>

            <div id="learning-materials-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 sm:gap-8 md:gap-10 lg:gap-12 mb-10 min-h-[40vh]">
                <!-- JSで挿入 -->
            </div>

            <!-- ▼ タマベンのアプリ一覧 セクション ▼ -->
            <section class="mt-12 md:mt-20 pt-12 border-t-2 border-dashed border-[var(--border-color)] fade-in-up pb-4">
                <div class="flex items-center justify-center gap-2 mb-6 md:mb-8">
                    <i data-lucide="layout-grid" class="w-5 h-5 text-[var(--accent-main)]"></i>
                    <h2 class="text-lg md:text-xl font-black text-[var(--text-main)] tracking-tight">タマベンのアプリ一覧</h2>
                </div>
                <div class="flex flex-wrap justify-center gap-4 px-4">
                    <a href="manabi.html" class="group w-full max-w-sm flex items-center gap-4 p-4 bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-[var(--border-color)] hover:shadow-lg hover:border-[var(--accent-main)] transition-all transform hover:-translate-y-1">
                        <div class="w-14 h-14 rounded-xl overflow-hidden shadow-sm border border-white/80 shrink-0">
                            <img src="manabi.png" alt="Manabi Baton Icon" class="w-full h-full object-cover" onerror="this.outerHTML='<div class=\'w-full h-full bg-[var(--bg-sub)] flex items-center justify-center text-[var(--accent-dark)]\'><i data-lucide=\'refresh-cw\' class=\'w-6 h-6\'></i></div>'">
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-black text-[var(--text-main)] text-base">Manabi Baton</h3>
                            <p class="text-[10px] md:text-xs font-bold text-[var(--text-muted)] mt-0.5">学びのバトンを繋ごう</p>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-[var(--text-light)] group-hover:text-[var(--accent-main)] transition-colors group-hover:translate-x-1 transform"></i>
                    </a>
                </div>
            </section>
            
            <!-- ▼ 公式メディア セクション ▼ -->
            <section class="mt-8 pt-8 border-t-2 border-dashed border-[var(--border-color)] fade-in-up pb-8">
                <div class="flex items-center justify-center gap-2 mb-6 md:mb-8">
                    <i data-lucide="radio" class="w-5 h-5 text-[var(--accent-main)]"></i>
                    <h2 class="text-lg md:text-xl font-black text-[var(--text-main)] tracking-tight">公式メディア</h2>
                </div>
                <div class="flex flex-wrap justify-center gap-4 px-4">
                    <a href="https://youtube.com/@tamaben-tama?si=VB8MXIIjU5d5XfxZ" target="_blank" rel="noopener noreferrer" aria-label="YouTube" class="group flex items-center justify-center w-14 h-14 bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-[var(--border-color)] hover:shadow-md hover:border-red-400 transition-all transform hover:-translate-y-1">
                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" class="w-7 h-7 text-[var(--text-light)] group-hover:text-red-500 transition-colors"><path d="M21.582 6.186a2.665 2.665 0 0 0-1.87-1.884C18.062 3.86 12 3.86 12 3.86s-6.062 0-7.712.442a2.665 2.665 0 0 0-1.87 1.884C2 7.846 2 12 2 12s0 4.154.448 5.814a2.665 2.665 0 0 0 1.87 1.884c1.65.442 7.712.442 7.712.442s6.062 0 7.712-.442a2.665 2.665 0 0 0 1.87-1.884C22 16.154 22 12 22 12s0-4.154-.418-5.814zM9.99 15.474v-6.948l6.19 3.474-6.19 3.474z"/></svg>
                    </a>
                    <a href="https://www.instagram.com/masapiko_0622?igsh=MTl4ejFiZGl0MDllbg%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="group flex items-center justify-center w-14 h-14 bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-[var(--border-color)] hover:shadow-md hover:border-pink-500 transition-all transform hover:-translate-y-1">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-[var(--text-light)] group-hover:text-pink-500 transition-colors"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    </a>
                </div>
            </section>
        </div>

        <!-- ▼ 勉強タイプ診断画面 ▼ -->
        <div id="view-diagnosis" class="hidden max-w-2xl mx-auto py-8 fade-in-up">
            <button onclick="goHome()" class="flex items-center gap-2 text-[var(--text-muted)] font-black hover:text-[var(--text-main)] mb-6 transition-colors outline-none bg-white/50 px-4 py-2 rounded-full backdrop-blur-sm border border-white/60 shadow-sm w-fit">
                <i data-lucide="x" class="w-5 h-5"></i> <span class="text-sm">診断をやめる</span>
            </button>
            <div class="bg-white/90 backdrop-blur-md rounded-[2rem] shadow-sm border border-[var(--border-color)] overflow-hidden">
                <div class="bg-[var(--bg-sub)] p-6 text-center relative border-b border-[var(--border-color)]">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center mx-auto mb-3 text-[var(--accent-main)] shadow-sm"><i data-lucide="microscope" class="w-6 h-6"></i></div>
                    <h2 class="text-xl font-black text-[var(--text-main)]">詳細版：勉強タイプ診断</h2>
                    <p class="text-xs font-bold text-[var(--text-muted)] mt-2 tracking-widest" id="quiz-progress">Q. 1 / 5</p>
                    <div class="w-full bg-[var(--border-color)] h-1 mt-4 rounded-full overflow-hidden">
                        <div id="quiz-progress-bar" class="bg-[var(--accent-main)] h-full transition-all duration-300" style="width: 20%;"></div>
                    </div>
                </div>
                <div class="p-6 md:p-10" id="quiz-container">
                    <h3 class="text-lg md:text-xl font-black text-[var(--text-main)] mb-8 text-center leading-relaxed" id="quiz-question">質問文</h3>
                    <div class="space-y-4" id="quiz-options">
                        <!-- ボタンがここに挿入されます -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ▼ AIプリント作成（ビジュアルエディタ版） ▼ -->
        <div id="view-create" class="hidden py-8 max-w-4xl mx-auto fade-in-up">
            <div class="flex items-center justify-between mb-6">
                <button onclick="goHome()" class="flex items-center gap-2 text-[var(--text-muted)] font-black hover:text-[var(--text-main)] transition-colors group px-4 py-2 bg-white/50 rounded-full border border-white/60 shadow-sm">
                    <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> 戻る
                </button>
            </div>
            
            <div class="bg-white/90 backdrop-blur-md rounded-[2rem] p-6 md:p-8 shadow-sm border border-[var(--border-color)]">
                
                <!-- STEP 1: 入力フォーム -->
                <div id="create-step-1">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-12 h-12 rounded-2xl bg-[var(--bg-sub)] text-[var(--accent-main)] flex items-center justify-center"><i data-lucide="layout-template" class="w-6 h-6"></i></div>
                        <div>
                            <h2 class="text-xl md:text-2xl font-black text-[var(--text-main)]">デザインプリント生成</h2>
                            <p class="text-xs md:text-sm font-bold text-[var(--text-muted)] mt-1">図解や解答欄のレイアウトを含めて自動生成します。</p>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-black text-[var(--text-dark)] mb-2">学年</label>
                                <div class="search-field rounded-xl overflow-hidden px-4 py-3 relative">
                                    <select id="create-grade" class="w-full bg-transparent outline-none font-bold text-[var(--text-main)] text-sm appearance-none cursor-pointer">
                                        <option value="小学1年生">小学1年生</option><option value="小学6年生">小学6年生</option>
                                        <option value="中学1年生">中学1年生</option><option value="中学2年生">中学2年生</option><option value="中学3年生" selected>中学3年生</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="w-4 h-4 absolute right-4 top-3.5 text-[var(--text-light)] pointer-events-none"></i>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-black text-[var(--text-dark)] mb-2">教科</label>
                                <div class="search-field rounded-xl overflow-hidden px-4 py-3 relative">
                                    <select id="create-subject" class="w-full bg-transparent outline-none font-bold text-[var(--text-main)] text-sm appearance-none cursor-pointer">
                                        <option value="英語">英語</option><option value="数学" selected>算数 / 数学</option>
                                        <option value="国語">国語</option><option value="理科">理科</option><option value="社会">社会</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="w-4 h-4 absolute right-4 top-3.5 text-[var(--text-light)] pointer-events-none"></i>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-black text-[var(--text-dark)] mb-2">学習内容・テーマ <span class="text-[10px] font-normal text-[var(--text-muted)] ml-2">※具体的に</span></label>
                            <textarea id="create-topic" rows="3" placeholder="例：二次関数のグラフの基本と、変化の割合を求める問題" class="search-field w-full px-4 py-3 rounded-xl font-bold text-[var(--text-main)] text-sm resize-none"></textarea>
                        </div>
                        <button onclick="startAIGeneration()" class="w-full py-4 rounded-2xl bg-[var(--text-main)] text-white font-black text-sm md:text-base hover:bg-[var(--text-dark)] hover:-translate-y-1 transition-all shadow-[0_10px_20px_rgba(46,61,48,0.2)] flex items-center justify-center gap-2">
                            <i data-lucide="wand-2" class="w-5 h-5"></i> レイアウトを生成する
                        </button>
                    </div>
                </div>

                <!-- STEP 2: 生成中 -->
                <div id="create-step-loading" class="hidden py-16 text-center">
                    <i data-lucide="loader-2" class="w-12 h-12 text-[var(--accent-main)] animate-spin mx-auto mb-6"></i>
                    <h3 class="text-xl font-black text-[var(--text-main)] mb-2">骨組みとデザインを作成中...</h3>
                    <p class="text-xs font-bold text-[var(--text-muted)] mb-6">AIが最適なレイアウトを考えています</p>
                    <div class="progress-bar-container max-w-xs mx-auto"><div id="progress-bar" class="progress-bar"></div></div>
                </div>

                <!-- STEP 3: ビジュアルエディタ -->
                <div id="create-step-editor" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div>
                            <h3 class="text-lg md:text-xl font-black text-[var(--text-main)] flex items-center gap-2">
                                <i data-lucide="mouse-pointer-click" class="w-5 h-5 text-[var(--accent-main)]"></i>文字や図をクリックして編集
                            </h3>
                        </div>
                        <button onclick="window.print()" class="w-full md:w-auto px-6 py-3 bg-[var(--accent-main)] text-white font-black text-sm rounded-xl hover:bg-[var(--accent-dark)] shadow-sm flex items-center justify-center gap-2 transition-all">
                            <i data-lucide="printer" class="w-4 h-4"></i> そのまま印刷 / PDF保存
                        </button>
                    </div>
                    
                    <div class="worksheet-wrapper">
                        <!-- 実際の印刷対象。contenteditable="true" でWordのように編集可能 -->
                        <div id="a4-canvas" class="a4-paper" contenteditable="true"></div>
                    </div>
                </div>

            </div>
        </div>

        <div id="view-detail" class="hidden py-8 md:py-12">
            <button onclick="goHome()" class="flex items-center gap-2 text-[var(--text-muted)] font-black hover:text-[var(--text-main)] mb-6 md:mb-10 transition-colors group outline-none bg-white/50 px-4 py-2 rounded-full backdrop-blur-sm border border-white/60 shadow-sm w-fit">
                <i data-lucide="arrow-left" class="w-5 h-5 md:w-6 md:h-6 group-hover:-translate-x-1 transition-transform"></i> <span class="text-sm md:text-base">一覧に戻る</span>
            </button>
            <div id="detail-content" class="bg-transparent border-none min-h-[50vh]"></div>
        </div>

    </main>

    <footer class="py-12 text-center opacity-50 hover:opacity-100 transition-opacity duration-500 hide-on-print">
        <img src="logo.svg" alt="タマベン" class="h-6 md:h-8 mx-auto mb-4 grayscale hover:grayscale-0 transition-all duration-500" onerror="this.outerHTML='<span class=\'font-black text-[var(--text-main)] text-xl\'>タマベン</span>'">
        <p class="text-[10px] text-[var(--text-light)] font-black tracking-[0.2em] uppercase">
            &copy; 2026 Tamaben. Dedicated to every learner.
        </p>
    </footer>

    <div id="settings-modal" class="fixed inset-0 flex items-center justify-center bg-[#1b261c]/40 backdrop-blur-md p-4 sm:p-6 hide-on-print">
        <div class="modal-content rounded-[2.5rem] p-8 md:p-12 w-full max-w-sm shadow-2xl relative">
            <div class="text-center">
                <h3 class="text-lg md:text-xl font-black text-[var(--text-main)] mb-6 md:mb-10">学年を自動設定</h3>
                <input type="date" id="birthdate-input" class="w-full px-5 py-4 rounded-2xl bg-[var(--bg-sub)] border border-[var(--border-color)] outline-none font-black text-[var(--text-main)] text-center mb-8 md:mb-10 focus:border-[var(--accent-main)] transition-all text-sm md:text-base">
                <div class="space-y-3 md:space-y-4">
                    <button onclick="saveBirthDate()" class="w-full py-4 bg-[var(--text-main)] text-white rounded-2xl font-black active:scale-95 shadow-[0_10px_20px_rgba(46,61,48,0.2)] text-sm md:text-base outline-none hover:bg-[var(--text-dark)] hover:-translate-y-1 transition-all">保存する</button>
                    <button onclick="clearBirthDate()" class="w-full py-2 text-[var(--text-muted)] text-[10px] md:text-xs font-black outline-none hover:text-[var(--text-main)]">リセット</button>
                </div>
                <button onclick="closeSettingsModal()" class="absolute top-6 right-6 p-2 text-[var(--text-light)] hover:text-[var(--accent-main)] hover:rotate-90 transition-transform outline-none">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        /* =======================================
           共通・データ管理
        ======================================= */
        let MATERIAL_DATA = [];
        let currentTab = 'elementary';

        async function loadMaterials() {
            try {
                const response = await fetch('data.json');
                if(!response.ok) throw new Error('error');
                MATERIAL_DATA = await response.json();
            } catch (e) {
                // ダミーデータ（テスト用）
                MATERIAL_DATA = [
                    { id: 1, tab: 'elementary', subject: '算数', grade: '小学3年生', title: 'わり算のひっ算', pdfBasic: 'sample.pdf', pdfAdv: '', pdfAns: '' },
                    { id: 2, tab: 'elementary', subject: '国語', grade: '小学2年生', title: 'かん字のれんしゅう (準備中)', pdfBasic: '#', pdfAdv: '#', pdfAns: '#' },
                    { id: 3, tab: 'junior', subject: '英語', grade: '中学3年生', title: 'Unit2 現在完了形', pdfBasic: 'sample.pdf', pdfAdv: '', pdfAns: '' },
                    { id: 4, tab: 'junior', subject: '数学', grade: '中学2年生', title: '一次関数のグラフ', pdfBasic: '', pdfAdv: '', pdfAns: '' }
                ];
            }
            renderMaterials();
        }

        // [元のレンダリング処理（中略・既存のまま）]
        async function renderPDFThumbnail(url, canvasId) { /* 既存処理 */ }
        function renderMaterials() {
            const container = document.getElementById('learning-materials-container');
            const query = document.getElementById('search-input') ? document.getElementById('search-input').value.toLowerCase().trim() : '';
            const filterSelect = document.getElementById('material-filter');
            const filterValue = filterSelect ? filterSelect.value : 'all';
            
            if (!container) return;

            const filtered = MATERIAL_DATA.filter(item => {
                const matchTab = item.tab === currentTab;
                const matchText = item.title.toLowerCase().includes(query) || item.subject.toLowerCase().includes(query) || item.grade.includes(query);
                const hasAnyMaterial = (item.pdfBasic && item.pdfBasic !== "#") || (item.pdfAdv && item.pdfAdv !== "#") || (item.pdfAns && item.pdfAns !== "#");
                let matchFilter = true;
                if (filterValue === 'available') matchFilter = hasAnyMaterial;
                if (filterValue === 'unavailable') matchFilter = !hasAnyMaterial;
                return matchTab && (query === "" || matchText) && matchFilter;
            });

            container.innerHTML = "";
            filtered.forEach((item, index) => {
                const hasAnyMaterial = (item.pdfBasic && item.pdfBasic !== "#") || (item.pdfAdv && item.pdfAdv !== "#") || (item.pdfAns && item.pdfAns !== "#");
                const card = document.createElement('div');
                card.className = "premium-card cursor-pointer group card-appear flex flex-col";
                card.innerHTML = `
                    <div class="pdf-thumbnail-wrapper border border-[var(--border-color)]">
                        <i data-lucide="loader-2" class="w-6 h-6 pdf-loading animate-spin"></i>
                        <canvas id="pdf-thumb-${Date.now()}-${index}" class="pdf-canvas"></canvas>
                    </div>
                    <div class="py-4 px-1 flex-grow flex flex-col card-text-area">
                        <div class="flex items-center gap-2 mb-2 flex-wrap">
                            <span class="px-2 py-1 bg-[var(--bg-sub)] text-[var(--accent-dark)] text-[9px] sm:text-[10px] font-black rounded-lg">${item.subject}</span>
                            <span class="text-[9px] sm:text-[10px] font-bold text-[var(--text-muted)]">${item.grade}</span>
                        </div>
                        <h3 class="text-sm sm:text-base font-black text-[var(--text-main)] group-hover:text-[var(--accent-dark)] transition-colors leading-snug">${item.title}</h3>
                    </div>
                `;
                card.onclick = () => openDetail(item, hasAnyMaterial);
                container.appendChild(card);
                setTimeout(() => { card.classList.add('show'); }, index * 50); 
            });
            lucide.createIcons();
        }

        function openDetail(item, hasAnyMaterial) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-diagnosis').classList.add('hidden');
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            
            const hasBasic = !!item.pdfBasic && item.pdfBasic !== "#";
            document.getElementById('detail-content').innerHTML = `
                <div class="flex flex-col md:flex-row items-center md:items-start gap-8 md:gap-16">
                    <div class="w-full md:w-1/2 flex justify-center group">
                         <div class="w-full max-w-sm aspect-[1/1.414] bg-white flex items-center justify-center border border-[var(--border-color)]">
                             ${hasBasic ? `<canvas id="detail-pdf-canvas" class="w-full h-full object-cover shadow-sm"></canvas>` : `<div class="text-[var(--text-light)] text-center"><i data-lucide="hammer" class="w-12 h-12 opacity-50 mx-auto mb-2"></i><span class="font-bold text-sm">準備中</span></div>`}
                         </div>
                    </div>
                    <div class="w-full md:w-1/2 pt-4 md:pt-10">
                        <div class="flex gap-3 mb-4"><span class="px-4 py-1.5 bg-[var(--bg-sub)] text-[var(--accent-dark)] text-xs font-black rounded-xl">${item.grade} / ${item.subject}</span></div>
                        <h2 class="text-3xl md:text-4xl font-black text-[var(--text-main)] mb-8">${item.title}</h2>
                        <button ${hasBasic ? `onclick="window.open('${item.pdfBasic}')"` : 'disabled'} class="flex items-center justify-center gap-3 w-full p-4 rounded-xl font-black text-sm border-2 ${hasBasic ? 'bg-white border-[var(--border-color)] hover:border-[var(--accent-main)] text-[var(--accent-main)]' : 'btn-disabled'} transition-all">
                            <i data-lucide="file-text" class="w-5 h-5"></i>基本問題をひらく
                        </button>
                    </div>
                </div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        function goHome() {
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-diagnosis').classList.add('hidden');
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            renderMaterials();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* =======================================
           詳細版：勉強タイプ診断
        ======================================= */
        const quizData = [
            { q: "テスト勉強のスケジュールはどう立てる？", options: [
                { text: "A. 2週間前から計画的にコツコツ進める", type: "steady" },
                { text: "B. 数日前から徹夜覚悟で一気に詰め込む", type: "short" },
                { text: "C. 目についた教科から直感で手をつける", type: "visual" },
                { text: "D. 過去問の傾向を分析してから効率よく", type: "logical" }
            ]},
            { q: "新しいことを覚えるとき、一番頭に入るのは？", options: [
                { text: "A. ノートにきれいに何度も書き写す", type: "steady" },
                { text: "B. 誰かに話したり、声に出して読む", type: "short" },
                { text: "C. 図解やイラスト、色分けで見る", type: "visual" },
                { text: "D. なぜそうなるのか「理由」を理解する", type: "logical" }
            ]},
            { q: "わからない問題に出会ったとき、どうする？", options: [
                { text: "A. 教科書や参考書を最初から読み直す", type: "steady" },
                { text: "B. すぐに答えを見て解き方を暗記する", type: "short" },
                { text: "C. 動画解説や図の多いサイトを探す", type: "visual" },
                { text: "D. 自分の力で別の解き方をじっくり試す", type: "logical" }
            ]},
            { q: "ノートのまとめ方はどんな感じ？", options: [
                { text: "A. 黒板の通りに丁寧で抜け漏れがない", type: "steady" },
                { text: "B. 殴り書きで、自分だけが読めればいい", type: "short" },
                { text: "C. 色ペンやマーカーを多用してカラフル", type: "visual" },
                { text: "D. 矢印や記号を使って関係性を整理する", type: "logical" }
            ]},
            { q: "勉強のモチベーションが上がる瞬間は？", options: [
                { text: "A. 計画通りにタスクがすべて完了した時", type: "steady" },
                { text: "B. ギリギリで間に合ってテストで点が取れた時", type: "short" },
                { text: "C. きれいなノートが完成して見返した時", type: "visual" },
                { text: "D. 難問の仕組みがひらめいて解けた時", type: "logical" }
            ]}
        ];
        
        let currentQ = 0;
        let scores = { steady: 0, short: 0, visual: 0, logical: 0 };

        function openDiagnosis() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-diagnosis').classList.remove('hidden');
            currentQ = 0; scores = { steady: 0, short: 0, visual: 0, logical: 0 };
            showQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showQuiz() {
            if (currentQ >= quizData.length) { calculateDiagnosis(); return; }
            const qData = quizData[currentQ];
            document.getElementById('quiz-progress').textContent = `Q. ${currentQ + 1} / ${quizData.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((currentQ + 1) / quizData.length) * 100}%`;
            document.getElementById('quiz-question').textContent = qData.q;
            
            const optionsHtml = qData.options.map(opt => 
                `<button onclick="answerQuiz('${opt.type}')" class="w-full p-4 rounded-2xl border-2 border-[var(--border-color)] bg-white hover:border-[var(--accent-main)] hover:bg-[var(--bg-sub)] hover:text-[var(--accent-dark)] text-left font-bold text-[var(--text-main)] text-sm md:text-base transition-all shadow-sm">
                    ${opt.text}
                </button>`
            ).join('');
            document.getElementById('quiz-options').innerHTML = optionsHtml;
        }

        function answerQuiz(type) { scores[type]++; currentQ++; showQuiz(); }

        function calculateDiagnosis() {
            const topType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const results = {
                steady: { title: "🐢 コツコツ堅実タイプ", desc: "毎日計画的に進めるのが得意なあなた。基礎を反復するドリル形式や、書き込み式のまとめプリントが最も効果を発揮します。" },
                short:  { title: "🔥 短期集中・実践タイプ", desc: "瞬発力と集中力が武器のあなた。ダラダラ基礎をやるより、いきなり実践問題や過去問に挑戦して、間違えたところだけ覚えるのが吉です。" },
                visual: { title: "🎨 視覚・直感タイプ", desc: "見て覚えるのが得意なあなた。文字ばかりの教科書より、図解や表、イラストが豊富に使われた視覚的なプリントを使うと理解が爆発的に早まります。" },
                logical:{ title: "🧐 論理・分析タイプ", desc: "「なぜ？」を紐解くのが好きなあなた。単なる暗記ではなく、仕組みや理由を解説した応用問題や、関係性を整理するプリントが相性抜群です。" }
            };

            goHome();
            document.getElementById('recommend-area').classList.remove('hidden');
            document.getElementById('diag-result-title').textContent = results[topType].title;
            document.getElementById('diag-result-desc').textContent = results[topType].desc;
            
            // おすすめ教材の表示（ダミーから適当に2つ抽出）
            const recs = [MATERIAL_DATA[0], MATERIAL_DATA[2]].filter(x => x);
            document.getElementById('recommend-materials').innerHTML = recs.map(item => `
                <div class="bg-white p-4 rounded-xl border border-[var(--border-color)] flex items-center justify-between cursor-pointer hover:border-[var(--accent-main)] shadow-sm">
                    <div><h4 class="font-black text-sm text-[var(--text-main)]">${item.title}</h4><span class="text-[10px] text-[var(--text-muted)] font-bold">${item.subject}</span></div>
                    <i data-lucide="external-link" class="w-4 h-4 text-[var(--accent-main)]"></i>
                </div>
            `).join('');
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* =======================================
           AIプリント生成（ビジュアルエディタ）
        ======================================= */
        function openCreateView() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-diagnosis').classList.add('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-create').classList.remove('hidden');
            
            document.getElementById('create-step-1').classList.remove('hidden');
            document.getElementById('create-step-loading').classList.add('hidden');
            document.getElementById('create-step-editor').classList.add('hidden');
        }

        function startAIGeneration() {
            const topic = document.getElementById('create-topic').value || "基本問題";
            const subject = document.getElementById('create-subject').value;
            const grade = document.getElementById('create-grade').value;
            
            document.getElementById('create-step-1').classList.add('hidden');
            document.getElementById('create-step-loading').classList.remove('hidden');
            
            const bar = document.getElementById('progress-bar');
            setTimeout(() => { bar.style.width = '40%'; }, 500);
            setTimeout(() => { bar.style.width = '80%'; }, 1500);
            
            setTimeout(() => {
                document.getElementById('create-step-loading').classList.add('hidden');
                document.getElementById('create-step-editor').classList.remove('hidden');
                document.getElementById('a4-canvas').innerHTML = generateVisualLayout(grade, subject, topic);
            }, 2500);
        }

        // ビジュアルレイアウトの生成
        function generateVisualLayout(grade, subject, topic) {
            const dateStr = `${new Date().getFullYear()}年 ${new Date().getMonth()+1}月 ${new Date().getDate()}日`;
            
            let html = `
                <div class="print-header">
                    <div class="print-title">${grade} ${subject} 確認プリント</div>
                    <div class="print-info">
                        <div>日付: <span class="print-name-box" style="width:100px; text-align:center;">${dateStr}</span></div>
                        <div>氏名: <span class="print-name-box"></span></div>
                    </div>
                </div>
                <div style="font-size: 14px; margin-bottom: 20px; color: #555;">■ テーマ：${topic}</div>
            `;

            if (subject.includes('数学') || subject.includes('算数')) {
                html += `
                    <div class="print-box">
                        <strong style="font-size: 16px;">💡 ポイント・公式の確認</strong>
                        <p style="margin-top: 10px;">関数 $y = ax^2$ において、xの値が $p$ から $q$ まで増加するときの変化の割合は <strong>$a(p+q)$</strong> で求められる。</p>
                    </div>
                    <div class="print-section">
                        <div class="print-q-title">【1】次の関数のグラフを右の図にかきなさい。</div>
                        <div style="display: flex; gap: 20px;">
                            <div style="flex: 1;">
                                <div class="print-q-item">(1) $y = 2x^2$</div>
                                <div class="print-q-item">(2) $y = -\\frac{1}{2}x^2$</div>
                                <br><br>
                                <div class="print-q-title">【2】$y=2x^2$ について答えなさい。</div>
                                <div class="print-q-item">(1) $x$が1から3まで増加するときの変化の割合。<br>答： <span class="print-line"></span></div>
                            </div>
                            <div style="width: 200px; height: 200px; border: 1px solid #333; position: relative; background:#fff;">
                                <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                                    <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ddd" stroke-width="1"/></pattern></defs>
                                    <rect width="100%" height="100%" fill="url(#grid)" />
                                    <line x1="0" y1="100" x2="200" y2="100" stroke="#111" stroke-width="2"/>
                                    <line x1="100" y1="0" x2="100" y2="200" stroke="#111" stroke-width="2"/>
                                    <text x="185" y="95" font-size="12" font-family="serif">x</text><text x="105" y="15" font-size="12" font-family="serif">y</text><text x="85" y="115" font-size="12" font-family="serif">O</text>
                                </svg>
                            </div>
                        </div>
                    </div>
                `;
            } else if (subject === '英語') {
                html += `
                    <div class="print-box" style="border-style: dashed;">
                        <strong style="font-size: 16px;">💡 今日の文法：現在完了形（経験）</strong>
                        <p style="margin-top: 10px; font-size: 15px;">形： <strong>have [has] + 過去分詞</strong><br>意味：「今までに〜したことがある」<br>※一緒に使う単語： ever, never, before, twice など</p>
                    </div>
                    <div class="print-section">
                        <div class="print-q-title">【1】次の日本文に合うように、（　）内の単語を並べ替えなさい。</div>
                        <div class="print-q-item">(1) 私は一度もオーストラリアに行ったことがありません。<br>( never / been / have / Australia / I / to / . )<br><span style="display:inline-block; width:100%; border-bottom:1px solid #111; margin-top: 15px;"></span></div>
                        <div class="print-q-item">(2) あなたは今までにこの本を読んだことがありますか。<br>( read / ever / you / book / this / have / ? )<br><span style="display:inline-block; width:100%; border-bottom:1px solid #111; margin-top: 15px;"></span></div>
                    </div>
                `;
            } else {
                html += `
                    <div class="print-section">
                        <div class="print-q-title">【1】${topic}について、以下の問いに答えなさい。</div>
                        <div class="print-q-item">(1) 最も重要なキーワードを3つ答えなさい。<br><div style="display:flex; gap: 20px; margin-top:10px;">① <span class="print-line" style="width:100px;"></span> ② <span class="print-line" style="width:100px;"></span> ③ <span class="print-line" style="width:100px;"></span></div></div>
                    </div>
                    <div class="print-section">
                        <div class="print-q-title">【2】図や表を書いて、内容をわかりやすくまとめなさい。</div>
                        <div style="width: 100%; height: 250px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; margin-top: 10px;">（ここに自由に書き込んでください）</div>
                    </div>
                `;
            }
            html += `<div style="text-align: right; margin-top: 40px; font-size: 10px; color: #999;">Powered by タマベン AI</div>`;
            return html;
        }

        /* --- その他既存のUI設定（中略） --- */
        function switchTab(tab) { currentTab = tab; document.getElementById('tab-elementary').classList.toggle('active', tab === 'elementary'); document.getElementById('tab-junior').classList.toggle('active', tab === 'junior'); renderMaterials(); }
        function openSettingsModal() { document.getElementById('settings-modal').classList.add('active'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('active'); }
        function saveBirthDate() { const val = document.getElementById('birthdate-input').value; if (!val) return; localStorage.setItem('tamaben_birthdate', val); applySettings(val); closeSettingsModal(); }
        function clearBirthDate() { localStorage.removeItem('tamaben_birthdate'); location.reload(); }
        function applySettings(dateStr) {
            const today = new Date(); const birth = new Date(dateStr);
            let schoolYear = today.getFullYear() - (today.getMonth() + 1 < 4 ? 1 : 0);
            let birthYear = birth.getFullYear() - (birth.getMonth() + 1 < 4 || (birth.getMonth() + 1 === 4 && birth.getDate() === 1) ? 1 : 0);
            const age = schoolYear - birthYear;
            const badge = document.getElementById('grade-badge'); const label = document.getElementById('user-grade-label');
            if (age >= 6 && age <= 11) { label.textContent = `小学${age - 5}年生`; badge.classList.remove('hidden'); switchTab('elementary'); }
            else if (age >= 12 && age <= 14) { label.textContent = `中学${age - 11}年生`; badge.classList.remove('hidden'); switchTab('junior'); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('search-input').oninput = renderMaterials;
            const saved = localStorage.getItem('tamaben_birthdate');
            if (saved){ document.getElementById('birthdate-input').value = saved; applySettings(saved); }
            loadMaterials();
        });
    </script>
</body>
</html>
