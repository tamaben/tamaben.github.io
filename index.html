<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        /* テーマカラー変数 */
        :root {
            --bg-base: #f4f8f4;
            --text-main: #2e3d30;
            --text-dark: #1b261c;
            --text-muted: #84a589;
            --text-light: #b5ccb8;
            --accent-main: #4CAF50;
            --accent-dark: #388E3C;
            --bg-sub: #e6f0e7;
            --bg-card: #ffffff;
            --border-color: #d1e2d3;
            --blob-1: #aed581;
            --blob-2: #81c784;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            overflow-x: hidden;
            font-feature-settings: "palt";
            padding-bottom: env(safe-area-inset-bottom);
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(8vw);
            z-index: -1;
            animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
            pointer-events: none;
            opacity: 0.5;
            width: clamp(300px, 60vw, 800px);
            height: clamp(300px, 60vw, 800px);
        }
        @keyframes move {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(15%, 15%) rotate(90deg); }
        }

        .glass-nav {
            background: color-mix(in srgb, var(--bg-base) 85%, transparent);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-field { background: var(--bg-card); border: 1.5px solid var(--border-color); transition: all 0.4s ease; }
        .search-field:focus-within { border-color: var(--accent-main); box-shadow: 0 10px 30px rgba(0,0,0,0.05); transform: scale(1.01); }

        .form-input { background: var(--bg-card); border: 1.5px solid var(--border-color); transition: all 0.3s ease; }
        .form-input:focus { border-color: var(--accent-main); box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1); outline: none; }

        .tab-pill { transition: all 0.4s ease; color: var(--text-muted); }
        .tab-pill.active { background: var(--bg-card); color: var(--text-main); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }

        .progress-bar-container { width: 100%; height: 8px; background: var(--bg-sub); border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-main); width: 0%; transition: width 0.3s ease; }

        .premium-card { background: white; border-radius: 1.5rem; overflow: hidden; border: 1px solid var(--border-color); transition: all 0.3s ease; }
        .premium-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.05); border-color: var(--accent-main); }

        /* エディタ用スタイル */
        .print-editor {
            font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif;
            line-height: 2;
            font-size: 14px;
        }

        /* 印刷用スタイル（ブラウザの印刷・PDF保存時に適用） */
        @media print {
            body * { visibility: hidden; }
            #print-render-area, #print-render-area * { visibility: visible; }
            #print-render-area {
                position: absolute; left: 0; top: 0; width: 100%;
                font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif;
                line-height: 2; font-size: 12pt; padding: 20mm;
                white-space: pre-wrap; word-wrap: break-word;
            }
        }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <div class="blob" style="background: var(--blob-1); top: -10%; left: -10%;"></div>
    <div class="blob" style="background: var(--blob-2); bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <header class="sticky top-0 z-[100] glass-nav hide-on-print">
        <div class="container mx-auto px-4 h-16 md:h-20 flex items-center justify-between max-w-7xl">
            <button onclick="goHome()" class="font-black text-[var(--text-main)] text-xl md:text-2xl outline-none flex items-center gap-2">
                <i data-lucide="leaf" class="text-[var(--accent-main)]"></i>タマベン
            </button>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="openDiagnosis()" class="hidden sm:flex h-10 px-4 items-center justify-center gap-2 rounded-xl bg-orange-100 text-orange-600 font-black text-sm hover:bg-orange-200 transition-all outline-none">
                    <i data-lucide="compass" class="w-4 h-4"></i>勉強タイプ診断
                </button>
                <button onclick="openCreateView()" class="h-10 px-3 md:h-12 md:px-5 flex items-center justify-center gap-2 rounded-xl bg-[var(--accent-main)] text-white shadow-sm hover:bg-[var(--accent-dark)] hover:-translate-y-1 transition-all outline-none">
                    <i data-lucide="pen-tool" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <span class="text-xs md:text-sm font-black hidden sm:inline">AIプリント作成</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 md:px-8 max-w-5xl pb-16 pt-8 hide-on-print">
        
        <!-- ▼ 一覧画面（ホーム） ▼ -->
        <div id="view-home">
            <div class="text-center mb-10 fade-in-up">
                <h1 class="text-3xl md:text-5xl font-black mb-6 text-[var(--text-dark)] leading-tight">
                    学びを、もっと<span class="text-[var(--accent-main)]">自由に。</span>
                </h1>
                <!-- 診断バナー（モバイル向け表示も兼ねる） -->
                <button onclick="openDiagnosis()" class="mx-auto flex items-center gap-3 bg-gradient-to-r from-orange-50 to-orange-100 border border-orange-200 p-4 rounded-2xl shadow-sm hover:shadow-md transition-all hover:-translate-y-1 group">
                    <div class="bg-orange-500 text-white p-2 rounded-xl group-hover:scale-110 transition-transform"><i data-lucide="brain-circuit" class="w-6 h-6"></i></div>
                    <div class="text-left">
                        <p class="text-xs text-orange-600 font-bold">あなたにぴったりの学び方を見つけよう</p>
                        <p class="text-sm md:text-base font-black text-orange-900">30秒でわかる！勉強タイプ診断</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-orange-400 ml-2"></i>
                </button>
            </div>

            <!-- レコメンド表示エリア（診断後に表示） -->
            <div id="recommend-area" class="hidden mb-12 fade-in-up bg-white/80 backdrop-blur-md p-6 rounded-3xl border-2 border-[var(--accent-main)] shadow-lg">
                <div class="flex items-center gap-3 mb-4">
                    <i data-lucide="award" class="w-8 h-8 text-[var(--accent-main)]"></i>
                    <h2 class="text-xl font-black text-[var(--text-main)]" id="diag-result-title">あなたのタイプ</h2>
                </div>
                <p class="text-sm font-bold text-[var(--text-muted)] mb-6" id="diag-result-desc">診断結果の解説がここに入ります。</p>
                <h3 class="text-sm font-black text-[var(--text-main)] mb-3">💡 あなたにおすすめの教材</h3>
                <div id="recommend-materials" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- レコメンド教材がJSで挿入されます -->
                </div>
            </div>

            <div class="flex w-full max-w-sm mx-auto bg-[var(--bg-sub)] p-1.5 rounded-full mb-8 shadow-inner">
                <button onclick="switchTab('all')" id="tab-all" class="tab-pill active flex-1 py-2 rounded-full text-sm font-black">すべて</button>
                <button onclick="switchTab('junior')" id="tab-junior" class="tab-pill flex-1 py-2 rounded-full text-sm font-black">中学生</button>
            </div>

            <div id="learning-materials-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <!-- 教材一覧 -->
            </div>
        </div>

        <!-- ▼ 勉強タイプ診断画面 ▼ -->
        <div id="view-diagnosis" class="hidden max-w-2xl mx-auto fade-in-up bg-white rounded-[2rem] shadow-sm border border-[var(--border-color)] overflow-hidden">
            <div class="bg-orange-50 p-6 md:p-8 text-center border-b border-orange-100 relative">
                <button onclick="goHome()" class="absolute left-6 top-6 text-orange-400 hover:text-orange-600"><i data-lucide="x" class="w-6 h-6"></i></button>
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-orange-500">
                    <i data-lucide="microscope" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-black text-orange-900">勉強タイプ診断</h2>
                <p class="text-sm font-bold text-orange-700 mt-2" id="quiz-progress">質問 1 / 3</p>
            </div>
            
            <div class="p-6 md:p-10" id="quiz-container">
                <h3 class="text-lg md:text-xl font-black text-[var(--text-main)] mb-8 text-center" id="quiz-question">テスト勉強はいつから始める？</h3>
                <div class="space-y-4" id="quiz-options">
                    <button onclick="answerQuiz('A')" class="w-full p-4 rounded-xl border-2 border-[var(--border-color)] hover:border-orange-400 hover:bg-orange-50 text-left font-bold text-[var(--text-main)] transition-all">A. 2週間前からコツコツ</button>
                    <button onclick="answerQuiz('B')" class="w-full p-4 rounded-xl border-2 border-[var(--border-color)] hover:border-orange-400 hover:bg-orange-50 text-left font-bold text-[var(--text-main)] transition-all">B. 3日前から一気に集中</button>
                </div>
            </div>
        </div>

        <!-- ▼ AIプリント作成（エディタ版） ▼ -->
        <div id="view-create" class="hidden max-w-3xl mx-auto fade-in-up">
            <div class="flex items-center justify-between mb-6">
                <button onclick="goHome()" class="flex items-center gap-2 text-[var(--text-muted)] font-black hover:text-[var(--text-main)] transition-colors group px-4 py-2 bg-white/50 rounded-full">
                    <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> 戻る
                </button>
                <span class="text-xs font-black text-[var(--accent-main)] bg-green-100 px-3 py-1 rounded-full">Beta</span>
            </div>
            
            <div class="bg-white/90 backdrop-blur-md rounded-[2rem] p-6 md:p-8 shadow-sm border border-[var(--border-color)]">
                
                <!-- STEP 1: 入力フォーム -->
                <div id="create-step-1">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-xl bg-[var(--accent-main)] text-white flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5"></i></div>
                        <h2 class="text-xl font-black text-[var(--text-main)]">AIでプリントを自動生成</h2>
                    </div>
                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-black text-[var(--text-dark)] mb-2">学年</label>
                                <select id="create-grade" class="form-input w-full px-4 py-3 rounded-xl font-bold text-sm">
                                    <option value="中1">中学1年生</option>
                                    <option value="中2">中学2年生</option>
                                    <option value="中3" selected>中学3年生</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-black text-[var(--text-dark)] mb-2">教科</label>
                                <select id="create-subject" class="form-input w-full px-4 py-3 rounded-xl font-bold text-sm">
                                    <option value="英語" selected>英語</option>
                                    <option value="数学">数学</option>
                                    <option value="国語">国語</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-black text-[var(--text-dark)] mb-2">学習内容・テーマ</label>
                            <textarea id="create-topic" rows="2" placeholder="例：現在完了形（経験・継続・完了）の基本問題" class="form-input w-full px-4 py-3 rounded-xl font-bold text-sm resize-none"></textarea>
                        </div>
                        <button onclick="startAIGeneration()" class="w-full py-4 rounded-xl bg-[var(--text-main)] text-white font-black text-sm hover:bg-[var(--text-dark)] hover:-translate-y-1 transition-all shadow-md">
                            問題を生成する
                        </button>
                    </div>
                </div>

                <!-- STEP 2: 生成中 -->
                <div id="create-step-loading" class="hidden py-12 text-center">
                    <i data-lucide="loader-2" class="w-10 h-10 text-[var(--accent-main)] animate-spin mx-auto mb-4"></i>
                    <h3 class="text-lg font-black text-[var(--text-main)] mb-2">AIが問題を考案中...</h3>
                    <div class="progress-bar-container max-w-xs mx-auto mt-4"><div id="progress-bar" class="progress-bar"></div></div>
                </div>

                <!-- STEP 3: エディタ（実用版） -->
                <div id="create-step-editor" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <div>
                            <h3 class="text-lg font-black text-[var(--text-main)] flex items-center gap-2">
                                <i data-lucide="edit-3" class="w-5 h-5 text-[var(--accent-main)]"></i>プリントエディタ
                            </h3>
                            <p class="text-xs font-bold text-[var(--text-muted)] mt-1">自由に文章を追加・修正できます。</p>
                        </div>
                        <button onclick="printDocument()" class="w-full md:w-auto px-6 py-3 bg-[var(--accent-main)] text-white font-black text-sm rounded-xl hover:bg-[var(--accent-dark)] shadow-sm flex items-center justify-center gap-2 transition-all">
                            <i data-lucide="printer" class="w-4 h-4"></i> 印刷 / PDF保存
                        </button>
                    </div>
                    
                    <!-- 編集エリア（textarea） -->
                    <textarea id="print-content-editor" class="w-full h-96 p-6 border-2 border-[var(--border-color)] rounded-xl bg-[#fcfcfc] print-editor focus:border-[var(--accent-main)] outline-none resize-y" spellcheck="false"></textarea>
                    
                    <p class="text-[10px] text-[var(--text-muted)] text-center mt-3">※印刷プレビュー時に不要なヘッダーなどは自動で消えます。</p>
                </div>

            </div>
        </div>

    </main>

    <!-- 印刷用にレンダリングされる隠し領域 -->
    <div id="print-render-area" style="display: none;"></div>

    <script>
        lucide.createIcons();

        /* ==========================================
           データと共通関数
        ========================================== */
        const MATERIALS = [
            { id: 1, type: 'junior', subject: '英語', title: '中3 英語 Unit2 現在完了形', tags: ['文法', '基本'] },
            { id: 2, type: 'junior', subject: '英語', title: '中3 英語 不規則動詞マスター表', tags: ['暗記', 'コツコツ'] },
            { id: 3, type: 'junior', subject: '数学', title: '中3 数学 展開と因数分解 100本ノック', tags: ['計算', '短期集中'] },
            { id: 4, type: 'junior', subject: '国語', title: '中3 国語 漢字の成り立ち（視覚プリント）', tags: ['漢字', '視覚派'] }
        ];

        function goHome() {
            document.getElementById('view-diagnosis').classList.add('hidden');
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            renderMaterials('all');
        }

        /* ==========================================
           教材一覧表示
        ========================================== */
        function switchTab(tab) {
            document.getElementById('tab-all').classList.toggle('active', tab === 'all');
            document.getElementById('tab-junior').classList.toggle('active', tab === 'junior');
            renderMaterials(tab);
        }

        function renderMaterials(filterTab) {
            const container = document.getElementById('learning-materials-container');
            container.innerHTML = '';
            
            const filtered = filterTab === 'all' ? MATERIALS : MATERIALS.filter(m => m.type === filterTab);
            
            filtered.forEach(item => {
                container.innerHTML += `
                    <div class="premium-card p-5 flex flex-col justify-between h-full cursor-pointer">
                        <div>
                            <span class="px-2 py-1 bg-[var(--bg-sub)] text-[var(--accent-dark)] text-[10px] font-black rounded-lg">${item.subject}</span>
                            <h3 class="text-base font-black text-[var(--text-main)] mt-3 leading-snug">${item.title}</h3>
                        </div>
                        <div class="mt-4 flex items-center justify-between">
                            <div class="flex gap-1">
                                ${item.tags.map(t => `<span class="text-[10px] text-[var(--text-muted)] font-bold border border-[var(--border-color)] px-2 rounded-md">#${t}</span>`).join('')}
                            </div>
                            <i data-lucide="arrow-right" class="w-4 h-4 text-[var(--text-light)]"></i>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        /* ==========================================
           勉強タイプ診断ロジック
        ========================================== */
        const quizData = [
            { q: "テスト勉強はいつから始める？", a: "A. 2週間前から計画的に", b: "B. 3日前から一気に集中" },
            { q: "英単語を覚える時、よくやるのは？", a: "A. 何度もノートに書く", b: "B. 見たり、声に出して読む" },
            { q: "問題集を解くなら？", a: "A. 基礎から順番に解きたい", b: "B. いきなり実践や過去問を解きたい" }
        ];
        
        let currentQ = 0;
        let answers = { A: 0, B: 0 };

        function openDiagnosis() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-diagnosis').classList.remove('hidden');
            currentQ = 0; answers = { A: 0, B: 0 };
            showQuiz();
        }

        function showQuiz() {
            if (currentQ >= quizData.length) { showDiagnosisResult(); return; }
            document.getElementById('quiz-progress').textContent = `質問 ${currentQ + 1} / 3`;
            document.getElementById('quiz-question').textContent = quizData[currentQ].q;
            document.getElementById('quiz-options').innerHTML = `
                <button onclick="answerQuiz('A')" class="w-full p-4 rounded-xl border-2 border-[var(--border-color)] hover:border-orange-400 hover:bg-orange-50 text-left font-bold text-[var(--text-main)] transition-all">${quizData[currentQ].a}</button>
                <button onclick="answerQuiz('B')" class="w-full p-4 rounded-xl border-2 border-[var(--border-color)] hover:border-orange-400 hover:bg-orange-50 text-left font-bold text-[var(--text-main)] transition-all">${quizData[currentQ].b}</button>
            `;
        }

        function answerQuiz(choice) {
            answers[choice]++;
            currentQ++;
            showQuiz();
        }

        function showDiagnosisResult() {
            goHome(); // ホームに戻して結果エリアを表示
            document.getElementById('recommend-area').classList.remove('hidden');
            
            let typeTitle, typeDesc, recItemIds;
            
            // 簡単な判定ロジック
            if (answers.A === 3) {
                typeTitle = "🐢 コツコツ堅実タイプ";
                typeDesc = "毎日少しずつ基礎を固めるのが得意。暗記系のまとめプリントが相性抜群です！";
                recItemIds = [2, 1];
            } else if (answers.B >= 2) {
                typeTitle = "🔥 短期集中・実践タイプ";
                typeDesc = "本番に強い直感派。ダラダラやらず、実践的な問題集で一気に解くのがおすすめです。";
                recItemIds = [3, 1];
            } else {
                typeTitle = "👀 視覚・バランスタイプ";
                typeDesc = "見て覚えるのが得意。図解やイラストが多いプリントを使うと理解が早まります。";
                recItemIds = [4, 1];
            }

            document.getElementById('diag-result-title').textContent = typeTitle;
            document.getElementById('diag-result-desc').textContent = typeDesc;

            const recHtml = recItemIds.map(id => {
                const item = MATERIALS.find(m => m.id === id);
                return `
                    <div class="bg-white p-4 rounded-xl border border-[var(--border-color)] flex items-center justify-between cursor-pointer hover:border-[var(--accent-main)]">
                        <div>
                            <span class="text-[9px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded font-black">おすすめ</span>
                            <h4 class="font-black text-sm mt-1 text-[var(--text-main)]">${item.title}</h4>
                        </div>
                        <i data-lucide="download" class="w-4 h-4 text-[var(--accent-main)]"></i>
                    </div>
                `;
            }).join('');
            
            document.getElementById('recommend-materials').innerHTML = recHtml;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* ==========================================
           AIプリントエディタ機能
        ========================================== */
        function openCreateView() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-create').classList.remove('hidden');
            
            // 状態リセット
            document.getElementById('create-step-1').classList.remove('hidden');
            document.getElementById('create-step-loading').classList.add('hidden');
            document.getElementById('create-step-editor').classList.add('hidden');
            document.getElementById('create-topic').value = '';
        }

        function startAIGeneration() {
            const topic = document.getElementById('create-topic').value;
            const subject = document.getElementById('create-subject').value;
            const grade = document.getElementById('create-grade').value;
            
            if(!topic) { alert('学習内容を入力してください'); return; }

            document.getElementById('create-step-1').classList.add('hidden');
            document.getElementById('create-step-loading').classList.remove('hidden');
            
            const bar = document.getElementById('progress-bar');
            setTimeout(() => { bar.style.width = '40%'; }, 500);
            setTimeout(() => { bar.style.width = '80%'; }, 1500);
            
            // 数秒後にエディタ画面へ移行し、ダミーの生成テキストを挿入
            setTimeout(() => {
                document.getElementById('create-step-loading').classList.add('hidden');
                document.getElementById('create-step-editor').classList.remove('hidden');
                
                const generatedText = generateMockContent(grade, subject, topic);
                document.getElementById('print-content-editor').value = generatedText;
            }, 2500);
        }

        // 入力内容に応じたモック文面を生成する関数
        function generateMockContent(grade, subject, topic) {
            const dateStr = new Date().toLocaleDateString('ja-JP');
            let content = `=================================\n${grade} ${subject} 基本確認プリント\nテーマ: ${topic}\n日付: ${dateStr}   名前: _______________\n=================================\n\n`;

            if (subject === '英語') {
                content += `【1】次の日本語を英語に直しなさい。\n(1) 私はずっと日本に住んでいます。\n    (                                          )\n(2) あなたは今までに富士山に登ったことがありますか。\n    (                                          )\n\n【2】( )内の動詞を適切な形にしなさい。\n(1) I have just ( finish ) my homework.\n(2) She has ( be ) busy since last week.\n\n【3】自由英作文\n今のあなたの状況について、現在完了形を使って1文書きなさい。\n    (                                          )\n\n`;
            } else if (subject === '数学') {
                content += `【1】次の式を展開しなさい。\n(1) (x + 3)(x + 5) =\n\n(2) (x - 4)^2 =\n\n(3) (a + b)(a - b) =\n\n【2】次の式を因数分解しなさい。\n(1) x^2 + 8x + 15 =\n\n(2) x^2 - 10x + 25 =\n\n(3) y^2 - 36 =\n\n`;
            } else {
                content += `【1】以下の問いに答えなさい。\n(1) ${topic}について、重要なキーワードを3つ書きなさい。\n    [          ]  [          ]  [          ]\n\n(2) そのキーワードを使って、内容を簡潔に説明しなさい。\n\n\n\n`;
            }
            content += `\n\n\n---\nPowered by タマベン AI (編集して使えます)`;
            return content;
        }

        // 印刷（PDF保存）の実行
        function printDocument() {
            const editorContent = document.getElementById('print-content-editor').value;
            const renderArea = document.getElementById('print-render-area');
            
            // 改行を維持したまま、印刷用領域にテキストをセット
            renderArea.textContent = editorContent;
            renderArea.style.display = 'block';
            
            // ブラウザの印刷ダイアログを呼び出し
            window.print();
            
            // 印刷ダイアログが閉じた後に表示を戻す
            renderArea.style.display = 'none';
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            renderMaterials('all');
        });
    </script>
</body>
</html>
