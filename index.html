<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root {
            --bg-main: #fcfaf7; /* ミルクティーベージュ */
            --brand-orange: #fb923c;
            --text-slate: #4a4a4a;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-slate);
            overflow-x: hidden;
        }

        /* 背景のゆったり動くカラーボブ */
        .blob {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(251, 146, 60, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 25s infinite alternate;
            pointer-events: none;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.1); }
        }

        .glass-header {
            background: rgba(252, 250, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* 柔らかいプレミアムカード */
        .soft-card {
            background: white;
            border-radius: 3rem;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 2px solid #f8f6f2;
        }
        .soft-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.06);
            border-color: #fb923c33;
        }

        /* 検索バーの質感 */
        .search-container {
            border: 2px solid #f1eee9;
            transition: all 0.4s ease;
        }
        .search-container:focus-within {
            border-color: var(--brand-orange);
            box-shadow: 0 10px 40px -10px rgba(251, 146, 60, 0.15);
            background: white;
        }

        /* タブ */
        .tab-btn {
            position: relative;
            transition: all 0.3s ease;
            font-weight: 900;
        }
        .tab-btn.active {
            background: white;
            color: var(--brand-orange);
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        /* アニメーション：ふわっと登場 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <!-- 背景アニメーション -->
    <div class="blob" style="top: -200px; left: -100px;"></div>
    <div class="blob" style="bottom: -200px; right: -100px; animation-delay: -5s; background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, rgba(255, 255, 255, 0) 70%);"></div>

    <!-- ヘッダー -->
    <header class="sticky top-0 z-[100] glass-header border-b-2 border-orange-50/50">
        <div class="container mx-auto px-6 h-20 md:h-28 flex items-center justify-between max-w-7xl">
            <!-- ロゴ -->
            <button onclick="location.reload()" class="active:scale-95 transition-all">
                <img src="logo.svg" alt="タマベン" class="h-12 md:h-20 w-auto">
            </button>

            <!-- 右側アクション -->
            <div class="flex items-center gap-4">
                <div id="grade-badge" class="hidden md:flex flex-col items-end mr-2">
                    <span class="text-[10px] font-black text-orange-300 uppercase tracking-[0.2em] leading-none mb-1">Your Grade</span>
                    <span id="user-grade-label" class="text-sm font-black text-slate-500">未設定</span>
                </div>
                <button onclick="openSettingsModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border-2 border-orange-50 shadow-sm hover:bg-orange-400 group transition-all">
                    <i data-lucide="user" class="w-5 h-5 text-orange-400 group-hover:text-white transition-colors"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 max-w-6xl pb-32">
        
        <!-- ヒーロー & 検索 -->
        <section class="py-16 md:py-32 text-center reveal">
            <h1 class="text-4xl md:text-7xl font-black mb-8 tracking-tight text-slate-800 leading-[1.2]">
                学びを、もっと<br/>
                <span class="inline-block px-6 py-1 bg-orange-100 text-orange-500 rounded-[2rem] rotate-[-2deg] shadow-sm">自由に。</span>
            </h1>
            <p class="text-slate-400 font-bold text-lg md:text-2xl max-w-2xl mx-auto leading-relaxed">
                自分にぴったりの「わかった！」を、<br class="hidden md:block">一緒に見つけにいこう。
            </p>
            
            <!-- 検索バー（詳細・抽象・キーワードすべてに対応） -->
            <div class="mt-16 max-w-2xl mx-auto relative">
                <div class="search-container flex items-center bg-white/60 rounded-[2.5rem] px-10 py-6">
                    <i data-lucide="search" class="w-6 h-6 text-orange-200 mr-4"></i>
                    <input type="text" id="search-input" placeholder="漢字、計算、歴史、1年生、図形..." class="w-full bg-transparent outline-none font-bold text-slate-700 placeholder:text-slate-200 text-lg">
                </div>
                
                <!-- クイックキーワードタグ -->
                <div class="flex flex-wrap justify-center gap-2 mt-8">
                    <button onclick="quickSearch('計算')" class="px-5 py-2 rounded-full bg-white border border-orange-50 text-[11px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#計算</button>
                    <button onclick="quickSearch('漢字')" class="px-5 py-2 rounded-full bg-white border border-orange-50 text-[11px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#漢字</button>
                    <button onclick="quickSearch('生き物')" class="px-5 py-2 rounded-full bg-white border border-orange-50 text-[11px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#生き物</button>
                    <button onclick="quickSearch('テスト')" class="px-5 py-2 rounded-full bg-white border border-orange-50 text-[11px] font-black text-slate-400 hover:bg-orange-400 hover:text-white transition-all shadow-sm">#テスト対策</button>
                </div>
            </div>
        </section>

        <!-- アプリ紹介バナー -->
        <section class="mb-24 reveal">
            <a href="manabi.html" class="group block relative bg-indigo-500 rounded-[3.5rem] overflow-hidden shadow-2xl shadow-indigo-100 active:scale-[0.98] transition-all">
                <div class="flex flex-col md:flex-row items-center justify-between p-10 md:p-16 gap-10">
                    <div class="text-center md:text-left">
                        <span class="px-4 py-1.5 bg-white/20 text-white text-[10px] font-black rounded-full mb-6 uppercase tracking-[0.2em] inline-block">Official Support App</span>
                        <h2 class="text-4xl md:text-5xl font-black text-white mb-6 leading-tight">Manabi Baton</h2>
                        <p class="text-indigo-50 font-bold mb-8 text-lg">がんばりをバトンのように。やる気を引き出す専用アプリ。</p>
                        <span class="inline-flex items-center gap-3 bg-white text-indigo-600 px-8 py-4 rounded-[1.5rem] font-black text-sm group-hover:gap-6 transition-all">
                            アプリを見る <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </span>
                    </div>
                    <img src="manabi.png" alt="MB" class="w-32 h-32 md:w-48 md:h-48 rounded-[3rem] shadow-2xl border-4 border-white/20 group-hover:scale-105 group-hover:rotate-6 transition-transform duration-700">
                </div>
            </a>
        </section>

        <!-- 学年ナビ（タブ切り替え） -->
        <div class="sticky top-24 md:top-32 z-40 mb-16 flex justify-center reveal">
            <div class="inline-flex bg-white/60 p-2 rounded-[2.2rem] border-2 border-orange-50 backdrop-blur-md shadow-sm">
                <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-btn active px-12 py-4 rounded-[1.8rem] text-sm">小学生</button>
                <button onclick="switchTab('junior')" id="tab-junior" class="tab-btn px-12 py-4 rounded-[1.8rem] text-sm">中学生</button>
            </div>
        </div>

        <!-- 教材一覧グリッド（script.jsにより描画） -->
        <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 mb-20">
            <!-- 教材カードがここに並びます -->
        </div>

    </main>

    <!-- フッター -->
    <footer class="bg-white/50 border-t-2 border-orange-50 py-24 text-center">
        <img src="logo.svg" alt="タマベン" class="h-12 mx-auto mb-10 opacity-30 grayscale hover:opacity-100 hover:grayscale-0 transition-all duration-700">
        <p class="text-[10px] text-slate-300 font-black tracking-[0.3em] uppercase">
            &copy; 2026 Tamaben. Made with Love for every learner.
        </p>
    </footer>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/10 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-500">
        <div class="bg-white rounded-[3.5rem] p-12 w-full max-w-sm shadow-2xl transform scale-90 transition-transform duration-500">
            <div class="text-center">
                <div class="w-20 h-20 bg-orange-50 rounded-[2.2rem] flex items-center justify-center mx-auto mb-8">
                    <i data-lucide="sparkles" class="w-10 h-10 text-orange-400"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-800 mb-2">学年の設定</h3>
                <p class="text-xs text-slate-400 font-bold mb-10">生年月日を入力してね</p>
                <input type="date" id="birthdate-input" class="w-full px-6 py-5 rounded-2xl bg-slate-50 border-2 border-orange-50 outline-none font-black text-center mb-10 focus:border-orange-200 transition-all">
                <button onclick="saveBirthDate()" class="w-full py-5 bg-orange-400 text-white rounded-2xl font-black shadow-lg shadow-orange-100 active:scale-95 hover:bg-orange-500 transition-all">保存して適用</button>
                <button onclick="closeSettingsModal()" class="mt-8 text-xs font-black text-slate-300 hover:text-slate-500 transition-colors">閉じる</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();
        
        // スクロール時のフェードイン演出
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;

        // クイックキーワード検索機能
        function quickSearch(word) {
            const input = document.getElementById('search-input');
            if (input) {
                input.value = word;
                renderMaterials(); // script.js内の関数
                document.getElementById('learning-materials-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        // モーダル制御
        function openSettingsModal() {
            const m = document.getElementById('settings-modal');
            m.classList.remove('pointer-events-none', 'opacity-0');
            m.querySelector('div').classList.remove('scale-90');
        }
        function closeSettingsModal() {
            const m = document.getElementById('settings-modal');
            m.classList.add('pointer-events-none', 'opacity-0');
            m.querySelector('div').classList.add('scale-90');
        }
    </script>
</body>
</html>
