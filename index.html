<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }

        /* アニメーションとインタラクションの安定化 */
        .logo-hover { transition: transform 0.2s ease-in-out; }
        .logo-hover:hover { transform: scale(1.02); }
        
        /* モーダル表示用クラス (script.jsから制御) */
        .modal-visible { opacity: 1 !important; pointer-events: auto !important; }
        .modal-visible > div { transform: scale(1) !important; }
    </style>
</head>
<body class="min-h-screen font-['Zen_Maru_Gothic'] text-slate-700 relative transition-colors duration-1000 overflow-x-hidden bg-slate-50 selection:bg-emerald-200 selection:text-emerald-900">

    <!-- 背景レイヤー (最背面) -->
    <div id="sky-background" class="fixed inset-0 -z-50 pointer-events-none transition-colors duration-[3000ms]">
        <div id="stars" class="absolute inset-0 opacity-0 transition-opacity duration-1000"></div>
        <div id="clouds" class="absolute inset-0 opacity-30"></div>
    </div>

    <!-- 誕生日演出 (最前面) -->
    <div id="birthday-overlay" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-md pointer-events-none opacity-0 transition-opacity duration-1000">
        <div id="birthday-content" class="text-center text-white transform scale-0 transition-transform duration-700 p-6 bg-white/10 rounded-[3rem] border border-white/20 shadow-2xl">
            <div class="mb-6 animate-bounce">
                <i data-lucide="cake" class="w-24 h-24 md:w-32 md:h-32 text-pink-400 drop-shadow-lg mx-auto"></i>
            </div>
            <h1 class="text-4xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 mb-4 filter drop-shadow-sm">HAPPY BIRTHDAY!</h1>
            <p class="text-lg md:text-2xl font-bold text-white/90 mb-8">素敵な1年になりますように！</p>
            <button onclick="closeBirthdayMode()" class="pointer-events-auto px-10 py-4 bg-white text-pink-500 rounded-full font-black text-lg shadow-xl hover:scale-105 transition-transform">ありがとう！</button>
        </div>
    </div>

    <!-- ヘッダー (固定) -->
    <header class="sticky top-0 z-[100] glass-header border-b border-slate-200/50 transition-colors duration-500 shadow-sm">
        <div class="container mx-auto px-4 lg:px-8 h-16 md:h-20 flex items-center justify-between max-w-6xl">
            
            <!-- ロゴエリア (左) -->
            <button onclick="goHome()" class="flex items-center transition-transform active:scale-95 py-2">
                <div class="w-28 md:w-36 lg:w-40 flex items-center justify-center">
                    <img src="logo.svg" alt="タマベン" class="w-full h-auto logo-hover">
                </div>
            </button>

            <!-- アクションエリア (右) -->
            <div class="flex items-center gap-2 md:gap-4">
                <!-- 学年表示バッジ -->
                <div id="current-grade-badge" class="hidden px-3 py-1.5 rounded-full border border-emerald-100 bg-emerald-50 text-emerald-600 text-[10px] md:text-xs font-bold items-center gap-1.5 shadow-sm">
                    <i data-lucide="check-circle" class="w-3.5 h-3.5"></i>
                    <span id="user-grade-label"></span>
                </div>
                <!-- 設定ボタン -->
                <button onclick="openSettingsModal()" class="flex items-center gap-2 px-3 py-2 md:px-4 md:py-2.5 rounded-full bg-white border border-slate-200 shadow-sm hover:border-emerald-300 hover:text-emerald-600 hover:shadow-md transition-all group relative z-[110]">
                    <i data-lucide="user-cog" class="w-4 h-4 text-slate-400 group-hover:text-emerald-500 transition-colors"></i>
                    <span class="text-xs font-black text-slate-600 group-hover:text-emerald-600">設定</span>
                </button>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="container mx-auto px-4 py-8 pb-32 relative z-10 max-w-5xl">
        
        <!-- ホーム画面 -->
        <div id="view-home" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
            
            <!-- ヒーローセクション -->
            <section id="hero-section" class="relative rounded-[2.5rem] overflow-hidden bg-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8 md:p-14 text-center md:text-left mb-12 flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="absolute inset-0 bg-gradient-to-br from-slate-50 via-white to-emerald-50/30"></div>
                <div class="relative z-10 max-w-2xl">
                    <div class="inline-flex items-center gap-2 bg-white px-4 py-1.5 rounded-full text-[10px] md:text-xs font-bold mb-6 border border-slate-100 shadow-sm text-emerald-600">
                        <i data-lucide="book-open" class="w-4 h-4"></i> <span id="season-name"></span>の学びを応援
                    </div>
                    <h1 class="text-3xl md:text-5xl lg:text-6xl font-black mb-6 leading-[1.2] tracking-tight text-slate-800">
                        寄り添う、<br/>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-400">やさしい学び。</span>
                    </h1>
                    <p class="text-slate-500 font-medium text-sm md:text-lg mb-0 leading-relaxed">
                        ひとりひとりのペースを大切に。今日も、新しい発見を見つけにいこう。
                    </p>
                </div>
                <div class="relative z-10 w-32 h-32 md:w-56 md:h-56 hidden md:flex items-center justify-center">
                    <div class="w-full h-full bg-white rounded-[2.5rem] flex items-center justify-center border border-slate-100 shadow-xl transition-transform hover:rotate-2 duration-500">
                        <i id="main-season-icon" class="text-emerald-400 w-16 h-16 md:w-24 md:h-24"></i>
                    </div>
                </div>
            </section>

            <!-- アプリ一覧 -->
            <section class="mb-12">
                <div class="flex items-center gap-3 mb-6 text-slate-800">
                    <i data-lucide="smartphone" class="w-6 h-6 text-indigo-500"></i>
                    <h3 class="text-xl font-bold tracking-tight">学習サポートアプリ</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <a href="manabi.html" class="group bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:border-indigo-200 hover:shadow-lg transition-all">
                        <div class="flex items-center gap-4 mb-4">
                            <img src="manabi.png" alt="MB" class="w-14 h-14 rounded-2xl shadow-sm border border-slate-50">
                            <div>
                                <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Official</span>
                                <h4 class="font-black text-lg group-hover:text-indigo-600 transition-colors leading-none mt-1">Manabi Baton</h4>
                            </div>
                        </div>
                        <p class="text-sm text-slate-500 leading-relaxed">日々の学習記録をバトンのようにつなぐ学習管理アプリです。</p>
                    </a>
                </div>
            </section>

            <!-- 学年切り替えタブ -->
            <div class="flex justify-center mb-10 sticky top-[5.5rem] z-40">
                <div class="inline-flex bg-white/90 p-1.5 rounded-2xl backdrop-blur-xl border border-slate-200 shadow-sm w-full max-w-sm">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-active flex-1 py-3 rounded-xl text-sm font-black transition-all">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="tab-inactive flex-1 py-3 rounded-xl text-sm font-black transition-all">中学生</button>
                </div>
            </div>

            <!-- 教材コンテナ -->
            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-20">
                <!-- script.jsによって中身が生成されます -->
            </div>
        </div>

        <!-- 詳細画面 -->
        <div id="view-detail" class="hidden animate-in slide-in-from-right-8 duration-500">
            <button onclick="goHome()" class="mb-6 flex items-center gap-2 text-slate-500 font-bold bg-white px-5 py-2.5 rounded-full border border-slate-200 shadow-sm hover:text-emerald-600 hover:bg-slate-50 transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 教材一覧に戻る
            </button>
            <div id="detail-card" class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 shadow-xl">
                <!-- script.jsによって詳細が描画されます -->
            </div>
        </div>

    </main>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 p-4">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300 border border-slate-100">
            <div class="flex justify-end mb-2">
                <button onclick="closeSettingsModal()" class="p-2 rounded-full bg-slate-50 hover:bg-slate-100 text-slate-400 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-emerald-500 border border-emerald-100">
                    <i data-lucide="baby" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-black text-slate-800">学年の設定</h3>
                <p class="text-xs text-slate-500 mt-2 font-medium">生年月日を登録すると<br>おすすめ教材が表示されます</p>
            </div>
            <div class="space-y-5">
                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                    <label class="block text-xs font-bold text-slate-600 mb-2">生年月日</label>
                    <input type="date" id="birthdate-input" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none font-bold text-slate-700 text-center transition-all" />
                </div>
                <button onclick="saveBirthDate()" class="w-full py-4 rounded-xl font-black text-white bg-emerald-500 hover:bg-emerald-600 shadow-lg transition-all active:scale-95">
                    保存する
                </button>
                <button onclick="clearBirthDate()" class="w-full text-xs text-slate-400 hover:text-red-500 font-bold transition-colors">
                    情報を削除する
                </button>
            </div>
        </div>
    </div>

    <!-- フッター -->
    <footer class="bg-white border-t border-slate-200/60 py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="inline-flex items-center justify-center mb-6">
                <img src="logo.svg" alt="タマベン" class="h-8 md:h-10 w-auto grayscale opacity-30 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
            </div>
            <p class="text-[10px] md:text-xs text-slate-400 font-bold tracking-widest uppercase">
                &copy; 2026 Tamaben. All Rights Reserved.
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();
        
        // モーダルの開閉機能（script.jsにない場合のための予備実装）
        function openSettingsModal() {
            const modal = document.getElementById('settings-modal');
            modal.classList.add('modal-visible');
        }
        function closeSettingsModal() {
            const modal = document.getElementById('settings-modal');
            modal.classList.remove('modal-visible');
        }
    </script>
</body>
</html>
