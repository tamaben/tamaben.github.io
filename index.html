<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen font-['Zen_Maru_Gothic'] text-slate-700 relative transition-colors duration-1000 overflow-x-hidden bg-slate-50 selection:bg-emerald-200 selection:text-emerald-900">

    <!-- 背景レイヤー -->
    <div id="sky-background" class="fixed inset-0 -z-20 transition-colors duration-[3000ms]">
        <div id="stars" class="absolute inset-0 opacity-0 transition-opacity duration-1000"></div>
        <div id="clouds" class="absolute inset-0 opacity-40"></div>
    </div>

    <!-- 誕生日演出 -->
    <div id="birthday-overlay" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-md pointer-events-none opacity-0 transition-opacity duration-1000">
        <div id="birthday-content" class="text-center text-white transform scale-0 transition-transform duration-700 p-6 bg-white/10 rounded-[3rem] border border-white/20 shadow-2xl">
            <div class="mb-6 animate-bounce">
                <i data-lucide="cake" class="w-24 h-24 md:w-32 md:h-32 text-pink-400 drop-shadow-lg mx-auto"></i>
            </div>
            <h1 class="text-4xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 mb-4 filter drop-shadow-sm">HAPPY BIRTHDAY!</h1>
            <p class="text-lg md:text-2xl font-bold text-white/90 mb-8">素敵な1年になりますように！</p>
            <button onclick="closeBirthdayMode()" class="pointer-events-auto px-10 py-4 bg-white text-pink-500 rounded-full font-black text-lg shadow-xl hover:scale-105 transition-transform">ありがとう！</button>
        </div>
    </div>

    <!-- ヘッダー -->
    <header class="sticky top-0 z-50 glass-header border-b border-slate-200/50 transition-colors duration-500 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.02)]">
        <div class="container mx-auto px-4 lg:px-8 h-16 md:h-20 flex items-center justify-between max-w-6xl">
            <button onclick="goHome()" class="flex items-center gap-3 group transition-transform active:scale-95">
                <div class="relative">
                    <div id="logo-glow" class="absolute inset-0 rounded-xl blur opacity-0 group-hover:opacity-40 transition-opacity bg-emerald-400"></div>
                    <div class="relative bg-white p-1.5 rounded-xl border border-slate-100 shadow-sm">
                        <!-- 【修正】外部ファイル logo.svg を読み込む形式に変更 -->
                        <div id="header-logo-wrapper" class="w-28 md:w-40 flex items-center justify-center">
                            <img src="logo.svg" alt="タマベン" class="w-full h-auto drop-shadow-sm">
                        </div>
                    </div>
                </div>
            </button>

            <div class="flex items-center gap-3">
                <div id="current-grade-badge" class="hidden px-3 py-1.5 rounded-full border border-emerald-100 bg-emerald-50 text-emerald-600 text-xs font-bold items-center gap-1.5 shadow-sm">
                    <i data-lucide="check-circle" class="w-3.5 h-3.5"></i>
                    <span id="user-grade-label"></span>
                </div>
                <button onclick="openSettingsModal()" class="flex items-center gap-2 px-3 py-2 rounded-full bg-white border border-slate-200 shadow-sm hover:border-emerald-300 hover:text-emerald-600 hover:shadow-md transition-all group">
                    <i data-lucide="user-cog" class="w-4 h-4 text-slate-400 group-hover:text-emerald-500 transition-colors"></i>
                    <span class="text-xs font-bold text-slate-600 group-hover:text-emerald-600 hidden md:inline">設定</span>
                </button>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="container mx-auto px-4 py-8 pb-32 relative z-10 max-w-5xl">
        
        <!-- ホーム画面 -->
        <div id="view-home" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
            
            <!-- ヒーローセクション -->
            <section id="hero-section" class="relative rounded-[2.5rem] overflow-hidden bg-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8 md:p-14 text-center md:text-left transition-all duration-1000 mb-12 flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="absolute inset-0 bg-gradient-to-br from-slate-50 via-white to-emerald-50/30"></div>
                <div class="absolute -top-20 -right-20 w-64 h-64 bg-emerald-100/40 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-blue-100/40 rounded-full blur-3xl"></div>

                <div class="relative z-10 max-w-2xl">
                    <div class="inline-flex items-center gap-2 bg-white px-4 py-1.5 rounded-full text-xs font-bold mb-6 border border-slate-100 shadow-sm text-emerald-600">
                        <i data-lucide="book-open" class="w-4 h-4"></i> 
                        <span id="season-name"></span>の学びを応援
                    </div>
                    <h1 class="text-3xl md:text-5xl lg:text-6xl font-black mb-6 leading-[1.2] tracking-tight text-slate-800">
                        寄り添う、<br/>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-400">やさしい学び。</span>
                    </h1>
                    <p class="text-slate-500 font-medium text-sm md:text-lg mb-0 leading-relaxed">
                        ひとりひとりのペースを大切に。<br class="hidden md:block">
                        今日も、新しい発見を見つけにいこう。
                    </p>
                </div>
                <div class="relative z-10 w-32 h-32 md:w-56 md:h-56 flex-shrink-0 hidden md:flex items-center justify-center">
                    <div class="absolute inset-0 bg-gradient-to-tr from-emerald-100 to-teal-50 rounded-[2.5rem] rotate-6"></div>
                    <div class="w-full h-full bg-white rounded-[2.5rem] -rotate-3 flex items-center justify-center border border-slate-100 shadow-xl transition-transform hover:rotate-0 duration-500">
                        <i id="main-season-icon" class="text-emerald-400 w-16 h-16 md:w-24 md:h-24 drop-shadow-sm"></i>
                    </div>
                </div>
            </section>

            <!-- アプリ一覧 -->
            <section id="apps-section" class="mb-12">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500">
                        <i data-lucide="smartphone" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl md:text-2xl font-bold text-slate-800 tracking-tight">学習サポートアプリ</h3>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <a href="manabi.html" class="group relative bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:border-indigo-200 hover:shadow-lg transition-all duration-300 flex flex-col justify-between overflow-hidden">
                        <div class="absolute -right-8 -top-8 w-32 h-32 bg-indigo-50 rounded-full blur-2xl group-hover:bg-indigo-100 transition-colors"></div>
                        <div class="relative z-10 flex items-start gap-4 mb-4">
                            <div class="w-16 h-16 rounded-2xl overflow-hidden shadow-sm border border-slate-100 bg-white group-hover:scale-105 transition-transform duration-300 flex-shrink-0">
                                <img src="manabi.png" alt="Manabi Baton" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1 pt-1">
                                <span class="px-2 py-0.5 rounded-md bg-indigo-50 text-indigo-600 font-bold text-[10px] tracking-wider">公式アプリ</span>
                                <h4 class="text-lg font-black text-slate-800 group-hover:text-indigo-600 transition-colors">Manabi Baton</h4>
                            </div>
                        </div>
                        <p class="relative z-10 text-sm text-slate-500 font-medium leading-relaxed mb-4">日々の学習記録をバトン。モチベーションを維持するための学習管理アプリです。</p>
                        <div class="relative z-10 flex items-center text-indigo-500 font-bold text-sm gap-1.5 group-hover:gap-2.5 transition-all">
                            <span>アプリを見る</span>
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </div>
                    </a>
                </div>
            </section>

            <!-- タブ切り替え -->
            <div class="flex justify-center mb-8 sticky top-[5rem] z-40">
                <div class="inline-flex bg-white/80 p-1.5 rounded-2xl backdrop-blur-xl border border-slate-200 shadow-sm w-full max-w-sm">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-active flex-1 py-3 rounded-xl text-sm font-bold transition-all flex justify-center items-center gap-2">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="tab-inactive flex-1 py-3 rounded-xl text-sm font-bold transition-all flex justify-center items-center gap-2">中学生</button>
                </div>
            </div>

            <!-- 教材コンテナ -->
            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-20">
                <!-- JSで挿入 -->
            </div>

        </div>

        <!-- 詳細画面 (構造のみ) -->
        <div id="view-detail" class="hidden animate-in slide-in-from-right-8 duration-500">
            <button onclick="goHome()" class="mb-4 flex items-center gap-2 text-slate-500 font-bold bg-white px-5 py-2.5 rounded-full border border-slate-200 shadow-sm hover:text-emerald-600 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 教材一覧へ戻る
            </button>
            <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 shadow-xl">
                <div id="detail-header" class="p-12 text-center text-white bg-emerald-500 transition-colors">
                    <h1 id="detail-title" class="text-3xl md:text-5xl font-black drop-shadow-sm"></h1>
                </div>
                <div class="p-8 bg-slate-50/50" id="detail-content">
                    <!-- JSで詳細を挿入 -->
                </div>
            </div>
        </div>

    </main>

    <!-- フッター -->
    <footer class="bg-white border-t border-slate-200/60 py-10 mt-10">
        <div class="container mx-auto px-4 text-center">
            <!-- 【修正】フッターも外部ロゴ読み込みに変更 -->
            <div class="inline-flex items-center justify-center mb-4">
                <img src="logo.svg" alt="タマベン" class="h-8 w-auto grayscale opacity-50">
            </div>
            <p class="text-xs text-slate-400 font-medium">
                &copy; 2026 Tamaben. All Rights Reserved.
            </p>
        </div>
    </footer>

    <!-- JS読み込み -->
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
