<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-base: #fefaf6; /* ミルクティーベージュ */
            --text-main: #5d5752;
            --accent-peach: #f9dcc4;
            --accent-mint: #d8e2dc;
        }
        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; font-feature-settings: "palt"; }
        .glass-nav { background: rgba(254, 250, 246, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(93, 87, 82, 0.05); }
        .premium-card { background: white; border-radius: 2.2rem; transition: all 0.5s ease; border: 1.5px solid #f8f3ef; }
        .premium-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(93, 87, 82, 0.05); }
        .search-field { background: white; border: 1.5px solid #ece4de; transition: all 0.3s ease; }
        .tab-pill { transition: all 0.3s ease; color: #bcaea3; font-weight: 900; }
        .tab-pill.active { background: white; color: #5d5752; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        #settings-modal { opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 200; }
        #settings-modal.active { opacity: 1; pointer-events: auto; }
        .btn-disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body class="font-['Zen_Maru_Gothic']">

    <!-- ヘッダー -->
    <header class="sticky top-0 z-[100] glass-nav">
        <div class="container mx-auto px-6 h-16 md:h-20 flex items-center justify-between max-w-6xl">
            <button onclick="goHome()" class="active:scale-95 transition-all">
                <img src="logo.svg" alt="タマベン" class="h-8 md:h-10 w-auto">
            </button>
            <div class="flex items-center gap-4">
                <!-- ここが「未設定」から変わる部分 -->
                <div id="grade-badge" class="flex flex-col items-end mr-1">
                    <span class="text-[9px] font-black text-[#bcaea3] uppercase tracking-widest leading-none mb-1">Status</span>
                    <span id="user-grade-label" class="text-[11px] font-black text-[#5d5752]">未設定</span>
                </div>
                <button onclick="openSettingsModal()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white border border-[#ece4de] shadow-sm">
                    <i data-lucide="user" class="w-4 h-4 text-[#bcaea3]"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 max-w-5xl pb-32">
        <div id="view-home">
            <section class="py-16 md:py-24 text-center">
                <h1 class="text-3xl md:text-5xl font-black mb-8 text-[#4a4541]">学びを、もっと<br><span class="inline-block px-4 py-1 bg-white text-[#d4a373] rounded-full shadow-sm border border-[#f5ebe0] my-2 rotate-[-1deg]">自由に。</span></h1>
                <div class="mt-8 max-w-lg mx-auto">
                    <div class="search-field flex items-center rounded-full px-8 py-4">
                        <i data-lucide="search" class="w-5 h-5 text-[#d8c8bd] mr-4"></i>
                        <input type="text" id="search-input" placeholder="例：計算、漢字、1年生..." class="w-full bg-transparent outline-none font-bold text-sm">
                    </div>
                </div>
            </section>

            <div class="sticky top-20 z-40 mb-12 flex justify-center">
                <div class="inline-flex bg-[#f2f1ee]/80 p-1.5 rounded-full border border-white backdrop-blur-md">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-pill active px-10 py-3 rounded-full text-xs">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="tab-pill px-10 py-3 rounded-full text-xs">中学生</button>
                </div>
            </div>

            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="view-detail" class="hidden py-12">
            <button onclick="goHome()" class="flex items-center gap-2 text-[#bcaea3] font-black mb-8"><i data-lucide="chevron-left"></i> 戻る</button>
            <div id="detail-content" class="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-[#f5ebe0] min-h-[400px]"></div>
        </div>
    </main>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 flex items-center justify-center bg-black/5 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-sm shadow-2xl text-center">
            <h3 class="text-lg font-black text-[#5d5752] mb-2">学年の設定</h3>
            <p class="text-[10px] text-[#bcaea3] font-bold mb-8">生年月日を入力すると学年を自動判定します</p>
            <input type="date" id="birthdate-input" class="w-full px-6 py-4 rounded-2xl bg-[#faf6f2] border border-[#ece4de] outline-none font-bold text-center mb-8 text-sm">
            <div class="space-y-3">
                <button onclick="saveBirthDate()" class="w-full py-4 bg-[#5d5752] text-white rounded-2xl font-black text-sm active:scale-95">保存する</button>
                <button onclick="clearBirthDate()" class="w-full py-2 text-[#bcaea3] text-[10px] font-black">設定をリセット</button>
            </div>
            <button onclick="closeSettingsModal()" class="mt-6 text-[10px] font-black text-[#dcd0c6]">閉じる</button>
        </div>
    </div>

    <script>
        let MATERIAL_DATA = [];
        let currentTab = 'elementary';

        // --- 1. 学年計算ロジック (日本の年度：4月1日区切りに対応) ---
        function calculateGrade(birthStr) {
            if (!birthStr) return null;
            const birthDate = new Date(birthStr);
            const today = new Date();
            
            // 現在の年度（4月始まり）
            let currentYear = today.getFullYear();
            if (today.getMonth() < 3) currentYear--; // 1~3月なら前年度

            // 入学年度の計算（満6歳になった直後の4月）
            let birthYear = birthDate.getFullYear();
            let birthMonth = birthDate.getMonth() + 1;
            let birthDay = birthDate.getDate();

            // 4/2生まれから翌年4/1生まれまでが同級生
            let schoolStartYear = (birthMonth > 4 || (birthMonth === 4 && birthDay >= 2)) ? birthYear + 7 : birthYear + 6;
            
            let gradeNum = currentYear - schoolStartYear + 1;

            if (gradeNum >= 1 && gradeNum <= 6) return { type: 'elementary', label: `小学${gradeNum}年生` };
            if (gradeNum >= 7 && gradeNum <= 9) return { type: 'junior', label: `中学${gradeNum - 6}年生` };
            return { type: 'other', label: '対象外' };
        }

        // --- 2. 設定の保存と適用 ---
        function saveBirthDate() {
            const dateVal = document.getElementById('birthdate-input').value;
            if (!dateVal) {
                alert("日付を入力してください");
                return;
            }
            localStorage.setItem('tamaben_birthdate', dateVal);
            applyUserGrade(dateVal); // 画面を更新
            closeSettingsModal();
        }

        function clearBirthDate() {
            localStorage.removeItem('tamaben_birthdate');
            document.getElementById('user-grade-label').textContent = "未設定";
            document.getElementById('birthdate-input').value = "";
            location.reload();
        }

        function applyUserGrade(dateStr) {
            const result = calculateGrade(dateStr);
            const label = document.getElementById('user-grade-label');
            if (result) {
                label.textContent = result.label;
                if (result.type === 'elementary' || result.type === 'junior') {
                    currentTab = result.type;
                    switchTab(currentTab); // 自動でタブを切り替える
                }
            }
        }

        // --- 3. データの読み込みと描画 ---
        async function loadData() {
            try {
                const res = await fetch('data.json');
                MATERIAL_DATA = await res.json();
                renderMaterials();
            } catch (e) { console.error("Data Load Error"); }
        }

        function renderMaterials() {
            const container = document.getElementById('learning-materials-container');
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = MATERIAL_DATA.filter(item => {
                const matchTab = item.tab === currentTab;
                const matchText = item.title.toLowerCase().includes(query) || item.tags.some(t => t.includes(query));
                return matchTab && (query === "" || matchText);
            });

            container.innerHTML = filtered.map(item => `
                <div onclick='openDetail(${JSON.stringify(item)})' class="premium-card p-10 cursor-pointer group">
                    <div class="flex items-center gap-2 mb-4 text-[10px] font-black uppercase text-[#bcaea3]">
                        <span>${item.subject}</span> / <span>${item.grade}</span>
                    </div>
                    <h3 class="text-xl font-black text-[#5d5752] group-hover:text-[#d4a373] transition-colors">${item.title}</h3>
                </div>
            `).join('');
            if(filtered.length === 0) container.innerHTML = `<p class="col-span-full text-center py-20 text-[#dcd0c6] font-black">教材は準備中です</p>`;
            lucide.createIcons();
        }

        // --- 4. UI制御 ---
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-elementary').classList.toggle('active', tab === 'elementary');
            document.getElementById('tab-junior').classList.toggle('active', tab === 'junior');
            renderMaterials();
        }

        function openDetail(item) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            const hasBasic = item.pdfBasic && item.pdfBasic.startsWith('print/');
            const hasAdv = item.pdfAdv && item.pdfAdv.startsWith('print/');
            const hasAns = item.pdfAns && item.pdfAns.startsWith('print/');

            document.getElementById('detail-content').innerHTML = `
                <div class="p-12 md:p-24 text-center">
                    <h2 class="text-3xl md:text-5xl font-black text-[#5d5752] mb-12">${item.title}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                        <button onclick="${hasBasic ? `window.open('${item.pdfBasic}')` : ''}" class="p-8 rounded-[2rem] font-black border ${hasBasic ? 'bg-[#faf6f2] border-[#ece4de]' : 'btn-disabled bg-stone-50'}">${hasBasic ? '基本問題' : '基本は準備中'}</button>
                        <button onclick="${hasAdv ? `window.open('${item.pdfAdv}')` : ''}" class="p-8 rounded-[2rem] font-black border ${hasAdv ? 'bg-white border-[#f5ebe0]' : 'btn-disabled bg-stone-50'}">${hasAdv ? '応用問題' : '応用は準備中'}</button>
                        <button onclick="${hasAns ? `window.open('${item.pdfAns}')` : ''}" class="md:col-span-2 p-6 rounded-[2rem] font-black ${hasAns ? 'bg-[#5d5752] text-white' : 'btn-disabled bg-stone-100 text-stone-400'}">${hasAns ? '解答を確認' : '解答は準備中'}</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function goHome() { document.getElementById('view-home').classList.remove('hidden'); document.getElementById('view-detail').classList.add('hidden'); }
        function openSettingsModal() { document.getElementById('settings-modal').classList.add('active'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('active'); }

        // --- 5. 初期化処理 ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('search-input').oninput = renderMaterials;
            
            // 保存された設定を読み込む
            const savedDate = localStorage.getItem('tamaben_birthdate');
            if (savedDate) {
                document.getElementById('birthdate-input').value = savedDate;
                applyUserGrade(savedDate);
            }
            loadData();
        });
    </script>
</body>
</html>
