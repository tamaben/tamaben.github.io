<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* ロゴの雰囲気に合わせた「やさしい境界線」 */
        .sketch-border { border: 2px solid #e2e8f0; }
        .sketch-card { border: 2px solid #f1f5f9; transition: all 0.3s ease; }
        .sketch-card:hover { border-color: #cbd5e1; transform: translateY(-2px); }

        .glass-header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
        }

        /* 柔らかい浮遊アニメーション */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen font-['Zen_Maru_Gothic'] text-slate-700 relative overflow-x-hidden bg-[#fafaf9] selection:bg-orange-100 selection:text-orange-900">

    <!-- 背景装飾（ロゴに合わせた手書き風の柔らかい丸） -->
    <div class="fixed inset-0 -z-50 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-orange-50 rounded-full blur-[100px] opacity-60"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-50 rounded-full blur-[100px] opacity-60"></div>
    </div>

    <!-- ヘッダー -->
    <header class="sticky top-0 z-[100] glass-header border-b-2 border-slate-100 shadow-sm">
        <div class="container mx-auto px-4 lg:px-8 h-16 md:h-24 flex items-center justify-between max-w-6xl">
            
            <!-- 新しいロゴ -->
            <button onclick="goHome()" class="flex items-center transition-transform active:scale-95 py-2">
                <div class="w-32 md:w-48 lg:w-56">
                    <img src="logo.svg" alt="タマベン" class="w-full h-auto">
                </div>
            </button>

            <!-- アクションエリア -->
            <div class="flex items-center gap-3">
                <div id="current-grade-badge" class="hidden md:flex px-4 py-2 rounded-full border-2 border-slate-100 bg-white text-slate-500 text-xs font-black items-center gap-2">
                    <i data-lucide="smile" class="w-4 h-4"></i>
                    <span id="user-grade-label"></span>
                </div>
                <button onclick="openSettingsModal()" class="flex items-center gap-2 px-4 py-2 md:py-3 rounded-2xl bg-slate-800 text-white hover:bg-slate-700 transition-all shadow-md active:scale-95 group">
                    <i data-lucide="settings" class="w-4 h-4 group-hover:rotate-90 transition-transform duration-500"></i>
                    <span class="text-xs font-black">設定</span>
                </button>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="container mx-auto px-4 py-8 pb-32 relative z-10 max-w-5xl">
        
        <!-- ホーム画面 -->
        <div id="view-home" class="animate-in fade-in slide-in-from-bottom-4 duration-700">
            
            <!-- ヒーローセクション（ロゴのマスコットに合わせた雰囲気） -->
            <section id="hero-section" class="relative rounded-[3rem] overflow-hidden bg-white border-2 border-slate-100 p-8 md:p-16 text-center md:text-left mb-16 flex flex-col md:flex-row items-center justify-between gap-10 shadow-sm">
                <div class="relative z-10 max-w-2xl">
                    <div class="inline-flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-full text-xs font-black mb-6 text-slate-400 border border-slate-100 uppercase tracking-widest">
                        Handmade Learning Support
                    </div>
                    <h1 class="text-4xl md:text-6xl font-black mb-8 leading-[1.15] text-slate-800 tracking-tight">
                        学びを、<br/>
                        <span class="text-orange-400">もっと自由に。</span>
                    </h1>
                    <p class="text-slate-400 font-bold text-base md:text-xl mb-0 leading-relaxed">
                        ひとりひとりの「やりたい」に寄り添う、<br class="hidden md:block">
                        タマベンはそんな、やさしい場所を目指しています。
                    </p>
                </div>
                <!-- 右側の装飾（マスコットが浮いているようなイメージ） -->
                <div class="relative z-10 w-40 h-40 md:w-64 md:h-64 flex items-center justify-center">
                    <div class="absolute inset-0 bg-orange-100/50 rounded-full blur-2xl float-anim"></div>
                    <div class="relative w-full h-full bg-white rounded-[3rem] border-2 border-slate-50 shadow-xl flex items-center justify-center rotate-3 float-anim">
                        <i id="main-season-icon" class="text-orange-300 w-20 h-20 md:w-32 md:h-32"></i>
                    </div>
                </div>
            </section>

            <!-- 学習サポートアプリ -->
            <section class="mb-16">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-500 sketch-border">
                        <i data-lucide="layout" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-800">学習サポートアプリ</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <a href="manabi.html" class="group bg-white rounded-[2.5rem] p-8 sketch-card flex flex-col md:flex-row items-center gap-8">
                        <img src="manabi.png" alt="MB" class="w-20 h-20 md:w-24 md:h-24 rounded-[2rem] shadow-lg group-hover:rotate-6 transition-transform">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-[10px] font-black px-2 py-0.5 bg-indigo-50 text-indigo-500 rounded-md">APP</span>
                                <h4 class="font-black text-xl text-slate-800">Manabi Baton</h4>
                            </div>
                            <p class="text-sm text-slate-400 font-bold leading-relaxed">学習記録を「見える化」して、こどものやる気を引き出す専用アプリ。</p>
                        </div>
                    </a>
                </div>
            </section>

            <!-- 教材一覧（タブとカード） -->
            <div class="flex justify-center mb-12 sticky top-24 z-40">
                <div class="inline-flex bg-white/90 p-2 rounded-[2rem] border-2 border-slate-100 shadow-xl backdrop-blur-md w-full max-w-sm">
                    <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-active flex-1 py-4 rounded-2xl text-sm font-black transition-all">小学生</button>
                    <button onclick="switchTab('junior')" id="tab-junior" class="tab-inactive flex-1 py-4 rounded-2xl text-sm font-black transition-all">中学生</button>
                </div>
            </div>

            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
                <!-- script.jsが教材カードを生成します -->
            </div>
        </div>

        <!-- 詳細画面 -->
        <div id="view-detail" class="hidden animate-in slide-in-from-right-8 duration-500">
            <button onclick="goHome()" class="mb-8 flex items-center gap-2 text-slate-400 font-black hover:text-slate-800 transition-colors">
                <i data-lucide="chevron-left" class="w-6 h-6"></i> 教材一覧に戻る
            </button>
            <div id="detail-card" class="bg-white rounded-[3.5rem] overflow-hidden border-2 border-slate-100 shadow-sm">
                <!-- script.jsが内容を描画します -->
            </div>
        </div>

    </main>

    <!-- フッター -->
    <footer class="bg-white border-t-2 border-slate-50 py-16">
        <div class="container mx-auto px-4 text-center">
            <div class="inline-flex items-center justify-center mb-8 opacity-50 hover:opacity-100 transition-opacity">
                <img src="logo.svg" alt="タマベン" class="h-10 md:h-12 w-auto grayscale">
            </div>
            <p class="text-xs text-slate-300 font-black tracking-widest uppercase">
                &copy; 2026 Tamaben. All Rights Reserved.
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
