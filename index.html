<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タマベン - 学びを、もっと自由に。</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --brand-orange: #fb923c;
            --brand-indigo: #6366f1;
            --soft-bg: #fafafa;
        }
        body { background-color: var(--soft-bg); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* 物理的なカードのような影と質感 */
        .premium-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.01);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
            border-color: var(--brand-orange);
        }

        /* 検索バーのフォーカス演出 */
        .search-focus:focus-within {
            box-shadow: 0 0 0 4px rgba(251, 146, 60, 0.1);
            border-color: var(--brand-orange);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* タブのアクティブ演出 */
        .tab-indicator {
            transition: all 0.3s ease;
        }
        .active-tab { color: #1e293b; }
    </style>
</head>
<body class="min-h-screen font-['Zen_Maru_Gothic'] text-slate-800 selection:bg-orange-100">

    <!-- ヘッダー -->
    <header class="sticky top-0 z-[100] glass-nav border-b border-slate-100">
        <div class="container mx-auto px-4 lg:px-12 h-20 md:h-28 flex items-center justify-between max-w-7xl">
            <!-- ロゴエリア -->
            <button onclick="goHome()" class="flex items-center active:scale-95 transition-all">
                <img src="logo.svg" alt="タマベン" class="h-10 md:h-16 w-auto">
            </button>

            <!-- 右側：設定 & プロフィール -->
            <div class="flex items-center gap-4">
                <div id="grade-info" class="hidden md:block text-right mr-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Your Grade</p>
                    <p id="user-grade-label" class="text-sm font-black text-slate-700"></p>
                </div>
                <button onclick="openSettingsModal()" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-200 shadow-sm hover:border-orange-200 hover:text-orange-500 transition-all">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 md:px-12 max-w-7xl pb-32">
        
        <!-- === ホーム画面 === -->
        <div id="view-home" class="animate-in fade-in duration-700">
            
            <!-- ヒーロー & 検索 -->
            <section class="py-12 md:py-20 text-center">
                <h1 class="text-3xl md:text-5xl font-black mb-6 tracking-tight leading-tight">
                    今日は何を、<span class="text-orange-400 underline decoration-indigo-200 decoration-4 underline-offset-8">発見</span>しよう？
                </h1>
                
                <!-- 検索バー (使いやすさの追求) -->
                <div class="max-w-2xl mx-auto mt-10 relative group">
                    <div class="search-focus flex items-center bg-white border-2 border-slate-100 rounded-[2rem] px-6 py-4 transition-all">
                        <i data-lucide="search" class="w-5 h-5 text-slate-400 mr-4"></i>
                        <input type="text" id="search-input" placeholder="漢字、計算、歴史..." class="w-full bg-transparent outline-none font-bold text-slate-700 placeholder:text-slate-300">
                    </div>
                </div>

                <!-- クイックタグ (使いやすさの追求) -->
                <div class="flex flex-wrap justify-center gap-2 mt-6">
                    <span class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-400 cursor-pointer hover:bg-orange-50 hover:text-orange-500 transition-colors">#人気教材</span>
                    <span class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-400 cursor-pointer hover:bg-orange-50 hover:text-orange-500 transition-colors">#テスト対策</span>
                    <span class="px-4 py-1.5 rounded-full bg-white border border-slate-100 text-xs font-bold text-slate-400 cursor-pointer hover:bg-orange-50 hover:text-orange-500 transition-colors">#中学入試</span>
                </div>
            </section>

            <!-- アプリ紹介バナー -->
            <section class="mb-16">
                <a href="manabi.html" class="group block relative rounded-[2.5rem] bg-indigo-600 p-8 md:p-12 overflow-hidden shadow-xl active:scale-[0.98] transition-all">
                    <div class="absolute top-0 right-0 w-1/2 h-full opacity-10 pointer-events-none">
                        <i data-lucide="layout" class="w-64 h-64 -rotate-12 translate-x-12"></i>
                    </div>
                    <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                        <div class="text-center md:text-left">
                            <span class="px-3 py-1 rounded-full bg-white/20 text-white text-[10px] font-black uppercase tracking-widest">Recommended App</span>
                            <h2 class="text-3xl md:text-4xl font-black text-white mt-4 mb-4">Manabi Baton</h2>
                            <p class="text-indigo-100 font-bold mb-6">学習記録をバトンのようにつないで、やる気を最大に。</p>
                            <span class="inline-flex items-center gap-2 bg-white text-indigo-600 px-6 py-3 rounded-2xl font-black text-sm group-hover:gap-4 transition-all">
                                アプリを見る <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </span>
                        </div>
                        <img src="manabi.png" alt="MB" class="w-24 h-24 md:w-32 md:h-32 rounded-[2rem] shadow-2xl border-4 border-white/20">
                    </div>
                </a>
            </section>

            <!-- 学年ナビゲーション -->
            <div class="sticky top-20 md:top-28 z-40 py-4 bg-[#fafafa]/80 backdrop-blur-md">
                <div class="flex justify-center">
                    <div class="inline-flex bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm">
                        <button onclick="switchTab('elementary')" id="tab-elementary" class="tab-active px-8 py-3 rounded-xl text-sm font-black transition-all">小学生</button>
                        <button onclick="switchTab('junior')" id="tab-junior" class="tab-inactive px-8 py-3 rounded-xl text-sm font-black transition-all">中学生</button>
                    </div>
                </div>
            </div>

            <!-- 教材グリッド -->
            <div id="learning-materials-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
                <!-- script.jsがカードを生成 -->
            </div>
        </div>

        <!-- === 詳細画面 === -->
        <div id="view-detail" class="hidden animate-in slide-in-from-bottom-8 duration-500">
            <button onclick="goHome()" class="mb-10 flex items-center gap-2 text-slate-400 font-black hover:text-orange-500 transition-colors group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> 一覧に戻る
            </button>
            <div id="detail-card" class="bg-white rounded-[3rem] overflow-hidden border border-slate-100 shadow-2xl">
                <!-- script.jsが描画 -->
            </div>
        </div>

    </main>

    <!-- フッター -->
    <footer class="bg-white border-t border-slate-100 py-20">
        <div class="container mx-auto px-4 text-center">
            <img src="logo.svg" alt="タマベン" class="h-10 md:h-12 w-auto mx-auto mb-10 opacity-30 grayscale hover:opacity-100 hover:grayscale-0 transition-all">
            <div class="flex justify-center gap-8 mb-10 text-xs font-bold text-slate-400">
                <a href="#" class="hover:text-orange-500 transition-colors">利用規約</a>
                <a href="#" class="hover:text-orange-500 transition-colors">プライバシーポリシー</a>
                <a href="#" class="hover:text-orange-500 transition-colors">お問い合わせ</a>
            </div>
            <p class="text-[10px] text-slate-300 font-black tracking-[0.2em] uppercase">
                &copy; 2026 Tamaben. Dedicated to every learner.
            </p>
        </div>
    </footer>

    <!-- 設定モーダル (使いやすさ向上のためのスライドイン風モーダル) -->
    <div id="settings-modal" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/20 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="text-center">
                <h3 class="text-xl font-black mb-2">学年の設定</h3>
                <p class="text-xs text-slate-400 font-bold mb-8">あなたにぴったりの教材を提案します</p>
                <input type="date" id="birthdate-input" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:border-orange-400 outline-none font-bold text-center mb-6">
                <button onclick="saveBirthDate()" class="w-full py-4 bg-orange-400 text-white rounded-2xl font-black shadow-lg shadow-orange-200 active:scale-95 transition-all">保存して戻る</button>
                <button onclick="closeSettingsModal()" class="mt-4 text-xs font-bold text-slate-300 hover:text-slate-500">閉じる</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        
        // モーダルの簡易制御
        function openSettingsModal() {
            const m = document.getElementById('settings-modal');
            m.classList.remove('pointer-events-none', 'opacity-0');
            m.querySelector('div').classList.remove('scale-95');
        }
        function closeSettingsModal() {
            const m = document.getElementById('settings-modal');
            m.classList.add('pointer-events-none', 'opacity-0');
            m.querySelector('div').classList.add('scale-95');
        }
    </script>
</body>
</html>
