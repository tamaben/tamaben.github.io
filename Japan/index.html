<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>県庁所在地学習</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 元のサイトのグローバルCSS -->
  <link rel="stylesheet" href="https://www.granfairs.com/_codetest/iconfont-for-map/assets/css/global.css">

  <style>
    /* ローカルの map.ttf を読み込む設定 */
    @font-face {
      font-family: 'map';
      src: url('./map.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    /* マップコンテナの基本設定 */
    #map-transform {
      width: 1000px;
      height: 1000px;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0; 
      transition: transform 0.8s cubic-bezier(0.34, 1.15, 0.64, 1); 
      will-change: transform;
    }

    #map-transform ul {
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    /* 都道府県のフォント設定（強制上書き） */
    #map-transform li,
    #map-transform li::before {
      font-family: 'map' !important;
      font-size: 1000px !important;
      line-height: 1 !important;
      color: #cbd5e1 !important; /* 通常時のグレー */
      transition: color 0.4s ease;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    /* 日本地図の全体境界線（白で抜いて県同士の境界を作る） */
    #map-transform li.p-eveMapLine,
    #map-transform li.p-eveMapLine::before {
      color: #ffffff !important;
      z-index: 1;
      pointer-events: none;
    }

    /* クイズ中の非対象の都道府県 (背景と同化しないソリッドな薄グレー) */
    #map-container.is-quiz li:not(.is-open):not(.p-eveMapLine),
    #map-container.is-quiz li:not(.is-open):not(.p-eveMapLine)::before {
      color: #e2e8f0 !important; 
    }

    /* アクティブ(出題中)の都道府県 */
    #map-transform li.is-open,
    #map-transform li.is-open::before {
      color: #059669 !important; /* ベタ塗りのエメラルドグリーン */
      z-index: 10;
      filter: none !important; /* 光彩などはすべて除去 */
    }

    /* ヒント表示時のアニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-hint {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

  <script>
    const PREFECTURES = [

      { id: 'gumma', name: '群馬県', capital: '前橋市', region: '関東' },
      { id: 'saitama', name: '埼玉県', capital: 'さいたま市', region: '関東' },
      { id: 'chiba', name: '千葉県', capital: '千葉市', region: '関東' },
      { id: 'tokyo', name: '東京都', capital: '新宿区', region: '関東' },
      { id: 'kanagawa', name: '神奈川県', capital: '横浜市', region: '関東' },
      { id: 'niigata', name: '新潟県', capital: '新潟市', region: '中部' },
      { id: 'toyama', name: '富山県', capital: '富山市', region: '中部' },
      { id: 'ishikawa', name: '石川県', capital: '金沢市', region: '中部' },
      { id: 'fukui', name: '福井県', capital: '福井市', region: '中部' },
      { id: 'yamanashi', name: '山梨県', capital: '甲府市', region: '中部' },
      { id: 'nagano', name: '長野県', capital: '長野市', region: '中部' },
      { id: 'gifu', name: '岐阜県', capital: '岐阜市', region: '中部' },
      { id: 'shizuoka', name: '静岡県', capital: '静岡市', region: '中部' },
      { id: 'aichi', name: '愛知県', capital: '名古屋市', region: '中部' },
      { id: 'mie', name: '三重県', capital: '津市', region: '近畿' },
      { id: 'shiga', name: '滋賀県', capital: '大津市', region: '近畿' },
      { id: 'kyoto', name: '京都府', capital: '京都市', region: '近畿' },
      { id: 'osaka', name: '大阪府', capital: '大阪市', region: '近畿' },
      { id: 'hyogo', name: '兵庫県', capital: '神戸市', region: '近畿' },
      { id: 'nara', name: '奈良県', capital: '奈良市', region: '近畿' },
      { id: 'wakayama', name: '和歌山県', capital: '和歌山市', region: '近畿' },
      { id: 'tottori', name: '鳥取県', capital: '鳥取市', region: '中国' },
      { id: 'shimane', name: '島根県', capital: '松江市', region: '中国' },
      { id: 'okayama', name: '岡山県', capital: '岡山市', region: '中国' },
      { id: 'hiroshima', name: '広島県', capital: '広島市', region: '中国' },
      { id: 'yamaguchi', name: '山口県', capital: '山口市', region: '中国' },
      { id: 'tokushima', name: '徳島県', capital: '徳島市', region: '四国' },
      { id: 'kagawa', name: '香川県', capital: '高松市', region: '四国' },
      { id: 'ehime', name: '愛媛県', capital: '松山市', region: '四国' },
      { id: 'kochi', name: '高知県', capital: '高知市', region: '四国' },
      { id: 'fukuoka', name: '福岡県', capital: '福岡市', region: '九州・沖縄' },
      { id: 'saga', name: '佐賀県', capital: '佐賀市', region: '九州・沖縄' },
      { id: 'nagasaki', name: '長崎県', capital: '長崎市', region: '九州・沖縄' },
      { id: 'kumamoto', name: '熊本県', capital: '熊本市', region: '九州・沖縄' },
      { id: 'oita', name: '大分県', capital: '大分市', region: '九州・沖縄' },
      { id: 'miyazaki', name: '宮崎県', capital: '宮崎市', region: '九州・沖縄' },
      { id: 'kagoshima', name: '鹿児島県', capital: '鹿児島市', region: '九州・沖縄' },
      { id: 'okinawa', name: '沖縄県', capital: '那覇市', region: '九州・沖縄' },
    ];

    let gameState = 'ready'; 
    let quizMode = 'shape';  
    let currentPref = null;
    let timer = 15; // ★ 15秒に変更
    let score = 0;
    let questionCount = 0;
    let timerInterval = null;
    let remainingPrefs = []; 
    let prefCenters = {}; 
    let baseScale = 1;

    // Elements
    const mapWrapper = document.getElementById('map-wrapper');
    const mapTransform = document.getElementById('map-transform');
    const mapContainer = document.getElementById('map-container');
    const viewTop = document.getElementById('view-top');
    const viewResult = document.getElementById('view-result');
    const btnTopStart = document.getElementById('btn-top-start');
    
    const timerDisplay = document.getElementById('timer-display');
    const questionCountEl = document.getElementById('question-count');
    const questionTextEl = document.getElementById('question-text');
    const hintContainer = document.getElementById('hint-container');
    const hintPlaceholder = document.getElementById('hint-placeholder');
    const hintTextEl = document.getElementById('hint-text');
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score-display');
    
    const topModeButtons = document.querySelectorAll('.top-mode-btn');
    const gameModeButtons = document.querySelectorAll('.mode-btn');
    const allPrefElements = document.querySelectorAll('#map-container li');

    // 初期化処理
    async function init() {
      // フォントの読み込みを待つ
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
      
      // DOMレンダリング反映のために少し待機
      await new Promise(resolve => setTimeout(resolve, 300));
      
      calculatePrefectureCenters();
      updateBaseScale();
      resetMapScale();

      // リサイズイベント
      window.addEventListener('resize', () => {
        updateBaseScale();
        if (gameState === 'quiz' && currentPref && (quizMode === 'shape' || quizMode === 'place')) {
          focusOnPrefecture(currentPref.id);
        } else {
          resetMapScale();
        }
      });

      // トップ画面のスタートボタン有効化
      btnTopStart.disabled = false;
      btnTopStart.classList.remove('opacity-50', 'cursor-not-allowed');
      btnTopStart.classList.add('cursor-pointer', 'hover:bg-gray-900');
      btnTopStart.textContent = "スタート";

      // イベントリスナー
      btnTopStart.addEventListener('click', startGame);
      document.getElementById('btn-restart').addEventListener('click', () => {
        viewResult.classList.add('opacity-0', 'pointer-events-none');
        viewTop.classList.remove('opacity-0', 'pointer-events-none');
        gameState = 'ready';
      });

      // トップ画面でのモード切り替え
      topModeButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          quizMode = e.target.getAttribute('data-mode');
          updateModeButtonsUI();
        });
      });
    }

    function updateBaseScale() {
      const vw = mapWrapper.clientWidth;
      const vh = mapWrapper.clientHeight;
      const mapSize = 1000;
      // コンテナ内に90%で収まるように計算
      baseScale = Math.min(vw, vh) / mapSize * 0.9;
    }

    // 全体が見えるように中央に配置
    function resetMapScale() {
      const vw = mapWrapper.clientWidth;
      const vh = mapWrapper.clientHeight;
      const mapSize = 1000;
      
      const tx = vw / 2 - (mapSize / 2) * baseScale;
      const ty = vh / 2 - (mapSize / 2) * baseScale;

      mapTransform.style.transform = `translate(${tx}px, ${ty}px) scale(${baseScale})`;
    }

    // Canvasを使ってフォント上のピクセルから「実際の都道府県の重心」を計算
    function calculatePrefectureCenters() {
      const fontSize = 120;
      const offset = 40; 
      const size = fontSize + offset * 2;
      
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      
      PREFECTURES.forEach(p => {
        const el = document.querySelector(`.p-eveMapPref--${p.id}`);
        if (!el) return;
        
        let content = window.getComputedStyle(el, '::before').content;
        if (content && content !== 'none') {
          content = content.replace(/^["']|["']$/g, '');
          if (content.length > 1 && content.startsWith('\\')) {
            content = String.fromCharCode(parseInt(content.substring(1), 16));
          }

          ctx.clearRect(0, 0, size, size);
          ctx.font = `${fontSize}px map`;
          ctx.textBaseline = 'top';
          ctx.textAlign = 'left';
          ctx.fillStyle = 'black';
          ctx.fillText(content, offset, offset);
          
          const imgData = ctx.getImageData(0, 0, size, size).data;
          let minX = size, minY = size, maxX = 0, maxY = 0;
          let found = false;
          
          for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
              if (imgData[(y * size + x) * 4 + 3] > 10) { 
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
                found = true;
              }
            }
          }
          
          if (found) {
            const cx = (minX + maxX) / 2;
            const cy = (minY + maxY) / 2;
            // 0.0〜1.0 の割合として保存
            prefCenters[p.id] = {
              px: (cx - offset) / fontSize,
              py: (cy - offset) / fontSize
            };
          } else {
            prefCenters[p.id] = { px: 0.5, py: 0.5 }; 
          }
        }
      });
    }

    // ボタンのスタイル更新
    function updateModeButtonsUI() {
      // トップ画面のボタン
      topModeButtons.forEach(btn => {
        const mode = btn.getAttribute('data-mode');
        if (mode === quizMode) {
          btn.className = "top-mode-btn bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-sm transition-colors border-2 border-emerald-600 cursor-pointer";
        } else {
          btn.className = "top-mode-btn bg-white text-gray-500 py-3 rounded-xl font-bold transition-colors border-2 border-gray-200 hover:border-emerald-300 hover:text-gray-700 cursor-pointer";
        }
      });
      // ゲーム画面の表示用ボタン
      gameModeButtons.forEach(btn => {
        const mode = btn.getAttribute('data-mode');
        if (mode === quizMode) {
          btn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-bold bg-emerald-600 text-white flex-shrink-0 cursor-default shadow-sm";
        } else {
          btn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-bold bg-transparent text-gray-400 flex-shrink-0 cursor-default";
        }
      });
    }

    function startGame() {
      score = 0;
      questionCount = 1;
      gameState = 'quiz';
      
      remainingPrefs = [...PREFECTURES].sort(() => Math.random() - 0.5);
      
      viewTop.classList.add('opacity-0', 'pointer-events-none');
      mapContainer.classList.add('is-quiz');
      
      updateModeButtonsUI();
      generateQuestion();
    }

    // 対象の都道府県へなめらかにズーム・移動する
    function focusOnPrefecture(prefId) {
      const center = prefCenters[prefId];
      if (!center) return;

      const vw = mapWrapper.clientWidth;
      const vh = mapWrapper.clientHeight;
      const mapSize = 1000;
      
      // 出題時は基本スケールの4倍に拡大
      const targetScale = baseScale * 4;

      // 画面中央に、対象の重心が来るようにtranslateを計算
      const tx = vw / 2 - (center.px * mapSize) * targetScale;
      const ty = vh / 2 - (center.py * mapSize) * targetScale;

      mapTransform.style.transform = `translate(${tx}px, ${ty}px) scale(${targetScale})`;
    }

    function generateQuestion() {
      currentPref = remainingPrefs.pop();

      // 間違いの選択肢を3つ生成
      const wrongOptions = [];
      while (wrongOptions.length < 3) {
        const candidate = PREFECTURES[Math.floor(Math.random() * PREFECTURES.length)].capital;
        if (candidate !== currentPref.capital && !wrongOptions.includes(candidate)) {
          wrongOptions.push(candidate);
        }
      }
      
      const options = [currentPref.capital, ...wrongOptions].sort(() => Math.random() - 0.5);

      questionCountEl.textContent = questionCount;
      
      if (quizMode === 'shape') {
        questionTextEl.textContent = 'この県の県庁所在地は？';
      } else {
        questionTextEl.textContent = `${currentPref.name}の県庁所在地は？`;
      }

      // 選択肢ボタンの生成
      optionsContainer.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "py-4 px-2 bg-white border-2 border-gray-200 rounded-xl font-bold text-sm lg:text-base hover:border-emerald-600 hover:text-emerald-600 hover:bg-emerald-50 transition-colors text-gray-700 shadow-sm cursor-pointer";
        btn.textContent = opt;
        btn.onclick = () => handleAnswer(opt);
        optionsContainer.appendChild(btn);
      });

      // マップのハイライトとズーム
      allPrefElements.forEach(el => el.classList.remove('is-open')); 
      if (quizMode === 'shape' || quizMode === 'place') {
        const targetEl = document.querySelector(`.p-eveMapPref--${currentPref.id}`);
        if (targetEl) targetEl.classList.add('is-open');
        focusOnPrefecture(currentPref.id); 
      } else {
        resetMapScale();
      }

      // ヒントとタイマーのリセット
      hintContainer.classList.add('hidden');
      hintPlaceholder.classList.remove('hidden');
      
      timer = 15;
      updateTimerUI();
      
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        updateTimerUI();
        
        // 残り5秒でヒント表示
        if (timer === 5) {
          hintTextEl.textContent = currentPref.region;
          hintContainer.classList.remove('hidden');
          hintPlaceholder.classList.add('hidden');
        }
        
        // 0秒で時間切れ（不正解扱い）
        if (timer <= 0) {
          clearInterval(timerInterval);
          handleAnswer(null);
        }
      }, 1000);
    }

    function updateTimerUI() {
      timerDisplay.textContent = timer;
      if (timer <= 5) {
        timerDisplay.classList.remove('text-gray-100');
        timerDisplay.classList.add('text-rose-500');
        timerDisplay.classList.replace('opacity-50', 'opacity-20');
      } else {
        timerDisplay.classList.add('text-gray-100');
        timerDisplay.classList.remove('text-rose-500');
        timerDisplay.classList.replace('opacity-20', 'opacity-50');
      }
    }

    function handleAnswer(ans) {
      clearInterval(timerInterval);
      
      // 正解の場合のみスコア加算
      if (ans === currentPref.capital) {
        score++;
      }

      if (questionCount >= 47) {
        endGame();
      } else {
        questionCount++;
        generateQuestion();
      }
    }

    function endGame() {
      gameState = 'result';
      
      scoreDisplay.textContent = score;
      
      mapContainer.classList.remove('is-quiz');
      allPrefElements.forEach(el => el.classList.remove('is-open'));
      resetMapScale();
      
      // 結果画面表示
      viewResult.classList.remove('opacity-0', 'pointer-events-none');
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
