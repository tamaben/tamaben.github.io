<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>県庁所在地学習</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 元のサイトのグローバルCSS -->
  <link rel="stylesheet" href="https://www.granfairs.com/_codetest/iconfont-for-map/assets/css/global.css">

  <style>
    /* ローカルの map.ttf を読み込む設定 */
    @font-face {
      font-family: 'map';
      src: url('./map.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    /* マップ要素の基本設定 (フラットなグレー) */
    .p-eveMap {
      width: 120px;
      height: 120px;
      position: absolute;
      top: 0;
      left: 0;
      /* 滑らかに移動・拡大縮小させるための設定 */
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .p-eveMap li,
    .p-eveMap li::before {
      font-family: 'map' !important;
      color: #cbd5e1 !important; /* 通常時のグレー */
      transition: color 0.4s ease, opacity 0.4s ease;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 日本地図の全体境界線 */
    .p-eveMap li.p-eveMapLine,
    .p-eveMap li.p-eveMapLine::before {
      color: #f8fafc !important; /* ほとんど見えない白に近いグレー */
      z-index: 1;
    }

    /* クイズ中の非対象の都道府県 (背景より少し濃いグレー) */
    .is-quiz .p-eveMap li:not(.is-open):not(.p-eveMapLine),
    .is-quiz .p-eveMap li:not(.is-open):not(.p-eveMapLine)::before {
      color: #e2e8f0 !important; /* 同化しないソリッドなグレー */
    }
    
    /* アクティブ（出題中）になった都道府県 */
    .p-eveMap li.is-open,
    .p-eveMap li.is-open::before { 
      color: #4f46e5 !important; /* ベタ塗りのインディゴブルー */
      z-index: 10; 
      /* ネオン(ドロップシャドウ)を削除し、フラットに */
      filter: none !important;
    }

    /* ヒント表示時のアニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-hint {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-4 md:p-8 flex flex-col font-sans text-gray-800">

  <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
    <h1 class="text-2xl font-black tracking-tighter flex items-center text-gray-800">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-indigo-600">
        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
        <circle cx="12" cy="10" r="3"/>

      県庁所在地学習

    <!-- モード切り替えタブ -->
    <div class="flex gap-1 bg-gray-200/60 p-1 rounded-xl w-full md:w-auto overflow-x-auto">

    </div>

  <script>
    const PREFECTURES = [
      { id: 'hokkaido', name: '北海道', capital: '札幌市', region: '北海道' },
      { id: 'aomori', name: '青森県', capital: '青森市', region: '東北' },

      { id: 'miyagi', name: '宮城県', capital: '仙台市', region: '東北' },
      { id: 'akita', name: '秋田県', capital: '秋田市', region: '東北' },
      { id: 'yamagata', name: '山形県', capital: '山形市', region: '東北' },
      { id: 'fukushima', name: '福島県', capital: '福島市', region: '東北' },
      { id: 'ibaraki', name: '茨城県', capital: '水戸市', region: '関東' },
      { id: 'tochigi', name: '栃木県', capital: '宇都宮市', region: '関東' },
      { id: 'gumma', name: '群馬県', capital: '前橋市', region: '関東' },
      { id: 'saitama', name: '埼玉県', capital: 'さいたま市', region: '関東' },
      { id: 'chiba', name: '千葉県', capital: '千葉市', region: '関東' },
      { id: 'tokyo', name: '東京都', capital: '新宿区', region: '関東' },
      { id: 'kanagawa', name: '神奈川県', capital: '横浜市', region: '関東' },
      { id: 'niigata', name: '新潟県', capital: '新潟市', region: '中部' },
      { id: 'toyama', name: '富山県', capital: '富山市', region: '中部' },
      { id: 'ishikawa', name: '石川県', capital: '金沢市', region: '中部' },
      { id: 'fukui', name: '福井県', capital: '福井市', region: '中部' },
      { id: 'yamanashi', name: '山梨県', capital: '甲府市', region: '中部' },
      { id: 'nagano', name: '長野県', capital: '長野市', region: '中部' },
      { id: 'gifu', name: '岐阜県', capital: '岐阜市', region: '中部' },
      { id: 'shizuoka', name: '静岡県', capital: '静岡市', region: '中部' },
      { id: 'aichi', name: '愛知県', capital: '名古屋市', region: '中部' },
      { id: 'mie', name: '三重県', capital: '津市', region: '近畿' },
      { id: 'shiga', name: '滋賀県', capital: '大津市', region: '近畿' },
      { id: 'kyoto', name: '京都府', capital: '京都市', region: '近畿' },
      { id: 'osaka', name: '大阪府', capital: '大阪市', region: '近畿' },
      { id: 'hyogo', name: '兵庫県', capital: '神戸市', region: '近畿' },
      { id: 'nara', name: '奈良県', capital: '奈良市', region: '近畿' },
      { id: 'wakayama', name: '和歌山県', capital: '和歌山市', region: '近畿' },
      { id: 'tottori', name: '鳥取県', capital: '鳥取市', region: '中国' },
      { id: 'shimane', name: '島根県', capital: '松江市', region: '中国' },
      { id: 'okayama', name: '岡山県', capital: '岡山市', region: '中国' },
      { id: 'hiroshima', name: '広島県', capital: '広島市', region: '中国' },
      { id: 'yamaguchi', name: '山口県', capital: '山口市', region: '中国' },
      { id: 'tokushima', name: '徳島県', capital: '徳島市', region: '四国' },
      { id: 'kagawa', name: '香川県', capital: '高松市', region: '四国' },
      { id: 'ehime', name: '愛媛県', capital: '松山市', region: '四国' },
      { id: 'kochi', name: '高知県', capital: '高知市', region: '四国' },
      { id: 'fukuoka', name: '福岡県', capital: '福岡市', region: '九州・沖縄' },
      { id: 'saga', name: '佐賀県', capital: '佐賀市', region: '九州・沖縄' },
      { id: 'nagasaki', name: '長崎県', capital: '長崎市', region: '九州・沖縄' },
      { id: 'kumamoto', name: '熊本県', capital: '熊本市', region: '九州・沖縄' },
      { id: 'oita', name: '大分県', capital: '大分市', region: '九州・沖縄' },
      { id: 'miyazaki', name: '宮崎県', capital: '宮崎市', region: '九州・沖縄' },
      { id: 'kagoshima', name: '鹿児島県', capital: '鹿児島市', region: '九州・沖縄' },
      { id: 'okinawa', name: '沖縄県', capital: '那覇市', region: '九州・沖縄' },
    ];

    let gameState = 'ready'; 
    let quizMode = 'shape';  
    let currentPref = null;
    let timer = 20;
    let score = 0;
    let questionCount = 0;
    let timerInterval = null;
    let remainingPrefs = []; 
    let prefCenters = {}; // 各都道府県の重心座標(px, py)
    let baseScale = 1;

    const mapWrapper = document.getElementById('map-wrapper');
    const mapTransform = document.getElementById('map-transform');
    const mapContainer = document.getElementById('map-container');
    const screenReady = document.getElementById('screen-ready');
    const screenQuiz = document.getElementById('screen-quiz');
    const screenResult = document.getElementById('screen-result');
    const timerDisplay = document.getElementById('timer-display');
    const questionCountEl = document.getElementById('question-count');
    const questionTextEl = document.getElementById('question-text');
    const hintContainer = document.getElementById('hint-container');
    const hintPlaceholder = document.getElementById('hint-placeholder');
    const hintTextEl = document.getElementById('hint-text');
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score-display');
    const modeButtons = document.querySelectorAll('.mode-btn');
    const allPrefElements = document.querySelectorAll('#map-container li');

    async function init() {
      // フォントの読み込みを待つ
      await document.fonts.ready;
      // 要素のレンダリングが完了するのを少し待機
      await new Promise(resolve => setTimeout(resolve, 100));
      
      calculatePrefectureCenters();
      updateBaseScale();
      resetMapScale();

      window.addEventListener('resize', () => {
        updateBaseScale();
        if (gameState === 'quiz' && currentPref && (quizMode === 'shape' || quizMode === 'place')) {
          focusOnPrefecture(currentPref.id);
        } else {
          resetMapScale();
        }
      });

      document.getElementById('btn-start').addEventListener('click', startGame);
      document.getElementById('btn-restart').addEventListener('click', startGame);

      modeButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (gameState === 'quiz') return; 
          quizMode = e.target.getAttribute('data-mode');
          updateModeButtons();
        });
      });
    }

    function updateBaseScale() {
      const vw = mapWrapper.clientWidth;
      const vh = mapWrapper.clientHeight;
      // オリジナルのフォント枠サイズは120px
      // 画面内に85%で収まるように基本スケールを計算
      baseScale = Math.min(vw, vh) / 120 * 0.85;
    }

    // TransformOriginを0,0に固定し、translateで画面中央に配置する
    function resetMapScale() {
      const vw = mapWrapper.clientWidth;
      const vh = mapWrapper.clientHeight;
      const mapW = 120;
      const mapH = 120;
      
      // コンテナの中央から、マップの半分の大きさを引いて配置
      const tx = vw / 2 - (mapW * 0.5) * baseScale;
      const ty = vh / 2 - (mapH * 0.5) * baseScale;

      mapTransform.style.transformOrigin = `0 0`;
      mapTransform.style.transform = `translate(${tx}px, ${ty}px) scale(${baseScale})`;
    }

    // Canvasを使ってフォント上のピクセルから「実際の都道府県の重心」を計算
    function calculatePrefectureCenters() {
      const fontSize = 120;
      const offset = 40; // はみ出し防止のパディング
      const size = fontSize + offset * 2;
      
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      
      PREFECTURES.forEach(p => {
        const el = document.querySelector(`.p-eveMapPref--${p.id}`);
        if (!el) return;
        
        let content = window.getComputedStyle(el, '::before').content;
        if (content && content !== 'none') {
          content = content.replace(/^["']|["']$/g, '');
          if (content.length > 1 && content.startsWith('\\')) {
            content = String.fromCharCode(parseInt(content.substring(1), 16));
          }

          ctx.clearRect(0, 0, size, size);
          ctx.font = `${fontSize}px map`;
          ctx.textBaseline = 'top';
          ctx.textAlign = 'left';
          ctx.fillStyle = 'black';
          
          ctx.fillText(content, offset, offset);
          
          const imgData = ctx.getImageData(0, 0, size, size).data;
          let minX = size, minY = size, maxX = 0, maxY = 0;
          let found = false;
          
          for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
              if (imgData[(y * size + x) * 4 + 3] > 10) { 
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
                found = true;
              }
            }
          }
          
          if (found) {
            const cx = (minX + maxX) / 2;
            const cy = (minY + maxY) / 2;
            // 0.0〜1.0 の割合として保存
            prefCenters[p.id] = {
              px: (cx - offset) / fontSize,
              py: (cy - offset) / fontSize
            };
          } else {
            prefCenters[p.id] = { px: 0.5, py: 0.5 }; 
          }
        }
      });
    }

    function updateModeButtons() {
      modeButtons.forEach(btn => {
        const mode = btn.getAttribute('data-mode');
        if (mode === quizMode) {
          btn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-bold transition-all bg-gray-800 text-white shadow-sm flex-shrink-0";
        } else {
          const disabledClass = gameState === 'quiz' ? 'opacity-50 cursor-not-allowed' : 'hover:text-gray-800 hover:bg-gray-100';
          btn.className = `mode-btn px-4 py-2 rounded-lg text-sm font-bold transition-all bg-transparent text-gray-400 ${disabledClass} flex-shrink-0`;
        }
      });
    }

    function startGame() {
      score = 0;
      questionCount = 1;
      gameState = 'quiz';
      
      remainingPrefs = [...PREFECTURES].sort(() => Math.random() - 0.5);
      
      screenReady.classList.add('hidden');
      screenResult.classList.add('hidden');
      screenQuiz.classList.remove('hidden');
      timerDisplay.classList.remove('hidden');
      
      mapContainer.classList.add('is-quiz');
      
      updateModeButtons();
      generateQuestion();
    }

    // 対象の都道府県へなめらかにズーム・移動する
    function focusOnPrefecture(prefId) {
      const center = prefCenters[prefId];
      if (!center) return;

      const vw = mapWrapper.clientWidth;
      const vh = mapWrapper.clientHeight;
      const mapW = 120;
      const mapH = 120;
      
      // 出題時は基本スケールの3.5倍に拡大
      const targetScale = baseScale * 3.5;

      // 画面中央に、対象の重心が来るようにtranslateを計算
      const tx = vw / 2 - (mapW * center.px) * targetScale;
      const ty = vh / 2 - (mapH * center.py) * targetScale;

      mapTransform.style.transformOrigin = `0 0`;
      mapTransform.style.transform = `translate(${tx}px, ${ty}px) scale(${targetScale})`;
    }

    function generateQuestion() {
      currentPref = remainingPrefs.pop();

      const wrongOptions = [];
      while (wrongOptions.length < 3) {
        const candidate = PREFECTURES[Math.floor(Math.random() * PREFECTURES.length)].capital;
        if (candidate !== currentPref.capital && !wrongOptions.includes(candidate)) {
          wrongOptions.push(candidate);
        }
      }
      
      const options = [currentPref.capital, ...wrongOptions].sort(() => Math.random() - 0.5);

      questionCountEl.textContent = questionCount;
      if (quizMode === 'shape' || quizMode === 'place') {
        questionTextEl.textContent = 'この県の県庁所在地は？';
