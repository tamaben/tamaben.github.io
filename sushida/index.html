<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿司打 OCR Reader</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}
iframe{
    width:100%;
    height:100%;
    border:none;
}
#selection{
    position:absolute;
    left:100px;
    top:100px;
    width:300px;
    height:120px;
    border:3px solid red;
    box-sizing:border-box;
    cursor:move;
}
#handle{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    right:-10px;
    bottom:-10px;
    border-radius:50%;
    cursor:nwse-resize;
}
#saveBtn{
    position:absolute;
    top:20px;
    right:20px;
    z-index:1000;
    padding:10px 20px;
}
</style>
</head>
<body>

保存

<iframe src="https://sushida.net"></iframe>
<div id="selection">
    <div id="handle"></div>
</div>
<script>
const box = document.getElementById("selection");
const handle = document.getElementById("handle");
let dragging = false;
let resizing = false;
let startX;
let startY;
let startWidth;
let startHeight;
let startLeft;
let startTop;
box.addEventListener("pointerdown",(e)=>{
    if(e.target === handle) return;
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = box.offsetLeft;
    startTop = box.offsetTop;
});
handle.addEventListener("pointerdown",(e)=>{
    resizing = true;
    startX = e.clientX;
    startY = e.clientY;
    startWidth = box.offsetWidth;
    startHeight = box.offsetHeight;
    e.stopPropagation();
});
window.addEventListener("pointermove",(e)=>{
    if(dragging){
        box.style.left =
            startLeft + (e.clientX - startX) + "px";
        box.style.top =
            startTop + (e.clientY - startY) + "px";
    }
    if(resizing){
        box.style.width =
            startWidth + (e.clientX - startX) + "px";
        box.style.height =
            startHeight + (e.clientY - startY) + "px";
    }
});
window.addEventListener("pointerup",()=>{
    dragging = false;
    resizing = false;
});
document.getElementById("saveBtn")
.addEventListener("click",()=>{
    const data = {
        x: box.offsetLeft,
        y: box.offsetTop,
        width: box.offsetWidth,
        height: box.offsetHeight
    };
    localStorage.setItem(
        "ocrRegion",
        JSON.stringify(data)
    );
    alert("保存しました");
});
</script>
</body>
</html>
