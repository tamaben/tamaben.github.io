<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マ診断</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Quicksand:wght@400;500;600;700&display=swap');

        :root {
            --bg-base: #f2f7f4;
            --accent-dark: #0a2115;
            --accent-light: #0ea5e9;
            --accent-core: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.95);
            --text-main: #111827;
            --text-muted: #475569;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: radial-gradient(circle at 50% 50%, #f7fbf8 0%, #eef5f1 100%); }
        .bg-blob1, .bg-blob2, .bg-blob3 { position: absolute; border-radius: 50%; opacity: 0.15; transition: all 2s ease; filter: blur(100px); }
        .bg-blob1 { top: -20%; left: -10%; width: 70vw; height: 70vw; background: var(--accent-core); animation: drift1 25s infinite alternate ease-in-out; }
        .bg-blob2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--accent-light); animation: drift2 30s infinite alternate-reverse ease-in-out; }
        .bg-blob3 { top: 40%; left: 20%; width: 50vw; height: 50vw; background: var(--accent-dark); opacity: 0.08; animation: drift3 20s infinite alternate ease-in-out; }
        
        @keyframes drift1 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 100% { transform: translate(10%, 15%) scale(1.1) rotate(10deg); } }
        @keyframes drift2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-10%, -15%) scale(1.2); } }
        @keyframes drift3 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(15%, -10%) scale(0.9); } }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }
        .font-quicksand { font-family: 'Quicksand', sans-serif; }

        .app-wrapper { width: 100%; max-width: 540px; padding: 1.5rem; z-index: 10; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border); border-radius: 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(10, 33, 21, 0.1), inset 0 0 20px rgba(255,255,255,0.6);
            overflow: hidden; position: relative;
        }

        .option-btn {
            width: 100%; text-align: left; padding: 1.25rem 1.5rem; background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(16, 185, 129, 0.15); border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); font-size: 0.95rem; line-height: 1.6;
            color: var(--text-main); position: relative; overflow: hidden; margin-bottom: 0.75rem;
        }
        .option-btn:hover { background: #ffffff; border-color: var(--accent-core); transform: translateY(-3px) scale(1.01); box-shadow: 0 12px 25px rgba(16, 185, 129, 0.12); color: var(--accent-dark); }

        .score-display {
            font-size: 7.5rem; line-height: 1; font-weight: 700; letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent-core) 60%, var(--accent-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 20px 40px rgba(16, 185, 129, 0.25); margin: 1.5rem 0; position: relative;
        }

        .btn-main { background: linear-gradient(135deg, var(--accent-dark), var(--accent-core)); color: #fff; border-radius: 1.25rem; font-weight: 700; letter-spacing: 0.15em; transition: all 0.4s ease; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.25); border: none; position: relative; overflow: hidden; }
        .btn-main::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%); transform: skewX(-20deg); transition: all 0.7s ease; }
        .btn-main:hover::after { left: 150%; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(16, 185, 129, 0.35); }

        .btn-outline { background: transparent; color: var(--accent-dark); border: 2px solid var(--accent-core); border-radius: 1.25rem; font-weight: 700; letter-spacing: 0.15em; transition: all 0.3s ease; }
        .btn-outline:hover { background: rgba(16, 185, 129, 0.05); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.1); }

        .progress-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(18, 51, 33, 0.15); transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .progress-dot.active { background: var(--accent-core); transform: scale(1.8); box-shadow: 0 0 12px var(--accent-core); }

        .capture-flat-mode { background: #ffffff !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; box-shadow: none !important; border: 1px solid rgba(16, 185, 129, 0.1) !important; width: 540px !important; max-width: none !important; padding: 40px !important; border-radius: 0 !important; }

        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .anim-ready { opacity: 0; transform: translateY(30px); transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .anim-show { opacity: 1; transform: translateY(0); }
        .purify-effect { animation: purify 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes purify { 0% { filter: blur(10px) brightness(1.2); opacity: 0; transform: scale(0.98) translateY(10px); } 100% { filter: blur(0) brightness(1); opacity: 1; transform: scale(1) translateY(0); } }
        .reveal-light { animation: revealLight 2.5s ease-in-out forwards; }
        @keyframes revealLight { 0% { background-color: #050a07; opacity: 1; } 50% { background-color: var(--accent-core); opacity: 1; filter: blur(25px); } 100% { background-color: transparent; opacity: 0; pointer-events: none; } }
        .pulse-btn { animation: pulseSlow 3s infinite; }
        @keyframes pulseSlow { 0%, 100% { opacity: 0.5; text-shadow: 0 0 10px rgba(255,255,255,0.2); } 50% { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.8); } }

        #log-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #log-modal.show { opacity: 1; pointer-events: auto; }
        #log-modal .content { background: #ffffff; color: var(--text-main); width: 100%; max-width: 500px; max-height: 85vh; border-radius: 1.5rem; padding: 30px; overflow-y: auto; border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="bg-blobs"><div class="bg-blob1"></div><div class="bg-blob2"></div><div class="bg-blob3"></div></div>

    <div id="reveal-screen" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#050a07] transition-opacity duration-1000 opacity-0">
        <button id="reveal-btn" onclick="revealResult()" class="text-white hover:text-[var(--accent-core)] text-sm tracking-[0.8em] font-serif-en pulse-btn transition-colors duration-500 py-6 px-12 border border-transparent hover:border-white/20 rounded-full outline-none">
            結果を見る
        </button>
        <div id="reveal-overlay" class="absolute inset-0 pointer-events-none opacity-0"></div>
    </div>

    <div class="app-wrapper">
        <div id="start-screen" class="glass-panel p-10 md:p-14 text-center fade-in">
            <p class="text-[var(--accent-core)] font-serif-en tracking-[0.4em] text-[10px] mb-4 uppercase font-bold">Deep Profiling System</p>
            <h1 class="text-5xl md:text-6xl font-bold mb-10 tracking-widest text-[var(--accent-dark)] font-serif-en">マ診断</h1>
            <p class="text-[var(--text-muted)] text-[14px] leading-relaxed mb-12 text-left font-medium">
                この診断は、あなたの無意識の行動や直感から、あなたの深層心理を分析し、あなたの中に「マ要素（マ度）」が何%あるかを測定します。
            </p>
            <div id="resume-container" class="hidden mb-10 p-6 bg-white/60 border border-[var(--accent-core)]/20 rounded-2xl">
                <p class="text-xs text-[var(--accent-dark)] mb-4 tracking-widest uppercase font-bold">中断されたデータがあります</p>
                <button onclick="resumeDiagnosis()" class="w-full py-4 btn-main text-sm mb-3">診断を再開する</button>
                <button onclick="startDiagnosis(true)" class="text-[11px] text-gray-500 underline hover:text-gray-700">記憶を消去して初めから</button>
            </div>
            <button onclick="startDiagnosis()" class="w-full py-5 btn-main text-sm uppercase tracking-[0.3em]">マ診断を開始する</button>
        </div>

        <div id="quiz-screen" class="hidden glass-panel p-8 md:p-12 fade-in">
            <div class="flex justify-between items-center mb-8">
                <button onclick="goBack()" id="back-btn" class="text-[10px] tracking-widest font-bold text-[var(--text-muted)] hover:text-[var(--accent-dark)] transition-all flex items-center gap-2 invisible uppercase">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> 戻る
                </button>
                <div class="flex gap-2" id="progress-dots"></div>
                <span id="q-counter" class="text-xs font-quicksand font-bold text-[var(--text-muted)] tracking-widest">01 / 10</span>
            </div>
            <div id="purify-wrapper">
                <div class="min-h-[7rem] mb-8 flex flex-col items-center text-center justify-center">
                    <span id="q-cat" class="text-[9px] uppercase tracking-[0.5em] text-[var(--accent-core)] mb-4 font-serif-en font-bold">Scanning...</span>
                    <h2 id="q-text" class="text-[1.15rem] md:text-xl font-bold text-[var(--text-main)] leading-relaxed px-2 text-left w-full"></h2>
                </div>
                <div id="options-container" class="space-y-0"></div>
            </div>
        </div>

        <div id="result-screen" class="hidden fade-in">
            <div id="capture-area" class="glass-panel text-center mb-8 pb-10 relative">
                <div class="anim-ready" id="anim-header">
                    <div class="font-serif-en text-[var(--text-muted)] tracking-[0.5em] text-[10px] mb-8 uppercase pt-10 font-bold opacity-80">Deep Analysis Report</div>
                    <div class="text-[11px] text-[var(--text-muted)] tracking-[0.4em] uppercase mb-4 font-bold">あなたのマ度</div>
                    <div class="font-quicksand score-display" id="result-score">0%</div>
                </div>
                <div class="anim-ready" id="anim-badge">
                    <div id="cert-badge" class="hidden mb-10">
                        <div class="py-2.5 px-8 bg-[#ecfdf5] border border-[#a7f3d0] text-[#047857] rounded-full inline-flex items-center gap-2 text-xs font-bold tracking-[0.3em] shadow-sm">
                            🌟 絶対的マ 認定
                        </div>
                    </div>
                    <div class="mb-10">
                        <div class="inline-block bg-[var(--accent-dark)] text-white px-8 py-2.5 rounded-full text-xs font-bold tracking-widest shadow-sm" id="result-mbti">解析中</div>
                    </div>
                </div>
                <div class="mb-12 flex justify-center bg-white/40 rounded-[2.5rem] p-8 border border-white mx-4 shadow-inner anim-ready" id="anim-chart">
                    <div style="position: relative; width: 100%; max-width: 280px; height: 280px;"><canvas id="radarChart"></canvas></div>
                </div>
                <div class="text-left px-8 space-y-10 pb-6">
                    <div class="anim-ready" id="anim-text">
                        <h4 class="text-[10px] text-[var(--accent-dark)] font-bold mb-4 uppercase tracking-[0.3em] border-b border-[var(--accent-core)]/20 pb-2 flex items-center justify-between">
                            <span>深層プロファイリング</span>
                            <span class="text-[8px] text-[var(--accent-core)] font-serif-en" id="sync-rate">Sync: --%</span>
                        </h4>
                        <p id="result-desc" class="text-[13.5px] text-gray-700 leading-loose font-medium"></p>
                    </div>
                    <div class="bg-white/90 p-6 rounded-3xl border border-gray-100 shadow-sm anim-ready" id="anim-advice">
                        <h4 class="text-[10px] text-[var(--accent-dark)] font-bold mb-4 uppercase tracking-[0.2em] flex items-center gap-2">
                            <span class="w-2 h-2 bg-[var(--accent-core)] rounded-full shadow-[0_0_8px_var(--accent-core)]"></span>AIによるワンポイント
                        </h4>
                        <p id="result-advice" class="text-[13px] text-gray-600 leading-relaxed font-medium"></p>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-4 anim-ready" id="anim-buttons">
                <button onclick="downloadImage()" class="w-full py-4 btn-main text-sm uppercase tracking-widest">結果画像を保存</button>
                <button onclick="shareLink()" class="w-full py-4 btn-outline text-xs tracking-widest uppercase bg-white/50">結果リンクをコピー</button>
            </div>
            <div class="anim-ready mt-12 mb-10 text-center" id="anim-reset">
                <button onclick="resetAndRestart()" class="text-[10px] text-[var(--text-muted)] tracking-[0.4em] uppercase hover:text-[var(--accent-dark)] transition-all">最初からやり直す</button>
            </div>
        </div>
    </div>

    <!-- 開発者ログモーダル -->
    <div id="log-modal">
        <div class="content relative">
            <h3 class="text-lg font-bold mb-2 text-[var(--accent-core)] font-serif-en">Vector Data Log</h3>
            <div id="adjustment-log" class="space-y-4 text-xs font-mono text-gray-700 whitespace-pre-wrap"></div>
            <button onclick="toggleLogModal()" class="mt-8 w-full py-4 bg-white border border-[var(--accent-core)] text-[var(--accent-dark)] rounded-xl text-sm font-bold tracking-widest uppercase hover:bg-gray-50 transition-colors">閉じる</button>
        </div>
    </div>

    <script>
        // --- 質問データ ---
        const questionsPool =[
            { q: "Q. 休日に家から一歩も出ない日、どんな風に過ごすことが多い？", type: 'select', options:[{ text: "スマホやPCを触って、ゴロゴロと無駄な時間を過ごす", score: 10, mbti: {P:2, I:1} }, { text: "溜まっていた家事や部屋の掃除を一気に片付ける", score: 0, mbti: {J:2} }, { text: "資格の勉強やスキルアップのための自己研鑽", score: 2, mbti: {T:1, J:1} }, { text: "新しい料理に挑戦したり、手の込んだ趣味に没頭する", score: 5, mbti: {Se:1, Fi:1} }] },
            { q: "Q. 日常生活で一番「イラッ」とするのはどんな時？", type: 'select', options:[{ text: "自分の作業や集中していることを邪魔された時", score: 10, mbti: {I:2, Te:1} }, { text: "約束の時間やルールを守らない人を見た時", score: 0, mbti: {J:2} }, { text: "他人の好きなものや趣味を頭ごなしに否定された時", score: 5, mbti: {Fi:2} }, { text: "非論理的で理不尽な感情をぶつけられた時", score: 2, mbti: {T:2} }] },
            { q: "Q. 欲しいものを見つけた時のあなたの行動パターンは？", type: 'select', options:[{ text: "何も考えずに、直感でパッと買ってしまうことがある", score: 10, mbti: {Se:2, P:1} }, { text: "本当に必要か何日も熟考してから買う", score: 0, mbti: {J:2, Te:1} }, { text: "口コミやレビューを隅々まで比較して決める", score: 2, mbti: {T:1, J:1} }, { text: "誰かにおすすめされたり、流行っているものを買う", score: 5, mbti: {Fe:1} }] },
            { q: "Q. 日々の「食事」に関して、どのようなこだわりがありますか？", type: 'select', options:[{ text: "絶対の決まりはなく、その時の気分で自由に決める", score: 10, mbti: {P:2, Se:1} }, { text: "栄養バランスや健康を第一に考えて選ぶ", score: 0, mbti: {J:1, Si:1} }, { text: "行きつけの店や、いつもと同じメニューを頼むことが多い", score: 2, mbti: {Si:2} }, { text: "話題のグルメやSNSで見た新しいお店を開拓する", score: 5, mbti: {Ne:1, Fe:1} }] },
            { q: "Q. 自分にとって一番「無駄だな」と感じる時間は？", type: 'select', options:[{ text: "終わりの見えない形だけの会議や説教", score: 0, mbti: {Te:2} }, { text: "気を使わなければいけない表面的な飲み会", score: 2, mbti: {Fi:2, I:1} }, { text: "休日に一歩も外に出ずダラダラしてしまった時間", score: 10, mbti: {Se:1, J:1} }, { text: "自分が心地よければ、どんな時間も無駄とは思わない", score: 5, mbti: {P:2, Fi:1} }] },
            { q: "Q. 部屋に飾るならどんなアートがいい？", type: 'select', options:[{ text: "有名な画家の価値ある作品", score: 0, mbti: {Te:1, J:1} }, { text: "何も飾らないのが一番すっきりして好き", score: 10, mbti: {I:1, S:1, P:1} }, { text: "自分が直感で「好き」と感じた無名の作品", score: 5, mbti: {Fi:2} }, { text: "部屋のインテリアに馴染むお洒落なもの", score: 2, mbti: {Se:1, Fe:1} }] },
            { q: "Q. プレッシャーがかかる大きな本番の前、あなたはどうなりますか？", type: 'situation', options:[{ label: "A", text: "現実逃避をして、全く関係のないことをし始める", score: 10, mbti: {P:2, Fi:1} }, { label: "B", text: "「なんとかなる」と開き直って、逆にリラックスできる", score: 5, mbti: {P:1, Se:1} }, { label: "C", text: "極度の緊張で食欲がなくなり、落ち着きがなくなる", score: 0, mbti: {F:1} }, { label: "D", text: "準備を完璧にするため、ギリギリまで確認作業に没頭する", score: 0, mbti: {J:2, I:1} }] },
            { q: "Q. 大切な決断を迫られたとき、最終的に背中を押すものは？", type: 'select', options:[{ text: "自分の中の「何となくこっちが良い」という直感", score: 8, mbti: {N:1, Fi:1} }, { text: "信頼できる人のアドバイス", score: 10, mbti: {Fe:1, S:1, Fi:1} }, { text: "失敗しても何とかなるという開き直り", score: 5, mbti: {P:2} }, { text: "客観的なデータや実績", score: 0, mbti: {T:2} }] },
            { q: "Q. 森で鳥の声を聞いたときの意識は？", type: 'situation', options:[{ label: "A", text: "響きそのものを全身で聴く", score: 10, mbti: {Se:2} }, { label: "B", text: "美しいと感じて深く感動する", score: 5, mbti: {F:1} }, { label: "C", text: "その鳥の種類や生態を特定したくなる", score: 0, mbti: {T:1, S:1} }, { label: "D", text: "録音して誰かに教えたくなる", score: 2, mbti: {E:1} }] },
            { q: "Q. 誰かにプレゼントをもらった時の内面は？", type: 'select', options:[{ text: "相手が選んでくれた気持ちそのものが嬉しい", score: 10, mbti: {Fe:2} }, { text: "自分の好みを分かってくれているかに感動する", score: 8, mbti: {Fi:2} }, { text: "お返しの金額やタイミングをすぐに計算する", score: 0, mbti: {T:1, J:1} }, { text: "大袈裟に喜んで、その場の空気を盛り上げる", score: 2, mbti: {E:2} }] }
        ];

        let selectedQuestions =[]; let currentIdx = 0; let historyArr =[]; let devLogText = "";

        // --- URLデコード ---
        function decodeUrlData(d) {
            try { 
                let decodedStr = decodeURIComponent(escape(atob(d)));
                return JSON.parse(decodedStr);
            } catch (e) { return null; }
        }

        // --- Cookie管理 ---
        function setCookie(name, val, days) {
            const d = new Date(); d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(val)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const nameEQ = name + "="; const ca = document.cookie.split(';');
            for(let i=0; i<ca.length; i++) { let c = ca[i].trim(); if (c.indexOf(nameEQ)===0) return decodeURIComponent(c.substring(nameEQ.length)); }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- 診断ロジック ---
        function shuffleArray(array) {
            const arr =[...array];
            for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
            return arr;
        }

        function startDiagnosis(reset = false) {
            if (reset) eraseCookie('ma_adv_system_v8');
            selectedQuestions = shuffleArray(questionsPool).slice(0, 10);
            currentIdx = 0; historyArr =[];
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentIdx];
            document.getElementById('q-counter').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentIdx > 0 ? 'visible' : 'hidden';

            const container = document.getElementById('options-container'); container.innerHTML = '';
            q.options.forEach((opt) => {
                const btn = document.createElement('button'); btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    historyArr.push({ q: q.q, a: opt.text, score: opt.score, mbti: opt.mbti });
                    currentIdx++;
                    if (currentIdx < 10) renderQuestion(); else showResult();
                };
                container.appendChild(btn);
            });
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            const revealScreen = document.getElementById('reveal-screen');
            revealScreen.classList.remove('hidden');
            setTimeout(() => { revealScreen.style.opacity = '1'; }, 50);
        }

        function revealResult() {
            document.getElementById('reveal-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            finalizeResultAndDisplay(false);
        }

        function finalizeResultAndDisplay(skipAnim) {
            const calc = calculateAdvancedScore(historyArr);
            const dataObj = { hist: historyArr, v: 8 };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(dataObj))));
            
            // URLを結果付きに更新（履歴に残す）
            try { window.history.replaceState(null, '', window.location.pathname + '?d=' + encoded); } catch(e){}
            
            processDisplay(skipAnim, calc);
        }

        function calculateAdvancedScore(hist) {
            let rawScore = 0; let mbtiVector = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, Fi:0, Fe:0, Se:0 };
            hist.forEach(h => {
                rawScore += h.score || 0;
                if(h.mbti) for (let key in h.mbti) mbtiVector[key] += h.mbti[key];
            });
            let final = Math.min(100, rawScore);
            if (final >= 94 && final < 100) final = 99.9;
            return { final, vector: mbtiVector, sim: 0.95 };
        }

        function processDisplay(skipAnim, calc) {
            const scoreEl = document.getElementById('result-score');
            const final = calc.final;
            
            document.getElementById('result-desc').innerText = "あなたの深層心理を解析しました。";
            document.getElementById('result-mbti').innerText = final >= 99 ? "ISFP-A" : "PROFILING...";
            
            if (final >= 99) document.getElementById('cert-badge').classList.remove('hidden');

            if (skipAnim) {
                scoreEl.innerText = final === 99.9 ? "99.9%" : `${final}%`;
                document.querySelectorAll('.anim-ready').forEach(el => el.classList.add('anim-show'));
                renderCharts([8, 7, 9, 8, 8]);
            } else {
                animateValue(scoreEl, 0, final, 2000, () => {
                    document.querySelectorAll('.anim-ready').forEach(el => el.classList.add('anim-show'));
                    renderCharts([8, 7, 9, 8, 8]);
                });
            }
        }

        function animateValue(obj, start, end, duration, callback) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                obj.innerText = `${current}%`;
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = end === 99.9 ? "99.9%" : `${end}%`;
                    if (callback) callback();
                }
            };
            window.requestAnimationFrame(step);
        }

        function renderCharts(dataArray) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['内的世界', '適応力', '共鳴度', '柔軟性', '安定度'],
                    datasets: [{ data: dataArray, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)' }]
                },
                options: { scales: { r: { min: 0, max: 10 } }, plugins: { legend: { display: false } } }
            });
        }

        function shareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(`私のマ度は【${document.getElementById('result-score').innerText}】でした！\n${url}`).then(() => alert("コピーしました"));
        }

        function resetAndRestart() { location.href = window.location.pathname; }

        // --- 修正の要：読み込み時の挙動 ---
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const dataParam = params.get('d');

            if (dataParam) {
                // 結果URLの場合：スタート画面を隠し、結果画面を即表示
                const data = decodeUrlData(dataParam);
                if (data && data.hist) {
                    historyArr = data.hist;
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    // 読み込み時はアニメーションをスキップして表示
                    const calc = calculateAdvancedScore(historyArr);
                    processDisplay(true, calc);
                    return;
                }
            }
            
            // 通常アクセスの場合
            if (getCookie('ma_adv_system_v8')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
