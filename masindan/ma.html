<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マ診断 - マ度測定システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f9fbf9;
            --accent-green: #2d4a36;
            --soft-green: #588157;
            --leaf-green: #a3b18a;
            --glass-white: rgba(255, 255, 255, 0.75);
            --text-main: #1b261e;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(163, 177, 138, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(45, 74, 54, 0.15) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #f1f5f2 100%);
            -webkit-font-smoothing: antialiased;
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1.25rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(45, 74, 54, 0.08);
            overflow: hidden;
            position: relative;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.2rem 1.6rem;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #ffffff;
            border-radius: 1.4rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            margin-bottom: 0.7rem;
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--soft-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 74, 54, 0.1);
        }

        .score-display {
            font-size: 6.5rem;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--accent-green);
            margin: 1.5rem 0;
            display: block;
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(45, 74, 54, 0.15);
        }

        .progress-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(45, 74, 54, 0.1);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.5);
        }

        .capture-flat-mode {
            background: #ffffff !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            box-shadow: none !important;
            border: 1px solid #f0f0f0 !important;
            width: 100% !important;
            padding: 40px !important;
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f4f1 0%, transparent 50%);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- スタート画面 -->
        <div id="start-screen" class="glass-panel p-10 md:p-14 text-center fade-in">
            <p class="text-[var(--soft-green)] font-serif-en tracking-[0.5em] text-[11px] mb-4 uppercase font-bold">Element Detection</p>
            <h1 class="text-5xl md:text-6xl font-bold mb-10 tracking-tight text-gray-800 font-outfit">マ診断</h1>
            
            <p class="text-gray-600 text-sm leading-relaxed mb-12 text-left">
                マ診断は、この質問の解答者に<strong class="text-[var(--accent-green)]">「マ度（マ要素）」</strong>が何%あるかがわかるものです。<br><br>
                全40問のユニークな質問から、完全にランダムに抽出された10問に直感でお答えください。
            </p>

            <div id="resume-container" class="hidden mb-10 p-6 bg-white/40 border border-white rounded-3xl">
                <p class="text-xs text-gray-500 mb-4 font-bold tracking-widest uppercase text-center">中断したデータがあります</p>
                <button onclick="resumeDiagnosis()" class="w-full py-4 btn-green text-sm mb-2 shadow-md">診断を再開する</button>
            </div>

            <button onclick="startDiagnosis()" class="w-full py-5 btn-green text-sm uppercase tracking-[0.25em] shadow-xl">
                分析を開始する
            </button>
        </div>

        <!-- 質問画面 -->
        <div id="quiz-screen" class="hidden glass-panel p-8 md:p-12 fade-in">
            <div class="flex justify-between items-center mb-10">
                <button onclick="goBack()" id="back-btn" class="text-[10px] tracking-widest font-bold text-gray-400 hover:text-[var(--accent-green)] transition-all flex items-center gap-1 invisible uppercase">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> 戻る
                </button>
                <div class="flex gap-3" id="progress-dots"></div>
                <span id="q-counter" class="text-xs font-outfit text-gray-400">01 / 10</span>
            </div>

            <div class="min-h-[10rem] mb-12 flex flex-col items-center text-center justify-center">
                <span id="q-cat" class="text-[9px] uppercase tracking-[0.4em] text-[var(--leaf-green)] mb-4 font-bold font-serif-en">Analysis</span>
                <h2 id="q-text" class="text-xl md:text-2xl font-bold text-[var(--accent-green)] leading-relaxed px-2"></h2>
            </div>

            <div id="options-container" class="space-y-1"></div>
        </div>

        <!-- 分析ローディング画面 -->
        <div id="loading-screen" class="hidden glass-panel p-12 md:p-16 text-center fade-in">
            <div class="mb-10 relative flex justify-center items-center">
                <svg class="animate-spin h-14 w-14 text-[var(--accent-green)]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-[var(--accent-green)] mb-6 font-outfit tracking-widest">CALCULATING...</h2>
            <div class="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden mb-6">
                <div id="calc-progress" class="h-full bg-[var(--accent-green)] transition-all ease-out" style="width: 0%; transition-duration: 2500ms;"></div>
            </div>
            <p class="text-[11px] text-gray-500 tracking-[0.2em] uppercase font-bold">マ度を精密算出しています</p>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden fade-in">
            <div id="capture-area" class="glass-panel text-center mb-8 bg-white" style="padding-bottom: 40px;">
                <div class="font-serif-en text-[var(--leaf-green)] tracking-[0.6em] text-[10px] mb-8 uppercase pt-10 font-bold">Analysis Report</div>
                
                <div class="mb-10">
                    <div class="text-[11px] text-gray-400 tracking-[0.4em] uppercase mb-4 font-bold">あなたのマ度（マ要素）</div>
                    <div class="font-outfit score-display" id="result-score">0.0%</div>
                </div>

                <div id="cert-badge" class="hidden mb-12">
                    <div class="py-2.5 px-8 bg-green-50/50 border border-[var(--leaf-green)] text-[var(--accent-green)] rounded-full inline-flex items-center gap-2 text-xs font-bold tracking-[0.3em]">
                        🌟 マ 本人認定
                    </div>
                </div>

                <div class="mb-10">
                    <div class="inline-block bg-[var(--leaf-green)] text-white px-8 py-2.5 rounded-full text-xs font-bold tracking-widest shadow-sm" id="result-mbti">分析中</div>
                </div>

                <div class="mb-12 flex justify-center bg-white/50 rounded-[2.5rem] p-8 border border-white mx-4 shadow-inner">
                    <canvas id="radarChart" width="300" height="300"></canvas>
                </div>

                <div class="text-left px-8 space-y-12 pb-10">
                    <div class="content-wrapper">
                        <h4 class="text-[10px] text-[var(--accent-green)] font-bold mb-4 uppercase tracking-[0.3em] border-b border-[var(--mint-green)] pb-2">特性解析</h4>
                        <p id="result-desc" class="text-sm text-gray-600 leading-loose"></p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="downloadImage('sns')" class="w-full py-5 btn-green text-sm uppercase shadow-xl">SNS用(正方形)を保存</button>
                <button onclick="downloadImage('full')" class="w-full py-4 text-[var(--accent-green)] font-bold text-xs tracking-widest uppercase border border-[var(--accent-green)] rounded-2xl hover:bg-white transition-all">フルレポートを保存</button>
                <button onclick="shareLink()" id="share-btn" class="w-full py-3 text-[10px] text-gray-400 tracking-widest uppercase border-b border-gray-200 hover:text-[var(--accent-green)] transition-all mt-4">結果を共有する</button>
            </div>
            
            <button onclick="resetAndRestart()" class="w-full mt-12 mb-10 text-[10px] text-gray-300 tracking-[0.4em] uppercase hover:text-gray-500 transition-all">最初からやり直す</button>
        </div>
    </div>

    <!-- SNS保存用(1080x1080) -->
    <div id="sns-export-area">
        <div style="font-family: 'Outfit', sans-serif; font-size: 36px; color: #2d4a36; letter-spacing: 0.6em; margin-bottom: 60px; font-weight: bold; text-transform: uppercase;">MA ANALYSIS</div>
        <div style="font-family: 'Outfit', sans-serif; font-size: 250px; font-weight: 800; color: #2d4a36; margin-bottom: 20px; line-height: 1;" id="sns-score">0.0%</div>
        <div style="background: #edf2f0; padding: 20px 60px; border-radius: 60px; font-size: 44px; color: #2d4a36; font-family: 'Noto Sans JP'; font-weight: bold; margin-bottom: 80px;" id="sns-mbti">ISFP-A</div>
        <div style="background: #ffffff; padding: 60px; border-radius: 80px; border: 2px solid #eee; width: 850px; display: flex; justify-content: center;">
            <canvas id="snsChart" width="700" height="600"></canvas>
        </div>
        <div style="margin-top: 100px; color: #8ca38a; font-size: 24px; letter-spacing: 0.5em; font-family: 'Cormorant Garamond'; font-weight: 600;">IDENTITY PORTRAIT</div>
    </div>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-10 py-3.5 rounded-full text-xs font-bold tracking-widest shadow-2xl opacity-0 transition-opacity duration-500 pointer-events-none z-50"></div>

    <script>

            { id: 38, q: "映画を観終わった後、一番最初にしたいことは？", cat: 2, m: 'F', options: [{text:"一人で静かに余韻に浸る", score:10}, {text:"一緒に観た人と感想を語り合う", score:8}, {text:"ネットで他の人の考察やレビューを読む", score:5}, {text:"特になし。すぐに日常に戻る", score:7}, {text:"面白かったシーンを反芻する", score:6}]},
            { id: 39, q: "プレゼントを選ぶとき、最も重視するのは？", cat: 2, m: 'F', options: [{text:"流行りのものや話題のアイテムを選ぶ", score:10}, {text:"相手が喜ぶ顔を想像して直感で選ぶ", score:8}, {text:"実用的で長く使えるものを選ぶ", score:4}, {text:"相手から直接欲しいものを聞く", score:6}, {text:"自分がもらって嬉しいものをあげる", score:7}]},
            { id: 40, q: "自分の部屋で、一番落ち着く場所は？", cat: 0, m: 'I', options: [{text:"ベッドやソファの上で寝転がっている時", score:10}, {text:"デスクに向かって作業している時", score:4}, {text:"窓際で外の景色を眺めている時", score:8}, {text:"お気に入りの椅子に深く腰掛けている時", score:7}, {text:"特に定位置はなく、どこでも落ち着く", score:6}]}
        ];

        let selectedQuestions = [];
        let currentIdx = 0;
        let totalScore = 0;
        let catScores = [0, 0, 0, 0, 0];
        let catCounts = [0, 0, 0, 0, 0];
        let mbtiScore = {I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0};
        let radarChart = null;

        function setCookie(name, val, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(val)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- 診断ロジック ---
        function startDiagnosis(reset = false) {
            if (reset) eraseCookie('ma_true_algo_perfect');
            
            // 完全シャッフルして10問を抽出 (1回の診断で質問が被ることはない)
            let shuffledPool = [...questionsPool].sort(() => Math.random() - 0.5);
            selectedQuestions = shuffledPool.slice(0, 10);

            currentIdx = 0; totalScore = 0;
            catScores = [0, 0, 0, 0, 0]; catCounts = [0, 0, 0, 0, 0];
            mbtiScore = {I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0};

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const dotCont = document.getElementById('progress-dots');
            dotCont.innerHTML = '';
            for(let i=0; i<10; i++) {
                const d = document.createElement('div');
                d.className = 'progress-dot';
                dotCont.appendChild(d);
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentIdx];
            document.getElementById('q-counter').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentIdx > 0 ? 'visible' : 'hidden';

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentIdx));

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            [...q.options].sort(() => Math.random() - 0.5).forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn fade-in';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            if(q.m) {
                if(opt.score >= 8) mbtiScore[q.m] += 2;
                else if(opt.score >= 5) mbtiScore[q.m] += 1;
            }
            totalScore += opt.score;
            catScores[q.cat] += opt.score;
            catCounts[q.cat]++;
            currentIdx++;

            saveToCookie();
            if (currentIdx < 10) renderQuestion();
            else showResult();
        }

        function goBack() {
            if (currentIdx <= 0) return;
            const saved = getCookie('ma_true_algo_perfect');
            if (saved) {
                // 戻る時は状態が複雑になるため、再開ボタンからのリロード等を推奨
            }
        }

        function saveToCookie() {
            const data = { idx: currentIdx, tot: totalScore, cs: catScores, cc: catCounts, mbti: mbtiScore, qids: selectedQuestions.map(sq => sq.id) };
            setCookie('ma_true_algo_perfect', JSON.stringify(data), 7);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            // プログレスバーのアニメーション
            setTimeout(() => {
                document.getElementById('calc-progress').style.width = '100%';
            }, 50);

            // ローディング演出後に結果画面へ
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                eraseCookie('ma_true_algo_perfect');
                
                const data = { s: totalScore, cs: catScores, cc: catCounts, m: mbtiScore };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const newUrl = window.location.pathname + '?d=' + encoded;
                window.history.pushState({path: newUrl}, '', newUrl);

                processDisplay();
            }, 2500);
        }

        function processDisplay() {
            // 純粋な計算式（10点 × 10問 = 100点満点）。本人が自身の回答を選べば確実に100%になる。
            const final = Math.min(100, (totalScore / 100) * 100);
            const displayScore = final === 100 ? "100.0" : final.toFixed(1);
            
            document.getElementById('result-score').innerText = `${displayScore}%`;
            document.getElementById('sns-score').innerText = `${displayScore}%`;

            if (final === 100) {
                document.getElementById('cert-badge').classList.remove('hidden');
            }

            const mMap = {"ISFP":"冒険家","ISFJ":"擁護者","ISTP":"巨匠","ISTJ":"管理者","INFP":"仲介者","INFJ":"提唱者","INTP":"論理学者","INTJ":"建築家","ESFP":"エンターテイナー","ESFJ":"領事","ESTP":"起業家","ESTJ":"幹部","ENFP":"広報運動家","ENFJ":"主人公","ENTP":"討論者","ENTJ":"指揮官"};
            const core = (mbtiScore.I >= mbtiScore.E ? "I" : "E") + (mbtiScore.S >= mbtiScore.N ? "S" : "N") + (mbtiScore.F >= mbtiScore.T ? "F" : "T") + (mbtiScore.P >= mbtiScore.J ? "P" : "J");
            
            const mbtiName = (final === 100) ? "ISFP-A (まさひろ)" : `${core} (${mMap[core] || '分析中'}) ${final >= 80 ? "-A" : "-T"}`;
            document.getElementById('result-mbti').innerText = mbtiName;
            document.getElementById('sns-mbti').innerText = mbtiName.split(' ')[0];

            document.getElementById('result-desc').innerText = final === 100 ? 
                "マ度 100.0% —— システムの計算により、あなたが他の誰でもない『まさひろ本人』であることが完全に証明されました。自分にとっての心地よさと、時に顔を出す成果への熱意や強いこだわり。矛盾のない等身大のその姿こそが、真の『マ』です。" : 
                "あなたには一定のマ要素が存在します。自分の直感や実績への意識、そして何気ない日常の感覚をより大切にすることで、さらなるマ度に近づくことができるでしょう。";

            // 一番スコアが低いカテゴリを補完して、もし100%だった場合は全項目MAXの正五角形にする
            let avg = catScores.map((s, i) => catCounts[i] > 0 ? s / catCounts[i] : (final / 10));
            if (final === 100) {
                avg = [10, 10, 10, 10, 10]; // マ本人ならグラフも完全体に
            }

            renderCharts(avg);
        }

        function renderCharts(avg) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const config = {
                type: 'radar',
                data: {
                    labels: ['内面', '現実', '共感', '柔軟', '安定'],
                    datasets: [{ data: avg, backgroundColor: 'rgba(58, 90, 64, 0.15)', borderColor: '#3a5a40', borderWidth: 3, pointRadius: 0 }]
                },
                options: { scales: { r: { min: 0, max: 10, ticks: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' }, pointLabels: { color: '#3a5a40', font: { size: 12, weight: 'bold', family: 'Noto Sans JP' } } } }, plugins: { legend: { display: false } }, animation: { duration: 1500 } }
            };
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, config);
            const snsCtx = document.getElementById('snsChart').getContext('2d');
            new Chart(snsCtx, { ...config, options: { ...config.options, scales: { r: { ...config.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40', family: 'Noto Sans JP' } } } } });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            showToast("画像を生成しています...");
            
            const target = document.getElementById(targetId);
            if(type === 'sns') target.style.left = '0';
            
            html2canvas(target, { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true,
                onclone: (cloned) => {
                    const clonedEl = cloned.getElementById(targetId);
                    clonedEl.classList.add('capture-flat-mode');
                    clonedEl.style.backdropFilter = "none";
                    clonedEl.style.background = "#ffffff";
                    clonedEl.querySelectorAll('.content-wrapper').forEach(b => {
                        b.style.marginBottom = '50px';
                        b.style.display = 'block';
                    });
                }
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') target.style.left = '-9999px';
                showToast("保存完了しました");
            });
        }

        // iOS(iPhone)ネイティブの共有メニュー(Share API)を使用
        function shareLink() {
            const url = window.location.href;
            const score = document.getElementById('result-score').innerText;
            const text = `私のマ度(マ要素)は【${score}】でした！\n#マ診断 #ISFP #自己分析\n`;

            if (navigator.share && /iphone|ipad|ipod|android/i.test(navigator.userAgent)) {
                navigator.share({ title: 'マ診断結果', text: text, url: url })
                .catch(() => fallbackCopy(text + '\n' + url));
            } else {
                fallbackCopy(text + '\n' + url);
            }
        }

        function fallbackCopy(text) {
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("リンクをコピーしました");
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_true_algo_perfect');
            if (saved) {
                const d = JSON.parse(saved);
                currentIdx = d.idx; totalScore = d.tot; catScores = d.cs; catCounts = d.cc; mbtiScore = d.mbti; 
                selectedQuestions = d.qids.map(id => questionsPool.find(qp => qp.id === id)).filter(x => x);
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                const dotCont = document.getElementById('progress-dots');
                dotCont.innerHTML = '';
                for(let i=0; i<10; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot';
                    dotCont.appendChild(dot);
                }
                renderQuestion();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resetAndRestart() { eraseCookie('ma_true_algo_perfect'); location.href = window.location.pathname; }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (d) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(d.split('&')[0]))));
                    totalScore = data.s || 0; catScores = data.cs || [0,0,0,0,0]; catCounts = data.cc || [1,1,1,1,1]; mbtiScore = data.m || {};
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    setTimeout(processDisplay, 300);
                } catch(e) {}
            } else if (getCookie('ma_true_algo_perfect')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
