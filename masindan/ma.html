<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-base: #f9fbf9;
            --accent-green: #2d4a36;
            --soft-green: #588157;
            --leaf-green: #a3b18a;
            --glass-white: rgba(255, 255, 255, 0.7);
            --text-main: #1b261e;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(163, 177, 138, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(45, 74, 54, 0.15) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #f1f5f2 100%);
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1.25rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(45, 74, 54, 0.1);
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.15rem 1.5rem;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #ffffff;
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.95rem;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            margin-bottom: 0.65rem;
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--soft-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 74, 54, 0.1);
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .btn-green:hover { transform: translateY(-1px); filter: brightness(1.1); }

        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(45, 74, 54, 0.1);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.5);
        }

        .log-box {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #fff;
            border-radius: 1.5rem;
            padding: 1.25rem;
            font-size: 0.7rem;
            font-family: monospace;
            color: #555;
            max-height: 220px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f7f1 0%, transparent 50%);
        }
    </style>
</head>

            { q: "雨上がりのアスファルトの匂いに対してどう思う？", cat: 1, mbti: 'Se', options: [{text:"本能的な安らぎを感じ、深く呼吸したくなる", score:10}, {text:"雨が止んだという事実として受け取る", score:4}, {text:"湿っぽくてあまり好きではない", score:3}, {text:"子供の頃の記憶が蘇る", score:8}, {text:"服や靴の汚れを心配する", score:5}]},
            { q: "褒められた時、一番嬉しい言葉はどれ？", cat: 0, mbti: 'Fi', options: [{text:"「あなたらしいね」「独特のセンスだね」", score:10}, {text:"「いつも優しいね」「安心するよ」", score:8}, {text:"「仕事が早いね」「頼りになるね」", score:4}, {text:"「面白いね」「刺激的だね」", score:6}, {text:"「何でもできるね」", score:5}]},
            { q: "音楽を聴くとき、何に最も惹かれる？", cat: 2, mbti: 'Se', options: [{text:"音色や響き、全体の「雰囲気」", score:10}, {text:"歌詞の内容やメッセージ", score:6}, {text:"リズムやメロディの心地よさ", score:9}, {text:"技術や構成の巧みさ", score:4}, {text:"思い出とリンクする感情", score:8}]},
            { q: "週末の誘い。仲の良い友人からだが、少し疲れている時は？", cat: 0, mbti: 'I', options: [{text:"「今日はゆっくりしたい」と一人の時間を優先する", score:10}, {text:"家で過ごす方が回復するので断る", score:8}, {text:"とりあえず短時間だけ顔を出す", score:5}, {text:"誰かと会った方が元気になれる気がするので行く", score:3}, {text:"自分から別の遊びを提案して盛り上げる", score:2}]}
        ];

        // 50問まで疑似生成
        while(questionsPool.length < 50) {
            const b = questionsPool[questionsPool.length % 20];
            questionsPool.push({...b, q: b.q + "(深層次元)"});
        }

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let categoryScores = [0, 0, 0, 0, 0];
        let categoryCounts = [0, 0, 0, 0, 0];
        let mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };
        let history = []; 
        let radarChart = null;

        // --- クッキー ---
        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- 分析開始 ---
        function startDiagnosis(isReset = false) {
            if (isReset) eraseCookie('ma_final_truth');
            selectedQuestions = [...questionsPool].sort(() => Math.random() - 0.5).slice(0, 15);
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];
            mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const dotContainer = document.getElementById('progress-dots');
            dotContainer.innerHTML = '';
            for(let i=0; i<15; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotContainer.appendChild(dot);
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 15`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentQuestionIndex));

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const options = [...q.options].sort(() => Math.random() - 0.5);
            options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn fade-in';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            const m = q.mbti;
            if(m) {
                if(opt.score >= 8) mbtiCounts[m] += 2;
                else if(opt.score >= 5) mbtiCounts[m] += 1;
            }
            history.push({ q: q.q, a: opt.text, score: opt.score, cat: q.cat, m: m });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;
            currentQuestionIndex++;

            saveToCookie();

            if (currentQuestionIndex < 15) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            if(last.m) mbtiCounts[last.m] -= (last.score >= 8 ? 2 : 1);
            renderQuestion();
        }

        function saveToCookie() {
            const data = {
                idx: currentQuestionIndex, tot: totalScore, cs: categoryScores, cc: categoryCounts,
                hist: history, mbti: mbtiCounts, qids: selectedQuestions.map(q => questionsPool.indexOf(q))
            };
            setCookie('ma_final_truth', JSON.stringify(data), 7);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            eraseCookie('ma_final_truth');
            
            const data = { s: totalScore, cs: categoryScores, cc: categoryCounts, m: mbtiCounts };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const newUrl = window.location.pathname + '?d=' + encoded;
            window.history.pushState({path: newUrl}, '', newUrl);

            setTimeout(processResultDisplay, 200);
        }

        function processResultDisplay() {
            const finalScore = Math.min(100, Math.round((totalScore / 150) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;
            document.getElementById('sns-score').innerText = `${finalScore}%`;

            if (finalScore >= 98) document.getElementById('cert-badge').classList.remove('hidden');

            // MBTI 16次元予測アルゴリズム
            const i_e = mbtiCounts.I >= 3 ? "I" : "E";
            const s_n = mbtiCounts.S >= 4 ? "S" : "N";
            const f_t = mbtiCounts.F >= 3 ? "F" : "T";
            const p_j = mbtiCounts.P >= 3 ? "P" : "J";
            const a_t = (finalScore >= 80) ? "-A" : "-T";
            
            const mbtiMap = {"ISFP":"冒険家","ISFJ":"擁護者","ISTP":"巨匠","ISTJ":"管理者","INFP":"仲介者","INFJ":"提唱者","INTP":"論理学者","INTJ":"建築家","ESFP":"エンターテイナー","ESFJ":"領事","ESTP":"起業家","ESTJ":"幹部","ENFP":"広報運動家","ENFJ":"主人公","ENTP":"討論者","ENTJ":"指揮官"};
            const core = i_e+s_n+f_t+p_j;
            const mbtiName = (finalScore >= 97) ? "ISFP-A (冒険家)" : `${core} (${mbtiMap[core] || '分析中'}) ${a_t}`;
            document.getElementById('result-mbti').innerText = mbtiName;
            document.getElementById('sns-mbti').innerText = mbtiName.split(' ')[0];

            document.getElementById('result-desc').innerText = finalScore >= 95 ? 
                "あなたは飾らない自然体の振る舞いと、何ものにも代えがたい独自の宇宙を完全に一致させています。物事の成果や正当性への意欲を持ちながらも、今この瞬間の「手触り」を誰よりも信じて生きるその在り方は、まさに真の『マ』の正体です。" : 
                "あなたは周囲との調和と、自己の感覚のバランスを高い次元で保っている安定した存在です。";

            const tips = [
                "その「頑固さ」は、あなただけの聖域を守るための誇りです。",
                "言葉にできない「しっくり感」を、人生の唯一の指針にしてください。",
                "「成果」への渇望も、マの重要なスパイス。存分に発揮してください。",
                "義務感さえも自分のリズムに変えてしまう。そのしなやかさを大切に。"
            ];
            document.getElementById('result-advice').innerText = tips[finalScore % tips.length];

            // ログ
            let logText = "";
            history.forEach((h, i) => { logText += `Q${String(i+1).padStart(2,'0')}: ${h.q}\n=> ${h.a} (Score: ${h.score})\n\n`; });
            document.getElementById('adjustment-log').innerText = logText;

            renderCharts();
        }

        function renderCharts() {
            const avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            const config = {
                type: 'radar',
                data: {
                    labels: ['内面', '現実', '共感', '柔軟', '安定'],
                    datasets: [{
                        data: avgScores,
                        backgroundColor: 'rgba(58, 90, 64, 0.15)',
                        borderColor: '#3a5a40',
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0, max: 10, ticks: { display: false },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { color: '#3a5a40', font: { size: 12, weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            };
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart'), config);
            const snsCtx = document.getElementById('snsChart').getContext('2d');
            new Chart(snsCtx, { ...config, options: { ...config.options, scales: { r: { ...config.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40' } } } } });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            if(type === 'sns') document.getElementById('sns-export-area').style.left = '0';
            
            html2canvas(document.getElementById(targetId), { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true,
                onclone: (clonedDoc) => {
                    clonedDoc.getElementById(targetId).style.backdropFilter = "none";
                    clonedDoc.getElementById(targetId).style.background = "#ffffff";
                }
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') document.getElementById('sns-export-area').style.left = '-9999px';
            });
        }

        // iPhone対応コピー
        function shareLink() {
            const url = window.location.href;
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = `私のマ度は【${document.getElementById('result-score').innerText}】、予想タイプは【${document.getElementById('result-mbti').innerText}】でした！\n#マ診断 #ISFP #自己分析\n${url}`;
            
            if (navigator.userAgent.match(/iphone|ipad|ipod/i)) {
                const range = document.createRange();
                range.selectNodeContents(dummy);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                dummy.setSelectionRange(0, 999999);
            } else { dummy.select(); }
            
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("リンクをコピーしました");
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_final_truth');
            if (saved) {
                const d = JSON.parse(saved);
                currentQuestionIndex = d.idx; totalScore = d.tot;
                categoryScores = d.cs; categoryCounts = d.cc;
                history = d.hist; mbtiCounts = d.mbti; 
                selectedQuestions = d.qids.map(id => questionsPool[id]);
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                
                const dotContainer = document.getElementById('progress-dots');
                dotContainer.innerHTML = '';
                for(let i=0; i<15; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot';
                    dotContainer.appendChild(dot);
                }
                renderQuestion();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resetAndRestart() { eraseCookie('ma_final_truth'); location.href = window.location.pathname; }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('d')) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(params.get('d')))));
                    totalScore = data.s || 0; categoryScores = data.cs || [0,0,0,0,0]; categoryCounts = data.cc || [1,1,1,1,1]; mbtiCounts = data.m || {};
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    setTimeout(processResultDisplay, 300);
                } catch(e) {}
            } else if (getCookie('ma_final_truth')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
