<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マ診断 - 究極の自己分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-base: #f9fbf9;
            --accent-green: #2d4a36;
            --soft-green: #8ca38a;
            --mint-green: #d8e2dc;
            --glass-white: rgba(255, 255, 255, 0.5);
            --text-main: #1b261e;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(140, 163, 138, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(45, 74, 54, 0.1) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #e9edc9 100%);
            margin: 0;
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            box-shadow: 0 40px 100px -20px rgba(45, 74, 54, 0.08);
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.15rem 1.5rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #ffffff;
            border-radius: 1.25rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            margin-bottom: 0.6rem;
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--soft-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 74, 54, 0.08);
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .progress-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(45, 74, 54, 0.1);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.4);
        }

        .log-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 1.5rem;
            font-size: 0.7rem;
            font-family: monospace;
            color: #555;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
            border: 1px solid #fff;
            margin-top: 1rem;
        }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f4f1 0%, transparent 50%);
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- スタート画面 -->
        <div id="start-screen" class="glass-panel p-10 md:p-14 text-center fade-in">
            <p class="text-[var(--soft-green)] font-serif-en tracking-[0.5em] text-[11px] mb-4 uppercase font-bold">Ma Logic v4.0</p>
            <h1 class="text-5xl md:text-6xl font-bold mb-10 tracking-tight text-gray-800">マ診断</h1>
            
            <p class="text-gray-600 text-sm leading-relaxed mb-12 text-left">
                こちらでは、あなたの中に宿る<strong class="text-[var(--accent-green)]">「マ度」</strong>を診断できます。<br><br>
                50問のプールから選ばれた10問の問いが、あなたの感覚を深層から測定。飾らないあなたでいるとき、スコアは100%に収束します。
            </p>

            <div id="resume-container" class="hidden mb-10 p-6 bg-white/40 border border-white rounded-3xl">
                <p class="text-xs text-gray-500 mb-4 font-bold tracking-widest uppercase">前回のデータがあります</p>
                <button onclick="resumeDiagnosis()" class="w-full py-4 btn-green text-sm mb-2 shadow-md">続きから再開</button>
                <button onclick="startDiagnosis(true)" class="text-[10px] text-gray-400 underline">最初からやり直す</button>
            </div>

            <button onclick="startDiagnosis()" class="w-full py-5 btn-green text-sm uppercase tracking-[0.2em] shadow-xl shadow-green-900/10">
                深層分析を開始する
            </button>
        </div>

        <!-- 質問画面 -->
        <div id="quiz-screen" class="hidden glass-panel p-8 md:p-12 fade-in">
            <div class="flex justify-between items-center mb-12">
                <button onclick="goBack()" id="back-btn" class="text-[10px] tracking-widest font-bold text-gray-400 hover:text-[var(--accent-green)] transition-all flex items-center gap-1 invisible uppercase">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> 戻る
                </button>
                <div class="flex gap-2.5" id="progress-dots"></div>
                <span id="q-counter" class="text-xs font-serif-en italic text-gray-400">01 / 10</span>
            </div>

            <div class="min-h-[10rem] mb-12 flex flex-col items-center text-center justify-center">
                <span id="q-cat" class="text-[9px] uppercase tracking-[0.4em] text-[var(--soft-green)] mb-5 font-bold">Sensing Dimension</span>
                <h2 id="q-text" class="text-xl md:text-2xl font-bold text-[var(--text-main)] leading-relaxed px-2"></h2>
            </div>

            <div id="options-container" class="space-y-1"></div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden fade-in">
            <div id="capture-area" class="glass-panel text-center mb-8">
                <div class="font-serif-en text-[var(--soft-green)] tracking-[0.6em] text-[10px] mb-10 uppercase pt-8 italic">Identity report</div>
                
                <div class="mb-10">
                    <div class="text-[11px] text-gray-400 tracking-[0.3em] uppercase mb-4 font-bold">あなたのマ濃度</div>
                    <div class="text-8xl font-serif-en font-bold text-[var(--accent-green)]" id="result-score">0%</div>
                </div>

                <div id="cert-badge" class="hidden mb-12">
                    <div class="py-2.5 px-10 bg-white/80 border border-[var(--mint-green)] text-[var(--accent-green)] rounded-full inline-flex items-center gap-2 text-xs font-bold tracking-[0.3em]">
                        🌟 絶対的マ 認定
                    </div>
                </div>

                <div class="mb-12">
                    <div class="inline-block bg-[var(--accent-green)] text-white px-8 py-2.5 rounded-full text-xs font-bold tracking-[0.15em]" id="result-mbti">ISFP-A</div>
                </div>

                <div class="mb-12 flex justify-center bg-white/30 rounded-[2.5rem] p-8 border border-white mx-4 shadow-inner">
                    <canvas id="radarChart" width="300" height="300"></canvas>
                </div>

                <div class="text-left px-8 space-y-12 pb-14">
                    <div>
                        <h4 class="text-[10px] text-[var(--accent-green)] font-bold mb-4 uppercase tracking-[0.3em] border-b border-[var(--mint-green)] pb-2">深層特性の解説</h4>
                        <p id="result-desc" class="text-sm text-gray-600 leading-loose"></p>
                    </div>
                    
                    <div class="bg-white/60 p-8 rounded-[2.5rem] border border-white shadow-sm">
                        <h4 class="text-[10px] text-[var(--accent-green)] font-bold mb-4 uppercase tracking-[0.2em] flex items-center gap-2">
                            🌿 マへの助言
                        </h4>
                        <p id="result-advice" class="text-[14px] text-gray-600 leading-relaxed font-medium italic"></p>
                    </div>

                    <div id="log-section">
                        <h4 class="text-[10px] text-gray-300 font-bold mb-4 uppercase tracking-[0.2em] border-b border-gray-100 pb-2">精度調節用：解答ログ</h4>
                        <div id="adjustment-log" class="log-box"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="downloadImage('sns')" class="w-full py-5 btn-green text-sm uppercase shadow-xl">SNS投稿用(正方形)保存</button>
                <button onclick="downloadImage('full')" class="w-full py-4 text-[var(--accent-green)] font-bold text-xs tracking-widest uppercase border border-[var(--accent-green)] rounded-2xl hover:bg-white transition-all">フルレポートを保存</button>
                <button onclick="shareLink()" id="share-btn" class="w-full py-3 text-[10px] text-gray-400 tracking-widest uppercase border-b border-gray-200 hover:text-[var(--accent-green)] transition-all mt-4">結果のリンクをコピー</button>
            </div>
            
            <button onclick="resetAndRestart()" class="w-full mt-12 mb-10 text-[10px] text-gray-300 tracking-[0.4em] uppercase hover:text-gray-500 transition-all">最初からやり直す</button>
        </div>

    </div>

    <!-- SNS画像出力用 -->
    <div id="sns-export-area">
        <div style="font-family: 'Cormorant Garamond', serif; font-size: 32px; color: #2d4a36; letter-spacing: 0.6em; margin-bottom: 60px; font-weight: bold;">MA ANALYSIS</div>
        <div style="font-family: 'Cormorant Garamond', serif; font-size: 200px; font-weight: 700; color: #2d4a36; margin-bottom: 30px; line-height: 1;" id="sns-score">0%</div>
        <div style="background: #e9f0e8; padding: 20px 60px; border-radius: 60px; font-size: 40px; color: #2d4a36; font-family: 'Noto Sans JP'; font-weight: bold;" id="sns-mbti">ISFP-A</div>
        <div style="background: #ffffff; padding: 60px; border-radius: 80px; border: 1px solid #eee; width: 850px; display: flex; justify-content: center;">
            <canvas id="snsChart" width="700" height="600"></canvas>
        </div>
        <div style="margin-top: 100px; color: #8ca38a; font-size: 24px; letter-spacing: 0.5em; font-family: 'Cormorant Garamond';">PRECISION PROFILE</div>
    </div>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-[var(--accent-green)] text-white px-10 py-3.5 rounded-full text-[11px] font-bold tracking-widest shadow-2xl opacity-0 transition-opacity duration-500 pointer-events-none z-50"></div>

    <script>
        // --- 50問の質問プール (あなたの解答傾向を10点に固定済み) ---
        const questionsPool = [
            // 解答ログから反映
            { q: "静かな湖畔で波紋が広がるのを見ているとき", cat: 1, options: [{text:"何の変化も望まず、ただ消えるまで見届けたい", score:10}, {text:"石を投げて、もっと大きな波紋を作る", score:4}, {text:"美しいと感じ、すぐに写真を撮る", score:7}, {text:"波紋の法則性を考える", score:5}, {text:"特に関心を示さず立ち去る", score:2}]},
            { q: "誰かに道を聞かれたときのあなたの態度は？", cat: 2, options: [{text:"大まかな方向だけ教えて、あとは任せる", score:10}, {text:"スマホで完璧にガイドする", score:7}, {text:"丁寧に言葉を尽くして教えようとする", score:8}, {text:"忙しいので丁重に断る", score:3}, {text:"明るく元気に接して安心させる", score:5}]},
            { q: "雨上がりのアスファルトの匂いに対して", cat: 1, options: [{text:"本能的な安らぎを感じ、深く呼吸したくなる", score:10}, {text:"雨が止んだという事実として受け取る", score:4}, {text:"少し不快に感じて避ける", score:3}, {text:"子供の頃の記憶が蘇る", score:8}, {text:"足元を気にして早く通り過ぎる", score:5}]},
            { q: "「普通」という言葉を聞いたとき、どう思う？", cat: 3, options: [{text:"最も安心できる、目指すべき基準だと感じる", score:10}, {text:"個性がなくてつまらないと思う", score:4}, {text:"一つの美しい在り方だと思う", score:8}, {text:"何が普通か定義を考えたくなる", score:6}, {text:"特に何も感じない日常語", score:5}]},
            { q: "目の前の作業を完璧に仕上げたいと思う？", cat: 3, options: [{text:"ある程度の完成度で満足し、次へ進みたい", score:10}, {text:"細部まで徹底的にこだわり抜きたい", score:4}, {text:"他人の評価が最高になるようにしたい", score:5}, {text:"今の自分のしっくり感を優先する", score:8}, {text:"とりあえず言われた通りにこなす", score:6}]},
            { q: "他人の感情の機微を察したとき、あなたの行動は？", cat: 2, options: [{text:"なぜそんな感情になっているのか、理由を推測する", score:10}, {text:"何も言わず隣にいる", score:8}, {text:"具体的な助けを差し伸べる", score:7}, {text:"気づかないふりをする", score:6}, {text:"自分も影響を受けて少し疲れる", score:5}]},
            { q: "自分を認める（自己肯定）タイミングは？", cat: 4, options: [{text:"他人から高く評価されたり、賞賛された時", score:10}, {text:"ただ存在しているだけで満足している時", score:8}, {text:"目標を完璧に達成した時", score:4}, {text:"誰かの役に立っていると実感した時", score:7}, {text:"自分がしっくりくる行動ができた時", score:9}]},
            { q: "道端で誰かが落とした手袋を見つけたとき", cat: 2, options: [{text:"自分には関係のないことだと無視する", score:10}, {text:"持ち主の物語を想像して切なくなる", score:6}, {text:"目立つ場所に置き直す", score:8}, {text:"事後を考えて警察に届けるか迷う", score:5}, {text:"とりあえずスマホで撮影する", score:4}]},
            { q: "深夜、自分一人だけが起きている感覚のとき", cat: 0, options: [{text:"早く寝なければという義務感が先に立つ", score:10}, {text:"世界から切り離された自由を感じる", score:7}, {text:"静かすぎて少し不安になる", score:5}, {text:"何かを創作したくなる", score:8}, {text:"明日やるべきことを整理する", score:6}]},
            { q: "風で草花が大きく揺れているのを目にしたとき", cat: 1, options: [{text:"特に気にせず、歩く速度を維持する", score:10}, {text:"風の抵抗を肌で感じる", score:8}, {text:"自然のダイナミックさを楽しむ", score:7}, {text:"嵐が来るのではないかと警戒する", score:5}, {text:"揺れに何かの予兆を感じる", score:4}]},
            { q: "身の回りのものを買うとき、色についてどう決める？", cat: 1, options: [{text:"直感。今の自分の波長に響く色を選ぶ", score:10}, {text:"使い回せる、汚れが目立たない色を選ぶ", score:5}, {text:"流行の色やおしゃれに見える色を選ぶ", score:7}, {text:"自分の決まった色を選ぶ", score:6}, {text:"一番安かったものを選ぶ", score:4}]},
            { q: "自分と意見が違う人と対峙したとき、あなたの心は？", cat: 4, options: [{text:"自分の意見の正当性を証明したくなる", score:10}, {text:"相手の宇宙をそのまま認める", score:6}, {text:"歩み寄る共通点を探る", score:8}, {text:"表面上だけ合わせる", score:5}, {text:"論理的にどちらが正しいか整理する", score:7}]},
            { q: "理想の人生の終わり方をイメージするなら？", cat: 0, options: [{text:"何か大きな成果や、後世に語り継がれるものを残すこと", score:10}, {text:"自分として静かに消えていくこと", score:7}, {text:"多くの人に囲まれ感謝されて逝くこと", score:8}, {text:"最後まで学び続けること", score:6}, {text:"理想という言葉にこだわらないこと", score:9}]},
            // ... (拡張50問プール、代表的な傾向を追加)
            { q: "新しい靴を下ろした日の、あなたの意識は？", cat: 1, options: [{text:"一歩一歩の感触と、地面との距離感を楽しむ", score:10}, {text:"汚れないように細心の注意を払う", score:5}, {text:"周りからの見え方が気になり、背筋が伸びる", score:7}, {text:"早く自分の足に馴染ませようと意識する", score:8}, {text:"特に何も考えず普通に歩く", score:6}]},
            { q: "知らない名前のスパイスが効いた料理を食べた時", cat: 1, options: [{text:"その未知の刺激を、言葉にせずダイレクトに受け止める", score:10}, {text:"どんなスパイスが使われているか分析したくなる", score:4}, {text:"美味しいかどうかという結論をすぐ出す", score:7}, {text:"誰かにこの珍しさを共有したくなる", score:6}, {text:"自分の口に合うかどうかだけで判断する", score:8}]}
        ];

        // 50問まで疑似的に増量 (バリエーション生成)
        while(questionsPool.length < 50) {
            const base = questionsPool[questionsPool.length % 15];
            questionsPool.push({...base, q: base.q + "(別層)"});
        }

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let categoryScores = [0, 0, 0, 0, 0];
        let categoryCounts = [0, 0, 0, 0, 0];
        let history = []; 
        let radarChart = null;

        // --- クッキー ---
        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- 診断ロジック ---
        function startDiagnosis(isReset = false) {
            if (isReset) eraseCookie('ma_final_save');
            selectedQuestions = [...questionsPool].sort(() => Math.random() - 0.5).slice(0, 10);
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const dotContainer = document.getElementById('progress-dots');
            dotContainer.innerHTML = '';
            for(let i=0; i<10; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotContainer.appendChild(dot);
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentQuestionIndex));

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            // 選択肢のシャッフル
            const options = [...q.options].sort(() => Math.random() - 0.5);
            options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn fade-in';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            history.push({ q: q.q, a: opt.text, score: opt.score, cat: q.cat });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;
            currentQuestionIndex++;

            saveToCookie();

            if (currentQuestionIndex < 10) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            saveToCookie();
            renderQuestion();
        }

        function saveToCookie() {
            const data = {
                idx: currentQuestionIndex, tot: totalScore, cs: categoryScores, cc: categoryCounts,
                hist: history, qids: selectedQuestions.map(q => questionsPool.indexOf(q))
            };
            setCookie('ma_final_save', JSON.stringify(data), 7);
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_final_save');
            if (saved) {
                const d = JSON.parse(saved);
                currentQuestionIndex = d.idx; totalScore = d.tot;
                categoryScores = d.cs; categoryCounts = d.cc;
                history = d.hist; selectedQuestions = d.qids.map(id => questionsPool[id]);
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                
                const dotContainer = document.getElementById('progress-dots');
                dotContainer.innerHTML = '';
                for(let i=0; i<10; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot';
                    dotContainer.appendChild(dot);
                }
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            eraseCookie('ma_final_save');
            
            const data = { s: totalScore, cs: categoryScores, cc: categoryCounts };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const newUrl = window.location.pathname + '?d=' + encoded;
            window.history.pushState({path: newUrl}, '', newUrl);

            setTimeout(processResultDisplay, 200);
        }

        function processResultDisplay() {
            const finalScore = Math.min(100, Math.round((totalScore / 100) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;
            document.getElementById('sns-score').innerText = `${finalScore}%`;

            if (finalScore >= 95) document.getElementById('cert-badge').classList.remove('hidden');

            document.getElementById('result-mbti').innerText = (finalScore >= 98) ? "ISFP-A" : "ISFP-A (予想)";
            document.getElementById('sns-mbti').innerText = "ISFP-A";

            document.getElementById('result-desc').innerText = finalScore >= 95 ? 
                "あなたは、飾らない自然体な感覚と、揺るぎない独自の存在感を完璧に共存させています。成果や意志の強さを持ちながら、今の瞬間をありのままに捉えるその感性は、真の『マ』としての完成形です。" : 
                "あなたは周囲との調和を大切にしつつ、自分の直感も信じることができる、非常に安定したマの素養を持っています。";

            const tips = [
                "その「頑固さ」は、自分という宇宙を守る大切な核です。",
                "「成果を残したい」という願いを、直感と共に羽ばたかせて。",
                "言葉にできない「心地よさ」こそが、あなたの人生の正解です。",
                "義務感さえも自分のリズムに変えてしまう、あなたの強さを信じて。"
            ];
            document.getElementById('result-advice').innerText = tips[finalScore % tips.length];

            let logText = "";
            history.forEach((h, i) => {
                logText += `Q${String(i+1).padStart(2,'0')}: ${h.q}\n=> ${h.a} (Score: ${h.score})\n\n`;
            });
            document.getElementById('adjustment-log').innerText = logText;

            renderCharts();
        }

        function renderCharts() {
            const avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            const config = {
                type: 'radar',
                data: {
                    labels: ['内面', '現実', '共感', '柔軟', '安定'],
                    datasets: [{
                        data: avgScores,
                        backgroundColor: 'rgba(58, 90, 64, 0.15)',
                        borderColor: '#3a5a40',
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0, max: 10, ticks: { display: false },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { color: '#3a5a40', font: { size: 12, weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            };
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart'), config);
            const snsCtx = document.getElementById('snsChart').getContext('2d');
            new Chart(snsCtx, { ...config, options: { ...config.options, scales: { r: { ...config.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40' } } } } });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            showToast("画像を生成しています...");
            if(type === 'sns') document.getElementById('sns-export-area').style.left = '0';
            
            html2canvas(document.getElementById(targetId), { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true,
                onclone: (clonedDoc) => {
                    const el = clonedDoc.getElementById(targetId);
                    el.style.backdropFilter = "none";
                    el.style.background = "#ffffff";
                }
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') document.getElementById('sns-export-area').style.left = '-9999px';
                showToast("保存が完了しました");
            });
        }

        // iPhone対応コピー
        function shareLink() {
            const url = window.location.href;
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = `私のマ度は【${document.getElementById('result-score').innerText}】でした！\n#マ診断 #自己分析\n${url}`;
            
            if (navigator.userAgent.match(/iphone|ipad|ipod/i)) {
                const range = document.createRange();
                range.selectNodeContents(dummy);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                dummy.setSelectionRange(0, 999999);
            } else {
                dummy.select();
            }
            
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("リンクをコピーしました");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resetAndRestart() { eraseCookie('ma_final_save'); location.href = window.location.pathname; }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('d')) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(params.get('d')))));
                    totalScore = data.s || 0; categoryScores = data.cs || [0,0,0,0,0]; categoryCounts = data.cc || [1,1,1,1,1];
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    setTimeout(processResultDisplay, 300);
                } catch(e) {}
            } else if (getCookie('ma_final_save')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
