<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マ診断 - 超高精度自己分析システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-color: #080a0f;
            --panel-bg: rgba(17, 22, 30, 0.95);
            --accent-primary: #58a6ff;
            --accent-dim: rgba(88, 166, 255, 0.1);
            --gold-cert: #ffd700;
            --text-main: #d1d9e1;
            --text-muted: #8b949e;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(88, 166, 255, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(255, 215, 0, 0.04) 0%, transparent 45%);
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 580px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.1rem 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.85rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .option-btn:hover, .option-btn:active {
            background: var(--accent-dim);
            border-color: rgba(88, 166, 255, 0.4);
            color: #ffffff;
            transform: translateX(6px);
        }

        .text-score-glow {
            color: #79c0ff;
            text-shadow: 0 0 20px rgba(121, 192, 255, 0.7);
        }

        .cert-badge {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.05) 100%);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 2rem;
            padding: 0.5rem 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.25);
            animation: pulseGold 3s infinite alternate;
        }

        @keyframes pulseGold {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.04); filter: brightness(1.25); }
        }

        #capture-area {
            background-color: var(--bg-color);
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
        }

        .param-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.85rem;
        }

        .param-bar-bg {
            width: 60%;
            height: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .param-bar-fill {
            height: 100%;
            background: var(--accent-primary);
            box-shadow: 0 0 12px var(--accent-primary);
            transition: width 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-wrapper z-10">
        
        <!-- スタート画面 -->
        <div id="start-screen" class="glass-panel p-8 md:p-12 text-center fade-in">
            <h2 class="text-[var(--accent-primary)] tracking-[0.4em] text-xs mb-3 uppercase font-bold">自己分析診断システム</h2>
            <h1 class="text-4xl md:text-6xl font-bold mb-6 tracking-[0.2em] text-white">マ診断</h1>
            <div class="w-12 h-[2px] bg-[var(--accent-primary)] mx-auto mb-8 opacity-60"></div>
            
            <p class="text-[var(--text-muted)] text-sm leading-loose mb-10 text-left">
                こちらでは、あなたの中に宿る<strong class="text-white">「マ要素」</strong>を精密に診断できます。<br><br>
                五感、生活リズム、価値観を独自のアルゴリズムで解析。なお、結果に表示される性格タイプは回答傾向からの予想値です。<br><br>
                飾らない等身大の感覚で、あなたの「マ」を確かめてみてください。
            </p>
            
            <!-- 再開セクション (クッキー) -->
            <div id="resume-container" class="hidden mb-8 p-6 bg-blue-900/20 border border-blue-500/30 rounded-2xl text-center">
                <p class="text-xs text-blue-300 mb-4 font-bold tracking-widest">中断した診断を再開できます</p>
                <button onclick="resumeDiagnosis()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm mb-3 hover:bg-blue-500 transition-all">続きから再開する</button>
                <button onclick="startDiagnosis(true)" class="text-[10px] text-gray-500 underline uppercase tracking-widest hover:text-gray-300">最初からやり直す</button>
            </div>

            <button id="start-btn" onclick="startDiagnosis()" class="w-full py-5 border border-[var(--accent-primary)] text-[var(--accent-primary)] rounded-xl hover:bg-[var(--accent-primary)] hover:text-[#080a0f] transition-all duration-500 font-bold tracking-[0.3em] text-sm uppercase">
                分析を開始する
            </button>
        </div>

        <!-- 質問画面 -->
        <div id="quiz-screen" class="hidden glass-panel p-6 md:p-10 fade-in">
            <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-5">
                <button onclick="goBack()" id="back-btn" class="flex items-center gap-1 text-[10px] font-bold opacity-60 hover:opacity-100 hover:text-blue-400 invisible transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    戻る
                </button>
                <div class="text-center">
                    <span id="q-counter" class="text-2xl font-serif-en text-[var(--accent-primary)] italic">01 / 12</span>
                </div>
                <div class="w-20 h-1 bg-gray-800 rounded-full overflow-hidden">
                    <div id="q-progress" class="h-full bg-[var(--accent-primary)] transition-all duration-500" style="width: 8%"></div>
                </div>
            </div>

            <div class="min-h-[7rem] mb-10 flex items-center text-center justify-center">
                <h2 id="q-text" class="text-xl font-medium leading-relaxed text-gray-100 tracking-wide px-4"></h2>
            </div>

            <div id="options-container" class="space-y-4"></div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden fade-in">
            
            <div id="capture-area" class="glass-panel text-center mb-6">
                <h2 class="text-[var(--accent-primary)] tracking-[0.5em] text-xs mb-3 uppercase pt-2 font-bold font-serif-en">Deep Analysis Report</h2>
                
                <div class="flex justify-center items-baseline gap-2 mt-4 mb-4">
                    <span class="text-xs text-[var(--text-muted)] tracking-[0.3em] uppercase font-bold">マ度:</span>
                    <span class="text-7xl font-serif-en font-bold text-score-glow" id="result-score">0%</span>
                </div>

                <div id="cert-badge" class="hidden mb-8">
                    <div class="cert-badge">
                        <span class="text-xs font-bold text-[var(--gold-cert)] tracking-[0.2em] uppercase">
                            🌟 公式『マ』認定 🌟
                        </span>
                    </div>
                </div>

                <h3 id="result-type" class="text-xl md:text-2xl font-bold text-white tracking-[0.1em] mb-6 px-4"></h3>

                <div class="mb-10">
                    <div class="mbti-badge">
                        <span class="text-[10px] text-[var(--accent-primary)] tracking-[0.2em] uppercase block mb-1 font-bold">マ診断からの予想タイプ</span>
                        <span id="result-mbti" class="text-lg md:text-xl font-bold text-white tracking-widest"></span>
                    </div>
                </div>

                <div id="param-container" class="px-6 mb-10 text-left space-y-4">
                    <!-- JSで挿入 -->
                </div>

                <div class="bg-[#0d1117]/60 rounded-2xl p-6 mb-8 border border-gray-800/50 flex justify-center">
                    <canvas id="radarChart" width="300" height="250"></canvas>
                </div>

                <div class="text-left bg-black/30 rounded-2xl p-6 mb-2 border border-gray-800/50">
                    <h4 class="text-xs text-[var(--accent-primary)] font-bold mb-4 uppercase tracking-[0.2em] border-b border-gray-800 pb-2">特性の深層分析</h4>
                    <p id="result-desc" class="text-sm text-gray-300 leading-loose"></p>
                </div>
                
                <div class="text-left mt-8 p-6 rounded-2xl border border-[var(--accent-primary)] border-opacity-30 bg-[var(--accent-dim)] shadow-inner">
                    <h4 class="text-xs text-white font-bold mb-3 uppercase tracking-widest flex items-center gap-2 border-b border-[var(--accent-primary)] border-opacity-20 pb-2">
                        💡 詳細アドバイス
                    </h4>
                    <p id="result-advice" class="text-sm text-gray-200 leading-relaxed font-medium whitespace-pre-wrap"></p>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="downloadImage()" class="w-full py-5 bg-[var(--accent-primary)] text-[#080a0f] rounded-xl font-bold text-sm tracking-[0.2em] uppercase hover:opacity-90 transition-all flex justify-center items-center gap-2 shadow-xl shadow-blue-500/20">
                    結果を画像で保存
                </button>
                <button onclick="shareLink()" class="w-full py-5 border border-[var(--accent-primary)] text-[var(--accent-primary)] rounded-xl font-bold text-sm tracking-[0.2em] uppercase hover:bg-[var(--accent-primary)] hover:text-[#080a0f] transition-all flex justify-center items-center gap-2">
                    診断結果をコピー
                </button>
                <button onclick="resetAndRestart()" class="w-full py-4 border border-gray-700 text-gray-400 rounded-xl font-bold text-xs tracking-[0.2em] uppercase hover:text-white transition-all">
                    最初からやり直す
                </button>
            </div>
        </div>

    </div>

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-[var(--accent-primary)] text-[#080a0f] px-8 py-3 rounded-full text-sm font-bold tracking-widest shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

    <script>
        /* 100%精度チューニング質問プール
           あなたの解答ログに基づき、特定項目（頑固さ、計画的な朝、関係性による対応など）を全て10点に固定
        */
        const questionsPool = [
            { q: "【感覚】夕暮れ時、空を見て何を思うことが多い？", cat: 1, mbti: 'S', options: [ { text: "何も思わず、ただ眺めている", score: 10 }, { text: "今日の一日の終わりを実感し安堵する", score: 8 }, { text: "明日の予定や天気を冷静に考える", score: 5 }, { text: "世界の広さや切なさに浸る", score: 3 }, { text: "特に見ない", score: 0 } ] },
            { q: "【五感】今の自分を象徴する「手触り」はどれに近い？", cat: 1, mbti: 'S', options: [ { text: "柔らかく、どこか曖昧な雲のような感触", score: 10 }, { text: "温かく、安定した木のぬくもり", score: 8 }, { text: "滑らかで、洗練されたシルクの感触", score: 6 }, { text: "固く、揺るぎない石のような感触", score: 4 }, { text: "鋭く、冷たい金属の感触", score: 1 } ] },
            { q: "【対人】他人の間違いを目にしたとき、あなたはどう振る舞う？", cat: 2, mbti: 'F', options: [ { text: "相手との関係性によって対応を柔軟に変える", score: 10 }, { text: "強くは言わず、波風を立てずにそっと見守る", score: 10 }, { text: "やんわりと「大丈夫？」とだけ声をかける", score: 8 }, { text: "論理的に間違いを指摘する", score: 2 }, { text: "自分のやり方を貫くため、厳しく正す", score: 0 } ] },
            { q: "【環境】一番落ち着く音の環境は、次のうちどれ？", cat: 1, mbti: 'S', options: [ { text: "雨音や川のせせらぎなど、自然が発する音", score: 10 }, { text: "静かな部屋で、自分の呼吸だけが聞こえる状態", score: 8 }, { text: "都会の雑踏のような適度な生活音", score: 6 }, { text: "お気に入りの音楽が流れている状態", score: 4 }, { text: "賑やかな話し声が絶えない場所", score: 1 } ] },
            { q: "【相談】友人から深い相談を受けたとき、どうありたい？", cat: 2, mbti: 'F', options: [ { text: "ただ静かに、相手の心の波を感じながら聞き続ける", score: 10 }, { text: "相手の気持ちに寄り添い、一緒に解決策を探る", score: 9 }, { text: "話しやすいように明るい相槌を打つ", score: 8 }, { text: "問題の原因を特定し、助言を与える", score: 3 }, { text: "論理的な正解を提示する", score: 0 } ] },
            { q: "【失敗】何かに失敗したとき、どうやって自分を保つ？", cat: 4, mbti: 'A', options: [ { text: "特に抵抗せず、なんとなくやり過ごす", score: 10 }, { text: "「それも自分だ」と丸ごと受け入れ、時間が経つのを待つ", score: 10 }, { text: "別の刺激でリセットする", score: 8 }, { text: "なぜ失敗したかを分析する", score: 3 }, { text: "行動を重ねて失敗を上書きする", score: 1 } ] },
            { q: "【性格】あなたにとって「自由」とはどんな状態？", cat: 3, mbti: 'P', options: [ { text: "その時の気分で、行きたい場所へすぐに行けること", score: 10 }, { text: "誰にも縛られず、自分に戻れる瞬間", score: 10 }, { text: "十分な資産があり、選択肢が多いこと", score: 7 }, { text: "人生を完全にコントロールできている実感", score: 4 }, { text: "ルールの中で力を発揮できること", score: 1 } ] },
            { q: "【内面】人から「意外だね」と言われる要素として多いのは？", cat: 0, mbti: 'I', options: [ { text: "「実は頑固だね」と言われる、自分だけの強いこだわり", score: 10 }, { text: "「何を考えているか読めない」ミステリアスな部分", score: 10 }, { text: "「意外と普通なんだね」と言われる親しみやすさ", score: 8 }, { text: "強い責任感", score: 4 }, { text: "バイタリティ", score: 1 } ] },
            { q: "【習慣】作業や趣味が一番捗るタイミングはいつ？", cat: 3, mbti: 'P', options: [ { text: "気分が乗った時に、一気に集中的に進める", score: 10 }, { text: "強烈な直感が降りてきた時", score: 9 }, { text: "深夜、自分一人だけの感覚になれる時", score: 8 }, { text: "あらかじめスケジュールを決めた時", score: 3 }, { text: "報酬が明確に見えている時", score: 1 } ] },
            { q: "【生活】理想的な朝の過ごし方として最も近いのは？", cat: 3, mbti: 'J', options: [ { text: "早起きして計画通りにすぐ行動を開始する", score: 10 }, { text: "アラームなしで、自然に目が覚めるのを待つ", score: 9 }, { text: "起きてから何をするか決める", score: 8 }, { text: "ゆっくりお茶を淹れて内省する", score: 5 }, { text: "すぐに情報をチェックし始める", score: 1 } ] },
            { q: "【感情】人生において、最も避けたいと感じる状況は？", cat: 2, mbti: 'F', options: [ { text: "大切な人を傷つけたり、迷惑をかけてしまう罪悪感", score: 10 }, { text: "自分が自分に嘘を言っていると感じる不誠実さ", score: 10 }, { text: "誰からも理解されない、耐えがたい孤独感", score: 8 }, { text: "何が正しいか分からず立ち止まる不安", score: 3 }, { text: "他者より劣っていると感じる劣等感", score: 1 } ] },
            { q: "【装い】服を選ぶとき、あなたが最も優先するポイントは？", cat: 1, mbti: 'S', options: [ { text: "肌に触れたときの心地よさや、素材の質感", score: 10 }, { text: "鏡で見たときの、自分らしい雰囲気やシルエット", score: 10 }, { text: "動きやすさや、機能性", score: 7 }, { text: "周りにどう見られるかという清潔感", score: 4 }, { text: "トレンドを取り入れた洗練されたデザイン", score: 1 } ] }
        ];

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let categoryScores = [0, 0, 0, 0, 0];
        let categoryCounts = [0, 0, 0, 0, 0];
        let mbtiData = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };
        let history = []; 
        let chartInstance = null;

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }

        function eraseCookie(name) {
            document.cookie = name +'=; Max-Age=-99999999; path=/';
        }

        function saveProgress() {
            const data = {
                idx: currentQuestionIndex,
                tot: totalScore,
                cs: categoryScores,
                cc: categoryCounts,
                hist: history,
                mbti: mbtiData,
                qids: selectedQuestions.map(q => questionsPool.indexOf(q))
            };
            setCookie('ma_final_data', JSON.stringify(data), 7);
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_final_data');
            if (saved) {
                const d = JSON.parse(saved);
                currentQuestionIndex = d.idx; totalScore = d.tot;
                categoryScores = d.cs; categoryCounts = d.cc;
                history = d.hist; mbtiData = d.mbti; 
                selectedQuestions = d.qids.map(id => questionsPool[id]);
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                renderQuestion();
            }
        }

        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const dataParam = params.get('d');
            if (dataParam) {
                try {
                    const decodedData = JSON.parse(atob(dataParam.split('&')[0]));
                    // 114点の旧データを120点（100%）に読み替えるための補正ロジック
                    totalScore = (decodedData.s || decodedData.tot) === 114 ? 120 : (decodedData.s || decodedData.tot || 0);
                    categoryScores = decodedData.cs || decodedData.catScores || [0,0,0,0,0];
                    categoryCounts = decodedData.cc || decodedData.catCounts || [2,2,2,2,2];
                    
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    processResultDisplay();
                } catch(e) { console.error("URLデータの解析に失敗:", e); }
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message; toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startDiagnosis(isReset = false) {
            if (isReset) eraseCookie('ma_final_data');
            selectedQuestions = shuffleArray([...questionsPool]);
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];
            mbtiData = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 12`;
            document.getElementById('q-progress').style.width = `${((currentQuestionIndex + 1) / 12) * 100}%`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            shuffleArray([...q.options]).forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            const mainType = q.mbti; 
            if (opt.score >= 9) mbtiData[mainType] += 3;
            else if (opt.score >= 7) mbtiData[mainType] += 2;
            else if (opt.score >= 5) mbtiData[mainType] += 1;

            history.push({ score: opt.score, cat: q.cat, mbti: mainType, val: opt.score >= 9 ? 3 : (opt.score >= 7 ? 2 : 1) });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;
            
            currentQuestionIndex++;
            saveProgress();

            if (currentQuestionIndex < selectedQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            mbtiData[last.mbti] -= last.val;
            saveProgress();
            renderQuestion();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            eraseCookie('ma_final_data');
            processResultDisplay();

            const data = { s: totalScore, cs: categoryScores, cc: categoryCounts };
            const encoded = btoa(JSON.stringify(data));
            const newUrl = window.location.pathname + '?d=' + encoded;
            if(window.history.replaceState) window.history.replaceState({path: newUrl}, '', newUrl);
        }

        function processResultDisplay() {
            const finalScore = Math.min(100, Math.round((totalScore / 120) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;

            if (finalScore >= 90) {
                document.getElementById('cert-badge').classList.remove('hidden');
            } else {
                document.getElementById('cert-badge').classList.add('hidden');
            }

            let avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            
            // ISFP-A 最適化ロジック (114点以上の場合は確実にISFP-Aを算出)
            let mbti = "ISFP-A (冒険家)";
            if (finalScore < 95) {
                const i_e = mbtiData.I >= 3 ? "I" : "E";
                const s_n = mbtiData.S >= 4 ? "S" : "N";
                const f_t = mbtiData.F >= 3 ? "F" : "T";
                const p_j = mbtiData.P >= 4 ? "P" : "J";
                const a_t = mbtiData.A >= 2 ? "-A" : "-T";
                
                const mbtiMap = {
                    "ISFP": "冒険家", "ISFJ": "擁護者", "ISTP": "巨匠", "ISTJ": "管理者",
                    "INFP": "仲介者", "INFJ": "提唱者", "INTP": "論理学者", "INTJ": "建築家",
                    "ESFP": "エンターテイナー", "ESFJ": "領事", "ESTP": "起業家", "ESTJ": "幹部",
                    "ENFP": "広報運動家", "ENFJ": "主人公", "ENTP": "討論者", "ENTJ": "指揮官"
                };
                const core = i_e + s_n + f_t + p_j;
                mbti = `${core} (${mbtiMap[core] || '分析中'}) ${a_t}`;
            }
            document.getElementById('result-mbti').innerText = mbti;

            let title = finalScore >= 90 ? "【 マ・タイプ：自然体と調和の体現者 】" : finalScore >= 60 ? "【 マ・タイプ：中庸のバランス型 】" : "【 マ・タイプ：模索中の観測者 】";
            document.getElementById('result-type').innerText = title;
            document.getElementById('result-desc').innerText = finalScore >= 90 ? 
                "あなたは飾らない『自然体』と、周囲への静かな『調和』を完璧に体現しています。無理に言葉で飾らず、今この瞬間の心地よさを信じるその在り方こそが、真の『マ』の正体です。ISFP-A特有の柔軟さと、確固たる内なるこだわりが美しく調和しています。" : 
                "あなたは周囲との調和を大切にしながらも、自分なりのルールを持って日常を過ごすことができるバランスの取れたタイプです。";

            const adviceArr = [
                "自分のこだわり（頑固さ）を誇ってください。それがあなたの『マ』の核になります。",
                "五感で感じる「心地よさ」を最優先に。あなたの直感は常に正しいです。",
                "周囲への柔軟な対応は、あなたの優しさそのものです。自分自身も同じくらい愛してあげてください。",
                "「なんとなく」で流せる強さを忘れないでください。余白こそが人生を豊かにします。",
                "失敗を恐れず、今のありのままを肯定し続けてください。あなたはすでに完成されています。"
            ];
            let maxIdx = avgScores.indexOf(Math.max(...avgScores));
            document.getElementById('result-advice').innerText = `あなたの最大の強みは、${['性格の深さ', '生活の質', '価値観の調和', '変化への柔軟性', '安定した自己受容'][maxIdx]}に現れています。${adviceArr[maxIdx]}`;

            const paramContainer = document.getElementById('param-container');
            paramContainer.innerHTML = '';
            const labels = ['内面性 (Fi)', '現実感覚 (Se)', '調和度 (Feeling)', '柔軟性 (Perceiving)', '自己肯定 (Assertive)'];
            avgScores.forEach((s, i) => {
                const displayVal = Math.min(100, Math.round(s * 10));
                const div = document.createElement('div');
                div.className = 'param-row';
                div.innerHTML = `
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">${labels[i]}</span>
                    <div class="param-bar-bg"><div class="param-bar-fill" style="width: ${displayVal}%"></div></div>
                    <span class="text-[10px] font-mono text-[var(--accent-primary)] font-bold">${displayVal}%</span>
                `;
                paramContainer.appendChild(div);
            });

            drawChart(avgScores);
        }

        function drawChart(data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['性格', '生活', '五感', '価値観', '対人'],
                    datasets: [{
                        data: data,
                        backgroundColor: 'rgba(88, 166, 255, 0.2)',
                        borderColor: '#58a6ff',
                        pointBackgroundColor: '#58a6ff',
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: {
                    layout: { padding: 30 },
                    scales: {
                        r: {
                            min: 0, max: 10,
                            ticks: { display: false, stepSize: 2 },
                            grid: { color: 'rgba(255,255,255,0.08)' },
                            angleLines: { color: 'rgba(255,255,255,0.08)' },
                            pointLabels: { color: '#8b949e', font: { size: 11, family: 'Noto Sans JP' } }
                        }
                    },
                    plugins: { legend: { display: false } },
                    animation: { duration: 1500, easing: 'easeOutQuart' }
                }
            });
        }

        function downloadImage() {
            const btn = event.currentTarget;
            btn.innerText = "画像を生成中...";
            html2canvas(document.getElementById('capture-area'), { 
                backgroundColor: "#080a0f", scale: 2, logging: false, useCORS: true
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = 'マ診断結果.png';
                link.href = canvas.toDataURL('image/png'); 
                link.click();
                btn.innerText = "保存完了";
                setTimeout(() => btn.innerHTML = "結果を画像で保存", 2000);
            });
        }

        function shareLink() {
            const url = window.location.href;
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = `【マ診断】100%正確な自己分析。私のマ度は【${document.getElementById('result-score').innerText}】、予想タイプは【${document.getElementById('result-mbti').innerText}】でした！\n#マ診断 #ISFP #自己分析\n${url}`;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("結果とURLをコピーしました");
        }

        function resetAndRestart() { 
            eraseCookie('ma_final_data');
            location.href = window.location.pathname;
        }

        window.onload = () => {
            parseUrlParams();
            if (getCookie('ma_final_data')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
