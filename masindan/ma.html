<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マ診断 - 自己分析＆価値観測定システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 画像保存用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85);
            --accent-primary: #58a6ff;
            --accent-dim: rgba(88, 166, 255, 0.15);
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --gold-cert: #ffd700;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(88, 166, 255, 0.03) 0%, transparent 40%);
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 560px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #c9d1d9;
        }

        .option-btn:hover, .option-btn:active {
            background: var(--accent-dim);
            border-color: rgba(88, 166, 255, 0.4);
            color: #ffffff;
            transform: translateX(4px);
        }

        .text-score-glow {
            color: #79c0ff;
            text-shadow: 0 0 20px rgba(121, 192, 255, 0.5);
        }

        .cert-badge {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(218, 165, 32, 0.05) 100%);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: var(--gold-cert);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        #capture-area {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1.25rem;
        }

        .param-box {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--accent-primary);
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Firebase SDK (Persistence) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ma-diagnosis-v4';

        window.firebaseUtils = { db, auth, appId, setDoc, getDoc, deleteDoc, onAuthStateChanged, signInAnonymously, signInWithCustomToken, doc };
    </script>

    <div class="app-wrapper z-10">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-panel p-8 md:p-10 text-center">
            <h2 class="font-serif-en text-[var(--accent-primary)] tracking-[0.3em] text-xs mb-3 uppercase">Authentic Analysis</h2>
            <h1 class="text-4xl md:text-5xl font-bold mb-6 tracking-widest text-white">マ診断</h1>
            <div class="w-10 h-[2px] bg-[var(--accent-primary)] mx-auto mb-8 opacity-60"></div>
            
            <p class="text-[var(--text-muted)] text-sm leading-relaxed mb-10 text-left">
                性格、ライフスタイル、五感、価値観、対人の5つの軸から「マ要素」を測定します。<br><br>
                中断しても続きから再開できます。直感で選んでください。
            </p>
            
            <div id="resume-container" class="hidden mb-6 p-4 bg-blue-900/20 border border-blue-500/30 rounded-lg text-center">
                <p class="text-xs text-blue-300 mb-3 font-bold">中断した診断を再開できます。</p>
                <button onclick="resumeDiagnosis()" class="w-full py-2 bg-blue-600 text-white rounded font-bold text-sm mb-2 hover:bg-blue-500">続きから再開</button>
                <button onclick="startDiagnosis(true)" class="text-[10px] text-gray-500 underline uppercase tracking-widest">最初からやり直す</button>
            </div>

            <button id="start-btn" onclick="startDiagnosis()" class="w-full py-4 border border-[var(--accent-primary)] text-[var(--accent-primary)] rounded-lg hover:bg-[var(--accent-primary)] hover:text-[#0d1117] transition-all duration-300 font-bold tracking-widest text-sm uppercase">
                診断を開始する
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden glass-panel p-6 md:p-10 fade-in">
            <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
                <button onclick="goBack()" id="back-btn" class="flex items-center gap-1 text-[10px] font-bold opacity-60 hover:opacity-100 hover:text-blue-400 invisible transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    PREV
                </button>
                <div class="text-center">
                    <span id="q-counter" class="text-xl font-serif-en text-[var(--accent-primary)] italic">01 / 12</span>
                </div>
                <div class="w-16 h-1 bg-gray-800 rounded-full overflow-hidden">
                    <div id="q-progress" class="h-full bg-[var(--accent-primary)] transition-all duration-500" style="width: 8%"></div>
                </div>
            </div>

            <div class="min-h-[5rem] mb-8 flex items-center">
                <h2 id="q-text" class="text-lg font-medium leading-relaxed text-gray-100"></h2>
            </div>

            <div id="options-container" class="space-y-3"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden fade-in">
            <div id="capture-area" class="glass-panel text-center mb-6">
                <h2 class="font-serif-en text-[var(--accent-primary)] tracking-[0.4em] text-xs mb-2 uppercase pt-2">Analysis Result</h2>
                <div class="flex justify-center items-baseline gap-2 mt-4 mb-2">
                    <span class="text-sm text-[var(--text-muted)] tracking-widest uppercase">マ度:</span>
                    <span class="text-6xl md:text-7xl font-serif-en font-bold text-score-glow" id="result-score">0%</span>
                </div>
                <h3 id="result-type" class="text-xl md:text-2xl font-bold text-white tracking-widest mb-4"></h3>
                <div id="certification-badge" class="hidden mb-6"><div class="cert-badge inline-flex items-center gap-2 px-6 py-2 rounded-full font-bold tracking-widest text-sm text-yellow-300">🌟 公式『マ』認定 🌟</div></div>
                <div class="mb-8"><div class="mbti-badge"><span class="text-[10px] text-[var(--accent-primary)] tracking-widest uppercase block mb-1">Expected Personality</span><span id="result-mbti" class="text-lg font-bold text-white tracking-wider"></span></div></div>
                
                <div id="param-details" class="text-left space-y-2 mb-8 px-2"></div>

                <div class="bg-[#0d1117]/50 rounded-xl p-4 mb-8 border border-gray-800/50 flex justify-center"><canvas id="radarChart" width="300" height="250"></canvas></div>
                <div class="text-left bg-[#0d1117]/50 rounded-xl p-6 mb-2 border border-gray-800/50">
                    <h4 class="text-xs text-[var(--accent-primary)] font-bold mb-3 uppercase tracking-widest border-b border-gray-800 pb-2">特性分析</h4>
                    <p id="result-desc" class="text-sm text-gray-300 leading-loose"></p>
                </div>
                <div class="text-left mt-6 p-5 rounded-xl border border-[var(--accent-primary)] border-opacity-30 bg-[var(--accent-dim)]">
                    <h4 class="text-xs text-white font-bold mb-3 uppercase tracking-widest flex items-center gap-2 border-b border-[var(--accent-primary)] border-opacity-20 pb-2">💡 詳細アドバイス</h4>
                    <p id="result-advice" class="text-sm text-gray-200 leading-relaxed font-medium"></p>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="downloadImage()" class="w-full py-4 bg-[var(--accent-primary)] text-[#0d1117] rounded-lg font-bold text-sm tracking-widest uppercase hover:opacity-90 flex justify-center items-center gap-2 shadow-lg shadow-blue-500/20">保存する (PNG)</button>
                <button onclick="shareLink()" class="w-full py-4 border border-[var(--accent-primary)] text-[var(--accent-primary)] rounded-lg font-bold text-sm tracking-widest uppercase hover:bg-[var(--accent-primary)] hover:text-[#0d1117] flex justify-center items-center gap-2">結果を共有</button>
                <button onclick="resetAndRestart()" class="w-full py-4 border border-gray-700 text-gray-400 rounded-lg font-bold text-sm tracking-widest uppercase hover:text-white transition-all">最初からやり直す</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-[var(--accent-primary)] text-[#0d1117] px-8 py-3 rounded-full text-sm font-bold tracking-[0.1em] shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

    <script>
        // カテゴリ: 0=性格, 1=ライフスタイル, 2=感覚, 3=価値観, 4=対人
        const questionsPool = [
            { q: "【感覚】夕暮れ時、空を見て何を思うことが多い？", cat: 2, options: [ { text: "何も思わず、ただ眺めている", score: 10 }, { text: "言葉にできない切なさと世界の広さを感じる", score: 9 }, { text: "「今日も一日終わったな」という安堵", score: 8 }, { text: "明日の天気を考える", score: 4 }, { text: "夜にやるべきことを整理し始める", score: 1 } ] },
            { q: "【五感】今の自分を象徴する「手触り」はどれ？", cat: 2, options: [ { text: "柔らかく、どこか曖昧な雲のような感触", score: 10 }, { text: "温かく、安定した木のぬくもり", score: 9 }, { text: "滑らかで、洗練されたシルクのような感触", score: 7 }, { text: "固く、しっかりとした石のような感触", score: 3 }, { text: "鋭く、冷たい金属のような感触", score: 1 } ] },
            { q: "【対人】他人の間違いを目にしたとき、どうする？", cat: 4, options: [ { text: "相手との関係性によって対応を変える", score: 10 }, { text: "強くは言わず、波風を立てず見守る", score: 10 }, { text: "やんわりと「大丈夫？」とだけ声をかける", score: 8 }, { text: "論理的に間違いを指摘し、説得する", score: 3 }, { text: "絶対に止めに入り、自分のやり方を教える", score: 0 } ] },
            { q: "【感覚】一番落ち着く音の環境はどれ？", cat: 2, options: [ { text: "雨音や川のせせらぎなど、自然な音", score: 10 }, { text: "静かな部屋で、自分の呼吸だけ聞こえる状態", score: 8 }, { text: "都会の雑踏のような、適度な生活音", score: 6 }, { text: "お気に入りの音楽が流れている状態", score: 4 }, { text: "活気のある賑やかな話し声", score: 1 } ] },
            { q: "【対人】友人から相談を受けた時、どうありたい？", cat: 4, options: [ { text: "ただ静かに、相手の心の波を感じながら聞く", score: 10 }, { text: "なんとなく寄り添う", score: 9 }, { text: "話しやすいように相槌を打つ", score: 8 }, { text: "少しでも楽になるようなアドバイスを考える", score: 3 }, { text: "論理的に解決策を提示しようとする", score: 0 } ] },
            { q: "【価値観】失敗したとき、どう自分を取り戻す？", cat: 3, options: [ { text: "なんとなくやり過ごす", score: 10 }, { text: "「それも自分だ」と受け入れ、時間が経つのを待つ", score: 10 }, { text: "寝たりリフレッシュしたりして忘れる", score: 8 }, { text: "失敗を分析し、次への対策を立てる", score: 3 }, { text: "とにかく行動して失敗を上書きする", score: 1 } ] },
            { q: "【性格】あなたにとって「自由」とは？", cat: 0, options: [ { text: "その時の気分で、行きたい場所へ行けること", score: 10 }, { text: "誰にも縛られず、何者でもない自分に戻れる瞬間", score: 10 }, { text: "十分な時間とお金があること", score: 6 }, { text: "自分で人生をコントロールできている実感", score: 4 }, { text: "人より多くの選択肢を持っていること", score: 1 } ] },
            { q: "【性格】人から「意外だね」と言われるとき、どんな要素？", cat: 0, options: [ { text: "「実は頑固だね」と言われる、自分だけのこだわり", score: 10 }, { text: "「何を考えているか読めない」ミステリアスな部分", score: 10 }, { text: "「意外と普通なんだね」と言われる、親しみやすさ", score: 8 }, { text: "「真面目なんだね」と言われる、責任感", score: 3 }, { text: "「行動的だね」と言われる、フットワークの軽さ", score: 1 } ] },
            { q: "【ライフスタイル】作業が一番捗るタイミングは？", cat: 1, options: [ { text: "気分が乗った時に一気に進める", score: 10 }, { text: "「今やりたい！」という強烈な直感がある時", score: 9 }, { text: "深夜、自分一人だけの感覚になれる時", score: 8 }, { text: "スケジュールを組み、決められた時間に取り組む時", score: 3 }, { text: "誰かと競い合ったり成果が見えやすい時", score: 1 } ] },
            { q: "【ライフスタイル】理想的な朝の過ごし方は？", cat: 1, options: [ { text: "早起きして計画通りにすぐ行動を開始する", score: 10 }, { text: "アラームなしで、自然に目が覚めるのを待つ", score: 10 }, { text: "その日の気分で、なんとなく過ごす", score: 8 }, { text: "窓を開けて、ゆっくり飲み物を淹れる", score: 7 }, { text: "決まったルーティンを淡々とこなす", score: 3 } ] },
            { q: "【価値観】人生で一番避けたい感情は？", cat: 3, options: [ { text: "大切な人を傷つけたり、迷惑をかける罪悪感", score: 10 }, { text: "自分が嘘を言っていると感じる不誠実さ", score: 10 }, { text: "誰からも理解されない孤独感", score: 7 }, { text: "将来が見えない不安や退屈", score: 4 }, { text: "人より劣っていると感じる劣等感", score: 1 } ] },
            { q: "【五感】服を選ぶとき、一番大切にしたいのは？", cat: 2, options: [ { text: "肌に触れたときの心地よさや質感", score: 10 }, { text: "鏡で見たときの自分らしさ", score: 8 }, { text: "動きやすさや機能性", score: 6 }, { text: "周りからどう見られるか", score: 4 }, { text: "流行を取り入れたトレンド感", score: 1 } ] }
        ];

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let categoryScores = [0, 0, 0, 0, 0];
        let categoryCounts = [0, 0, 0, 0, 0];
        let history = []; 
        let chartInstance = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message; toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        async function startDiagnosis(isReset = false) {
            const { db, appId, auth, deleteDoc, doc } = window.firebaseUtils;
            if (isReset && auth.currentUser) await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current'));
            
            selectedQuestions = shuffleArray([...questionsPool]);
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 12`;
            document.getElementById('q-progress').style.width = `${((currentQuestionIndex + 1) / 12) * 100}%`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            shuffleArray([...q.options]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        async function handleAnswer(q, opt) {
            history.push({ score: opt.score, cat: q.cat });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;
            
            currentQuestionIndex++;
            await saveProgress();

            if (currentQuestionIndex < selectedQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            saveProgress();
            renderQuestion();
        }

        async function saveProgress() {
            const { db, appId, auth, setDoc, doc } = window.firebaseUtils;
            if (!auth.currentUser) return;
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current'), {
                index: currentQuestionIndex,
                total: totalScore,
                scores: categoryScores,
                counts: categoryCounts,
                history: history,
                selectedIds: selectedQuestions.map(q => questionsPool.indexOf(q))
            });
        }

        async function resumeDiagnosis() {
            const { db, appId, auth, getDoc, doc } = window.firebaseUtils;
            const res = await getDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current'));
            const d = res.data();
            currentQuestionIndex = d.index; totalScore = d.total;
            categoryScores = d.scores; categoryCounts = d.counts;
            history = d.history; selectedQuestions = d.selectedIds.map(idx => questionsPool[idx]);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function shuffleArray(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        async function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const { db, appId, auth, deleteDoc, doc } = window.firebaseUtils;
            if (auth.currentUser) await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current'));
            processResultDisplay();
        }

        function processResultDisplay() {
            const finalScore = Math.min(100, Math.round((totalScore / 120) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;
            document.getElementById('certification-badge').classList.toggle('hidden', finalScore < 90);

            let avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            let mbti = "ISFP-A (冒険家)";
            if (finalScore < 90) {
                mbti = (avgScores[0] >= 6 ? "I" : "E") + (avgScores[2] >= 6 ? "S" : "N") + (avgScores[1] >= 6 ? "F" : "T") + (avgScores[3] >= 6 ? "P" : "J") + (avgScores[4] >= 6 ? "-A" : "-T");
            }
            document.getElementById('result-mbti').innerText = mbti;

            let title = finalScore >= 90 ? "【 マ・タイプ：自然体と調和の体現者 】" : finalScore >= 60 ? "【 マ・タイプ：中庸のバランス型 】" : "【 マ・タイプ：模索中の観測者 】";
            document.getElementById('result-type').innerText = title;
            document.getElementById('result-desc').innerText = finalScore >= 90 ? "あなたは飾らない『自然体』と周囲への深い『調和』を完璧に併せ持っています。自分の直感を信じ、ありのままの姿で生きるその在り方こそが、真の『マ』の証です。" : "あなたはバランス感覚が良く、適度な自制心を持った安定した性格です。";
            
            const paramContainer = document.getElementById('param-details');
            paramContainer.innerHTML = '';
            const labels = ['性格(内面)', '生活(リズム)', '五感(心地よさ)', '価値観(核)', '対人(距離感)'];
            avgScores.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'param-box';
                div.innerHTML = `<div class="flex justify-between text-[11px] mb-1 text-gray-300"><span>${labels[i]}</span><span>${Math.round(s*10)}%</span></div>
                                 <div class="h-1 bg-gray-800 rounded-full overflow-hidden"><div class="h-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]" style="width:${s*10}%"></div></div>`;
                paramContainer.appendChild(div);
            });
            
            // アドバイス
            let advice = finalScore >= 90 ? "あなたはすでに究極の『マ』です。無理に自分を変えず、これからも心地よいリズムを刻み続けてください。" : "もう少し直感を信じて、「なんとなく」の感覚を大切にすると、よりマに近づけます。";
            document.getElementById('result-advice').innerText = advice;

            drawChart(avgScores);
        }

        function drawChart(data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['性格', '生活', '五感', '価値観', '対人'],
                    datasets: [{ data: data, backgroundColor: 'rgba(88, 166, 255, 0.2)', borderColor: '#58a6ff', borderWidth: 2, pointRadius: 0 }]
                },
                options: {
                    scales: { r: { min: 0, max: 10, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#c9d1d9', font: { size: 10 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function downloadImage() {
            const btn = event.currentTarget;
            btn.innerText = "生成中...";
            html2canvas(document.getElementById('capture-area'), { 
                backgroundColor: "#0d1117", 
                scale: 2,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = 'マ診断結果.png';
                link.href = canvas.toDataURL('image/png'); 
                link.click();
                btn.innerHTML = "保存完了";
                setTimeout(() => btn.innerHTML = "保存する (PNG)", 2000);
            });
        }

        function shareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast("リンクをコピーしました");
            });
        }

        function resetAndRestart() { 
            const { db, appId, auth, deleteDoc, doc } = window.firebaseUtils;
            if (auth.currentUser) deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current'));
            location.reload(); 
        }

        // Initial Load Check
        window.addEventListener('load', async () => {
            const { auth, signInAnonymously, db, appId, getDoc, doc, onAuthStateChanged, signInWithCustomToken } = window.firebaseUtils;
            
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            await initAuth();

            onAuthStateChanged(auth, async (user) => {
                if (!user) return;
                const res = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'progress', 'current'));
                if (res.exists()) {
                    document.getElementById('resume-container').classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
