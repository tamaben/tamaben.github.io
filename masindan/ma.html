<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マ診断 - 存在の深層分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f7faf8;
            --accent-green: #27422f;
            --soft-green: #588157;
            --leaf-green: #8ca38a;
            --glass-white: rgba(255, 255, 255, 0.85);
            --text-main: #131e17;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(140, 163, 138, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(39, 66, 47, 0.15) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #edf1ee 100%);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1.25rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(39, 66, 47, 0.1);
            overflow: hidden;
            position: relative;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.2rem 1.6rem;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ffffff;
            border-radius: 1.4rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            margin-bottom: 0.7rem;
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--soft-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(39, 66, 47, 0.1);
        }

        .score-display {
            font-size: 6.5rem;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--accent-green);
            margin: 1.5rem 0;
            display: block;
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(39, 66, 47, 0.15);
        }

        .progress-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(39, 66, 47, 0.1);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.5);
        }

        /* 隠しログモーダル */
        #log-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #log-modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        #log-modal .content {
            background: #131e17;
            color: #fff;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 1.5rem;
            padding: 24px;
            overflow-y: auto;
            border: 1px solid #588157;
            font-family: monospace;
            font-size: 13px;
        }

        .capture-flat-mode {
            background: #ffffff !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            box-shadow: none !important;
            border: 1px solid #f0f0f0 !important;
            width: 520px !important; 
            max-width: none !important;
            padding: 40px !important;
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-ready {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .anim-show {
            opacity: 1;
            transform: translateY(0);
        }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f4f1 0%, transparent 50%);
        }

        /* ===== 新規追加アニメーション ===== */
        
        /* 心が洗い出されるエフェクト（質問切替時） */
        .purify-effect {
            animation: purify 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes purify {
            0% { filter: blur(12px) contrast(1.1) brightness(1.2); opacity: 0; transform: scale(0.97); }
            100% { filter: blur(0) contrast(1) brightness(1); opacity: 1; transform: scale(1); }
        }

        /* 暗い中間画面からのモワッと明転エフェクト */
        .dark-to-light {
            animation: darkToLight 2.5s ease-in-out forwards;
        }
        @keyframes darkToLight {
            0% { background-color: #030604; backdrop-filter: blur(0px); opacity: 1; }
            50% { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); opacity: 1; }
            100% { background-color: rgba(255, 255, 255, 0); backdrop-filter: blur(0px); opacity: 0; pointer-events: none; }
        }

        /* ボタンの神秘的な明滅 */
        .pulse-slow {
            animation: pulseSlow 3s infinite;
        }
        @keyframes pulseSlow {
            0%, 100% { opacity: 0.4; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
            50% { opacity: 1; text-shadow: 0 0 25px rgba(255,255,255,0.8); }
        }
    </style>
</head>
<body>

    <!-- 結果表示前の中間ダークスクリーン -->
    <div id="reveal-screen" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#030604] transition-opacity duration-1000 opacity-0">
        <button id="reveal-btn" onclick="revealResult()" class="text-gray-300 hover:text-white text-sm tracking-[0.8em] font-serif-en pulse-slow transition-colors duration-500 py-6 px-10 border border-transparent hover:border-white/20 rounded-full outline-none">
            結果を見る
        </button>
        <!-- モワッと明転するためのオーバーレイ -->
        <div id="reveal-overlay" class="absolute inset-0 pointer-events-none opacity-0"></div>
    </div>

    <div class="app-wrapper">
        
        <!-- スタート画面 -->
        <div id="start-screen" class="glass-panel p-10 md:p-14 text-center fade-in">
            <p class="text-[var(--soft-green)] font-serif-en tracking-[0.5em] text-[11px] mb-4 uppercase font-bold">Element Detection</p>
            <h1 class="text-5xl md:text-6xl font-bold mb-10 tracking-tight text-gray-800 font-outfit">マ診断</h1>
            
            <p class="text-gray-600 text-sm leading-relaxed mb-12 text-left">
                マ診断は、この質問の解答者に<strong class="text-[var(--accent-green)]">「マ度（マ要素）」</strong>が何%あるかが正確にわかるシステムです。<br><br>
                マ要素を測る質問と、MBTIを測る質問が最適なバランスでランダムに出題されます。直感でお答えください。
            </p>

            <div id="resume-container" class="hidden mb-10 p-6 bg-white/40 border border-white rounded-3xl">
                <p class="text-xs text-gray-500 mb-4 font-bold tracking-widest uppercase text-center">中断したデータがあります</p>
                <button onclick="resumeDiagnosis()" class="w-full py-4 btn-green text-sm mb-2 shadow-md">診断を再開する</button>
            </div>

            <button onclick="startDiagnosis()" class="w-full py-5 btn-green text-sm uppercase tracking-[0.25em] shadow-xl">
                分析を開始する
            </button>
        </div>

        <!-- 質問画面 -->
        <div id="quiz-screen" class="hidden glass-panel p-8 md:p-12 fade-in">
            <div class="flex justify-between items-center mb-10">
                <button onclick="goBack()" id="back-btn" class="text-[10px] tracking-widest font-bold text-gray-400 hover:text-[var(--accent-green)] transition-all flex items-center gap-1 invisible uppercase">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> 戻る
                </button>
                <div class="flex gap-3" id="progress-dots"></div>
                <span id="q-counter" class="text-xs font-outfit text-gray-400">01 / 10</span>
            </div>

            <!-- 洗い出しエフェクトをかけるためのラッパー -->
            <div id="purify-wrapper">
                <div class="min-h-[10rem] mb-12 flex flex-col items-center text-center justify-center">
                    <span id="q-cat" class="text-[9px] uppercase tracking-[0.4em] text-[var(--leaf-green)] mb-4 font-bold font-serif-en">Analysis</span>
                    <h2 id="q-text" class="text-xl md:text-2xl font-bold text-[var(--accent-green)] leading-relaxed px-2"></h2>
                </div>
                <div id="options-container" class="space-y-2"></div>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden fade-in">
            <div id="capture-area" class="glass-panel text-center mb-8 bg-white" style="padding-bottom: 40px;">
                <div class="anim-ready" id="anim-header">
                    <div class="font-serif-en text-[var(--leaf-green)] tracking-[0.6em] text-[10px] mb-8 uppercase pt-10 font-bold">Analysis Report</div>
                    <div class="text-[11px] text-gray-400 tracking-[0.4em] uppercase mb-4 font-bold">あなたのマ度（マ要素）</div>
                    <div class="font-outfit score-display" id="result-score">0%</div>
                </div>

                <div class="anim-ready" id="anim-badge">
                    <div id="cert-badge" class="hidden mb-12">
                        <div class="py-2.5 px-8 bg-green-50/50 border border-[var(--leaf-green)] text-[var(--accent-green)] rounded-full inline-flex items-center gap-2 text-xs font-bold tracking-[0.3em]">
                            🌟 マ 本人認定
                        </div>
                    </div>
                    <div class="mb-10">
                        <div class="inline-block bg-[var(--leaf-green)] text-white px-8 py-2.5 rounded-full text-xs font-bold tracking-widest shadow-sm" id="result-mbti">分析中</div>
                    </div>
                </div>

                <div class="mb-12 flex justify-center bg-white/50 rounded-[2.5rem] p-8 border border-white mx-4 shadow-inner anim-ready" id="anim-chart">
                    <div style="position: relative; width: 100%; max-width: 280px; height: 280px;">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>

                <div class="text-left px-8 space-y-12 pb-6 anim-ready" id="anim-text">
                    <div class="content-wrapper">
                        <h4 class="text-[10px] text-[var(--accent-green)] font-bold mb-4 uppercase tracking-[0.3em] border-b border-[var(--mint-green)] pb-2">特性解析</h4>
                        <p id="result-desc" class="text-sm text-gray-600 leading-loose"></p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4 anim-ready" id="anim-buttons">
                <button onclick="downloadImage('sns')" class="w-full py-5 btn-green text-sm uppercase shadow-xl">SNS用(正方形)を保存</button>
                <button onclick="downloadImage('full')" class="w-full py-4 text-[var(--accent-green)] font-bold text-xs tracking-widest uppercase border border-[var(--accent-green)] rounded-2xl hover:bg-white transition-all">フルレポートを保存</button>
                <button onclick="shareLink()" id="share-btn" class="w-full py-3 text-[10px] text-gray-400 tracking-widest uppercase border-b border-gray-200 hover:text-[var(--accent-green)] transition-all mt-4">結果を共有する</button>
            </div>
            
            <div class="anim-ready mt-12 mb-10 text-center" id="anim-reset">
                <button onclick="resetAndRestart()" class="text-[10px] text-gray-300 tracking-[0.4em] uppercase hover:text-gray-500 transition-all">最初からやり直す</button>
            </div>
        </div>
    </div>

    <!-- 隠しログモーダル (3本指トリプルタップで表示) -->
    <div id="log-modal">
        <div class="content relative">
            <h3 class="text-lg font-bold mb-4 text-[var(--soft-green)] border-b border-[var(--soft-green)] pb-2">Algorithm Precision Log</h3>
            <p class="text-[10px] text-gray-400 mb-4">※各回答の獲得ポイントと内部パラメーターの推移</p>
            <div id="adjustment-log" class="space-y-4"></div>
            <button onclick="toggleLogModal()" class="mt-8 w-full py-4 bg-[var(--soft-green)] text-white rounded-xl text-sm font-bold tracking-widest uppercase">閉じる</button>
        </div>
    </div>

    <!-- SNS保存用(1080x1080) -->
    <div id="sns-export-area">
        <div style="font-family: 'Outfit', sans-serif; font-size: 36px; color: #2d4a36; letter-spacing: 0.6em; margin-bottom: 60px; font-weight: bold; text-transform: uppercase;">MA ANALYSIS</div>
        <div style="font-family: 'Outfit', sans-serif; font-size: 250px; font-weight: 800; color: #2d4a36; margin-bottom: 20px; line-height: 1;" id="sns-score">0%</div>
        <div style="background: #edf2f0; padding: 20px 60px; border-radius: 60px; font-size: 44px; color: #2d4a36; font-family: 'Noto Sans JP'; font-weight: bold; margin-bottom: 80px;" id="sns-mbti">ISFP-A</div>
        <div style="background: #ffffff; padding: 60px; border-radius: 80px; border: 2px solid #eee; width: 850px; display: flex; justify-content: center;">
            <div style="position: relative; width: 100%; max-width: 650px; height: 650px;">
                <canvas id="snsChart"></canvas>
            </div>
        </div>
        <div style="margin-top: 100px; color: #8ca38a; font-size: 24px; letter-spacing: 0.5em; font-family: 'Cormorant Garamond'; font-weight: 600;">IDENTITY PORTRAIT</div>
    </div>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-10 py-3.5 rounded-full text-xs font-bold tracking-widest shadow-2xl opacity-0 transition-opacity duration-500 pointer-events-none z-50"></div>

    <script>
        // --- 質問プール（マ要素：7問抽出用、MBTI：3問抽出用） ---
        const maQuestions = [
            { q: "誰かにプレゼントをもらった時の内面は？", type: 'ma', cat: 2, options: [{text:"自分の好みを分かってくれているかに感動する", score:14}, {text:"相手が選んでくれた気持ちそのものが嬉しい", score:10}, {text:"お返しの金額やタイミングをすぐに計算する", score:6}, {text:"実用的かどうかを冷静に判断する", score:3}, {text:"大袈裟に喜んで、その場の空気を盛り上げる", score:0}]},
            { q: "森で鳥の声を聞いたときの意識は？", type: 'ma', cat: 1, options: [{text:"響きそのものを全身で聴く", score:14}, {text:"美しいと感じて深く感動する", score:10}, {text:"その鳥の種類や生態を特定したくなる", score:6}, {text:"録音して誰かに教えたくなる", score:3}, {text:"特に何も考えず、別の思考に移る", score:0}]},
            { q: "プレゼントを選ぶとき最も重視するのは？", type: 'ma', cat: 2, options: [{text:"実用的で長く使えるもの", score:14}, {text:"自分がもらって嬉しいもの", score:10}, {text:"流行りのものや話題のアイテム", score:6}, {text:"相手から直接欲しいものを聞く", score:3}, {text:"相手が喜ぶ顔を想像して直感で選ぶ", score:0}]},
            { q: "「成功」と聞いて思い浮かぶのは？", type: 'ma', cat: 0, options: [{text:"誰からも認められる実績", score:14}, {text:"自分が満足できる心境", score:10}, {text:"大切な人との安定した生活", score:6}, {text:"目標を達成した瞬間の喜び", score:3}, {text:"自由な時間と余裕", score:0}]},
            { q: "自分の意見を相手に伝えるときの話し方は？", type: 'ma', cat: 4, options: [{text:"身振り手振りを交えて情熱的に話す", score:14}, {text:"断定は避け、「〜だと思う」と柔らかく伝える", score:10}, {text:"相手の反応を見ながら、言葉を選んで話す", score:6}, {text:"相手を論破するための理屈を組み立てて話す", score:3}, {text:"結論から先に言い、端的に手短に伝える", score:0}]},
            { q: "子供の頃の記憶で一番鮮明に残っているのは？", type: 'ma', cat: 0, options: [{text:"記憶が曖昧で、あまりよく覚えていない", score:14}, {text:"誰かに怒られたり褒められた時の「感情」", score:10}, {text:"友達と一緒に遊んだ具体的な「出来事」", score:6}, {text:"その時の情景の「色」や「空気の匂い」", score:3}, {text:"自分が何かのテストで取った「成績」", score:0}]},
            { q: "お風呂に入っている時の思考状態は？", type: 'ma', cat: 1, options: [{text:"鼻歌を歌ったりして気分をリフレッシュする", score:14}, {text:"水の音や温かさに集中し、頭をからっぽにする", score:10}, {text:"今日あった出来事の反省会が始まる", score:6}, {text:"明日のスケジュールをシミュレーションする", score:3}, {text:"良いアイデアやインスピレーションが急に湧く", score:0}]},
            { q: "自分を認めるタイミングは？", type: 'ma', cat: 4, options: [{text:"誰かの役に立っていると実感した時", score:14}, {text:"しっくりくる行動ができた時", score:10}, {text:"他人から高く評価されたり、賞賛された時", score:6}, {text:"ただ存在しているだけで満足している時", score:3}, {text:"目標を完璧に達成した時", score:0}]},
            { q: "褒められた時、一番嬉しい言葉はどれ？", type: 'ma', cat: 2, options: [{text:"「いつも優しいね」「安心するよ」", score:14}, {text:"「あなたらしいね」「独特だね」", score:10}, {text:"「仕事が早いね」「頼りになるね」", score:6}, {text:"「センスいいね」「お洒落だね」", score:3}, {text:"「面白いね」「刺激になるよ」", score:0}]},
            { q: "古着やヴィンテージ品に対して？", type: 'ma', cat: 1, options: [{text:"特に興味がない。実用性を重視する", score:14}, {text:"時間の経過が作った独特の風合いが愛おしい", score:10}, {text:"希少価値やデザイン性の高さを評価する", score:6}, {text:"誰かが使った気配がして衛生面が気になる", score:3}, {text:"流行りのスタイルに取り入れたい", score:0}]},
            { q: "道を聞かれたときの態度は？", type: 'ma', cat: 4, options: [{text:"大まかに教えて、あとは相手に任せる", score:14}, {text:"丁寧に言葉を尽くして教えようとする", score:10}, {text:"明るく元気に接して相手を安心させる", score:6}, {text:"スマホを使って完璧に目的地まで案内する", score:3}, {text:"忙しいので丁重に断り、立ち去る", score:0}]},
            { q: "風で草花が揺れているのを見たとき？", type: 'ma', cat: 1, options: [{text:"特に気にせず歩く速度を維持する", score:14}, {text:"風の抵抗や自然のダイナミックさを楽しむ", score:10}, {text:"嵐が来るのではないかと天気を警戒する", score:6}, {text:"何かのスピリチュアルな予兆を感じる", score:3}, {text:"写真を撮ってSNSにアップしたくなる", score:0}]},
            { q: "映画を観終わった後、一番最初にしたいことは？", type: 'ma', cat: 2, options: [{text:"一緒に観た人と感想を語り合う", score:14}, {text:"一人で静かに余韻に浸り、反芻する", score:10}, {text:"ネットで他の人の考察やレビューを読む", score:6}, {text:"影響を受けて、自分も何か創作したくなる", score:3}, {text:"特に何もしない。すぐに日常に戻る", score:0}]},

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));

            return null;

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                const current = Math.floor(easeProgress * (end - start) + start);
                
                obj.innerText = `${current}%`;
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = `${end}%`;
                }
            };
            window.requestAnimationFrame(step);
        }

                data: {
                    labels: ['内面', '現実', '共感', '柔軟', '安定'],
                    datasets: [{ data: dataArray, backgroundColor: 'rgba(58, 90, 64, 0.15)', borderColor: '#3a5a40', borderWidth: 3, pointRadius: 0 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        r: { 
                            min: 0, max: 10, ticks: { display: false }, 
                            grid: { color: 'rgba(0,0,0,0.05)' }, 
                            pointLabels: { color: '#3a5a40', font: { size: 12, weight: 'bold' } } 
                        } 
                    }, 
                    plugins: { legend: { display: false } }, 
                    animation: { duration: 1500 } 
                }
            };
            if (window.radarChartInstance) window.radarChartInstance.destroy();
            window.radarChartInstance = new Chart(ctx, config);
            
            const snsCtx = document.getElementById('snsChart').getContext('2d');
            if (window.snsChartInstance) window.snsChartInstance.destroy();
            window.snsChartInstance = new Chart(snsCtx, { ...config, options: { ...config.options, animation: false, scales: { r: { ...config.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40' } } } } });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            showToast("画像を生成中...");
            
            const target = document.getElementById(targetId);
            if(type === 'sns') target.style.left = '0';
            
            html2canvas(target, { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true,
                onclone: (cloned) => {
                    const clonedEl = cloned.getElementById(targetId);
                    clonedEl.classList.add('capture-flat-mode');
                    clonedEl.style.backdropFilter = "none";
                    clonedEl.style.background = "#ffffff";
                    
                    if(type === 'full') {
                        clonedEl.querySelectorAll('.anim-ready').forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'none';
                        });
                        clonedEl.querySelectorAll('.content-wrapper').forEach(b => {
                            b.style.marginBottom = '50px';
                            b.style.display = 'block';
                        });
                    }
                }
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') target.style.left = '-9999px';
                showToast("保存完了しました");
            });
        }

        function shareLink() {
            const url = window.location.href;
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = `私のマ度は【${document.getElementById('result-score').innerText}】、予想タイプは【${document.getElementById('result-mbti').innerText}】でした！\n#マ診断 #ISFP #自己分析\n${url}`;
            if (navigator.userAgent.match(/iphone|ipad|ipod/i)) {
                const range = document.createRange(); range.selectNodeContents(dummy);
                const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
                dummy.setSelectionRange(0, 999999);
            } else { dummy.select(); }
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("リンクをコピーしました");
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resetAndRestart() { 
            eraseCookie('ma_ultimate_algo'); 
            sessionStorage.removeItem('ma_anim_done');
            location.href = window.location.pathname; 
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (d) {
                try {
                    let decodedStr;
                    try { decodedStr = decodeURIComponent(escape(atob(d.split('&')[0]))); } 
                    catch(e) { decodedStr = atob(d.split('&')[0]); }
                    
                    const data = JSON.parse(decodedStr);
                    totalScore = data.s || 0; catScores = data.cs || [0,0,0,0,0]; catCounts = data.cc || [1,1,1,1,1]; mbtiScore = data.m || {};
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    setTimeout(() => { processDisplay(true); }, 300);
                } catch(e) { console.error(e); }
            } else if (getCookie('ma_ultimate_algo')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
