<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-base: #f9fbf9;
            --accent-green: #344e41;
            --soft-green: #588157;
            --leaf-green: #a3b18a;
            --glass-white: rgba(255, 255, 255, 0.6);
            --text-main: #344e41;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(163, 177, 138, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(58, 90, 64, 0.1) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #edf2f0 100%);
            margin: 0;
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1.5rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -12px rgba(58, 90, 64, 0.1);
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.25rem 1.75rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ffffff;
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1rem;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--soft-green);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 25px rgba(58, 90, 64, 0.1);
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .btn-green:hover { transform: translateY(-1px); filter: brightness(1.1); }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(58, 90, 64, 0.1);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.4);
        }

        /* 画像保存用：ブラウザで見ている時と全く同じCSSを強制適用 */
        .capture-target {
            background-color: #ffffff;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f4f1 0%, transparent 50%);
        }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

            { q: "身の回りのものを買うとき、色や形についてどう決める？", cat: 1, options: [{text:"理屈ではなく、今の自分の波長に「しっくりくる」もの", score:10}, {text:"機能性や耐久性が最も優れているもの", score:4}, {text:"自分の持ち物とのコーディネートを重視する", score:7}, {text:"流行のデザインや、周りからの評判を考える", score:5}]},

            { q: "理想の人生の終わり方をイメージするなら？", cat: 0, options: [{text:"何か大きな成果や、後世に語り継がれるものを残すこと", score:10}, {text:"大きな足跡は残さずとも、静かに消えていくこと", score:8}, {text:"多くの人に囲まれ、感謝されながら逝くこと", score:7}, {text:"最後まで自分を成長させ続けること", score:5}]}

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let categoryScores = [0, 0, 0, 0, 0];
        let categoryCounts = [0, 0, 0, 0, 0];
        let mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };

        // --- データ復元とURL解析 ---
        function parseUrl() {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            if (d) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(d.split('&')[0]))));
                    // 新旧データ形式の互換性確保
                    totalScore = data.s !== undefined ? data.s : (data.tot || 0);
                    categoryScores = data.cs || data.catScores || [0,0,0,0,0];
                    categoryCounts = data.cc || data.catCounts || [1,1,1,1,1];
                    mbtiCounts = data.m || data.mbti || { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };
                    
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    // 確実にDOMが構築されてから描画
                    setTimeout(processResultDisplay, 300);
                } catch(e) { console.error("URL解析エラー:", e); }
            }
        }

        // --- クッキー ユーティリティ ---
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- 診断ロジック ---
        function startDiagnosis(isReset = false) {
            if (isReset) eraseCookie('ma_final_data');
            selectedQuestions = [...questionsPool]; 
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];
            mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const dotContainer = document.getElementById('progress-dots');
            dotContainer.innerHTML = '';
            for(let i=0; i<20; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotContainer.appendChild(dot);
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 20`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentQuestionIndex));

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            [...q.options].sort(() => Math.random() - 0.5).forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn fade-in';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            const m = q.mbti;
            if(m) {
                if(opt.score >= 8) mbtiCounts[m] += 2;
                else if(opt.score >= 5) mbtiCounts[m] += 1;
            }
            history.push({ score: opt.score, cat: q.cat, mbti: m, val: opt.score >= 8 ? 2 : 1 });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;
            currentQuestionIndex++;

            if (currentQuestionIndex < selectedQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            if(last.mbti) mbtiCounts[last.mbti] -= last.val;
            renderQuestion();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const data = { s: totalScore, cs: categoryScores, cc: categoryCounts, m: mbtiCounts };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const newUrl = window.location.pathname + '?d=' + encoded;
            window.history.pushState({path: newUrl}, '', newUrl);

            setTimeout(processResultDisplay, 200);
        }

        function processResultDisplay() {
            const finalScore = Math.min(100, Math.round((totalScore / 200) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;
            document.getElementById('sns-score').innerText = `${finalScore}%`;

            if (finalScore >= 95) document.getElementById('cert-badge').classList.remove('hidden');

            const mbti = (finalScore >= 98) ? "ISFP-A" : "ISFP-A (予想)";
            document.getElementById('result-mbti').innerText = mbti;
            document.getElementById('sns-mbti').innerText = mbti;

            document.getElementById('result-desc').innerText = finalScore >= 95 ? 
                "あなたは、飾らない自然体の振る舞いと、揺るぎない内なる感覚を完全な形で共存させています。物事の成果や記録への意欲を持ちながらも、今この瞬間の「純粋な手触り」を誰よりも信じて生きるその在り方は、真の『マ』の完成形と言えます。" : 
                "あなたは周囲の状況と自らの内面の調和を重んじる、非常に優れた感性を持っています。適度な柔軟性を持って日常を彩るタイプです。";

            const tips = [
                "その「頑固さ」は、自分という宇宙を守るための尊い境界線です。",
                "言葉にできない「しっくり感」こそが、あなたを導く唯一の真実です。",
                "「成果」と「直感」の美しい共鳴を、これからも楽しみ続けてください。",
                "誰にも見られていない時の「なんとなく」が、マの最も深い源泉です。"
            ];
            document.getElementById('result-advice').innerText = tips[finalScore % tips.length];

            renderCharts();
        }

        function renderCharts() {
            const avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            const chartConfig = {
                type: 'radar',
                data: {
                    labels: ['内面', '現実', '共感', '柔軟', '安定'],
                    datasets: [{
                        data: avgScores,
                        backgroundColor: 'rgba(58, 90, 64, 0.2)',
                        borderColor: '#3a5a40',
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0, max: 10, ticks: { display: false },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { color: '#3a5a40', font: { size: 12, weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            };

            if (radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart'), chartConfig);

            if (snsChart) snsChart.destroy();
            snsChart = new Chart(document.getElementById('snsChart'), {
                ...chartConfig,
                options: {
                    ...chartConfig.options,
                    scales: {
                        r: { ...chartConfig.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40' } }
                    }
                }
            });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            showToast("画像を生成しています...");
            
            const area = document.getElementById(targetId);
            if(type === 'sns') area.style.left = '0';

            // 画像保存時にのみ適用するCSS（ぼかしを解除し、配置を固定）
            html2canvas(area, { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true,
                onclone: (clonedDoc) => {
                    const clonedArea = clonedDoc.getElementById(targetId);
                    clonedArea.style.backdropFilter = "none";
                    clonedArea.style.background = "#ffffff";
                }
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') area.style.left = '-9999px';
                showToast("保存完了しました");
            });
        }

        function shareLink() {
            navigator.clipboard.writeText(window.location.href);
            showToast("リンクをコピーしました");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_final_data');
            if (saved) {
                const d = JSON.parse(saved);
                currentQuestionIndex = d.idx; totalScore = d.tot;
                categoryScores = d.cs; categoryCounts = d.cc;
                history = d.hist; mbtiCounts = d.mbti; 
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                renderQuestion();
            }
        }

        function resetAndRestart() { eraseCookie('ma_final_data'); location.href = window.location.pathname; }

        window.onload = () => {
            if (window.location.search.includes('d=')) parseUrl();
            else if (getCookie('ma_final_data')) document.getElementById('resume-container').classList.remove('hidden');
        };
    </script>
</body>
</html>
