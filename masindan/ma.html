<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マ診断 - 存在の深層分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-base: #f9fbf9;
            --accent-green: #2d4a36;
            --soft-green: #8ca38a;
            --mint-green: #d8e2dc;
            --glass-white: rgba(255, 255, 255, 0.45);
            --text-main: #1b261e;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(140, 163, 138, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(45, 74, 54, 0.1) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #e9edc9 100%);
            margin: 0;
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1.5rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            box-shadow: 0 40px 100px -20px rgba(45, 74, 54, 0.08);
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.25rem 1.75rem;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid #ffffff;
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 1rem;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--soft-green);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 30px rgba(45, 74, 54, 0.1);
            color: var(--accent-green);
        }

        .score-number {
            font-weight: 700;
            color: var(--accent-green);
            text-shadow: 0 4px 15px rgba(45, 74, 54, 0.1);
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .btn-green:hover { filter: brightness(1.1); transform: translateY(-1px); }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f4f1 0%, transparent 50%), linear-gradient(135deg, #ffffff 0%, #f9fbf9 100%);
        }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(45, 74, 54, 0.1);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.5);
        }

        .log-area {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #ffffff;
            border-radius: 1.5rem;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.75rem;
            padding: 1.5rem;
            text-align: left;
            font-family: monospace;
            color: #666;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--soft-green); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- スタート画面 -->
        <div id="start-screen" class="glass-panel p-10 md:p-14 text-center fade-in">
            <p class="text-[var(--soft-green)] font-serif-en tracking-[0.5em] text-[11px] mb-4 uppercase font-bold italic">Identity Spectrum</p>
            <h1 class="text-5xl md:text-6xl font-bold mb-10 tracking-tight text-gray-800">マ診断</h1>
            
            <div class="space-y-6 text-left mb-12">
                <p class="text-gray-600 text-sm leading-relaxed">
                    本診断は、これまでのデータに基づき、あなた専用に再構築された<strong class="text-[var(--accent-green)]">究極の10問</strong>で構成されています。
                </p>
                <p class="text-gray-500 text-[11px] leading-relaxed border-l-2 border-[var(--accent-green)] pl-4">
                    独自のアルゴリズムがあなたの「マ」を100%の精度で測定。MBTI予想と共に、解答の全ての軌跡を最後に記録します。
                </p>
            </div>

            <div id="resume-container" class="hidden mb-10 p-6 bg-white/50 border border-white rounded-3xl">
                <p class="text-xs text-gray-400 mb-4 font-bold tracking-widest uppercase">セッションを再開</p>
                <button onclick="resumeDiagnosis()" class="w-full py-4 btn-green text-sm mb-3 shadow-lg">続きから再開</button>
            </div>

            <button id="start-btn" onclick="startDiagnosis()" class="w-full py-5 btn-green text-sm uppercase tracking-[0.25em] shadow-xl">
                深層分析を開始
            </button>
        </div>

        <!-- 質問画面 -->
        <div id="quiz-screen" class="hidden glass-panel p-8 md:p-12 fade-in">
            <div class="flex justify-between items-center mb-10">
                <button onclick="goBack()" id="back-btn" class="text-[10px] tracking-widest font-bold text-gray-400 hover:text-[var(--accent-green)] transition-all flex items-center gap-1 invisible">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> 戻る
                </button>
                <div class="flex gap-2.5" id="progress-dots"></div>
                <span id="q-counter" class="text-xs font-serif-en italic text-gray-400">01 / 10</span>
            </div>

            <div class="min-h-[10rem] mb-12 flex flex-col items-center text-center justify-center">
                <span id="q-cat" class="text-[9px] uppercase tracking-[0.4em] text-[var(--soft-green)] mb-4 font-bold">New Realm Analysis</span>
                <h2 id="q-text" class="text-xl md:text-2xl font-bold text-[var(--text-main)] leading-relaxed px-2"></h2>
            </div>

            <div id="options-container" class="space-y-4"></div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden fade-in">
            <div id="capture-area" class="glass-panel text-center mb-8">
                <div class="font-serif-en text-[var(--soft-green)] tracking-[0.5em] text-[10px] mb-8 uppercase pt-6">The Final Essence</div>
                
                <div class="mb-10">
                    <div class="text-[11px] text-gray-400 tracking-[0.3em] uppercase mb-4 font-bold">あなたのマ確定濃度</div>
                    <div class="text-8xl font-serif-en score-number" id="result-score">0%</div>
                </div>

                <div id="cert-badge" class="hidden mb-12">
                    <div class="py-2.5 px-10 bg-white/90 border border-[var(--mint-green)] text-[var(--accent-green)] rounded-full inline-flex items-center gap-2 text-xs font-bold tracking-[0.3em]">
                        🌟 絶対的マ 認定
                    </div>
                </div>

                <div class="mb-12">
                    <div class="inline-block bg-[var(--accent-green)] text-white px-8 py-2.5 rounded-full text-xs font-bold tracking-[0.15em] shadow-md" id="result-mbti">分析中</div>
                </div>

                <div class="mb-12 flex justify-center bg-white/30 rounded-[2.5rem] p-8 border border-white mx-4 shadow-inner">
                    <div style="width: 100%; height: 320px;"><canvas id="radarChart"></canvas></div>
                </div>

                <div class="text-left px-8 space-y-12 pb-12">
                    <div>
                        <h4 class="text-[10px] text-[var(--soft-green)] font-bold mb-4 uppercase tracking-[0.3em]">マの深層プロファイル</h4>
                        <p id="result-desc" class="text-sm text-gray-600 leading-loose"></p>
                    </div>
                    
                    <div class="bg-white/70 p-8 rounded-[2.5rem] border border-white shadow-sm">
                        <h4 class="text-[10px] text-[var(--accent-green)] font-bold mb-4 uppercase tracking-[0.2em] flex items-center gap-2">
                            🍃 マになるためのワンポイント
                        </h4>
                        <p id="result-advice" class="text-[14px] text-gray-600 leading-relaxed font-medium italic"></p>
                    </div>

                    <div>
                        <h4 class="text-[10px] text-gray-300 font-bold mb-4 uppercase tracking-[0.2em] border-b border-gray-100 pb-2">精度調整用：解答ログ</h4>
                        <div id="adjustment-log" class="log-area"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="downloadImage('sns')" class="w-full py-5 btn-green text-sm uppercase shadow-xl">
                    SNS投稿用(正方形)保存
                </button>
                <button onclick="downloadImage('full')" class="w-full py-4 text-[var(--accent-green)] font-bold text-xs tracking-widest uppercase border border-[var(--accent-green)] rounded-2xl hover:bg-white transition-all">
                    詳細レポートを保存
                </button>
                <button onclick="shareLink()" class="w-full py-3 text-[10px] text-gray-400 tracking-widest uppercase border-b border-gray-200 hover:text-[var(--accent-green)] transition-all mt-4">
                    結果リンクをコピー
                </button>
            </div>
            
            <button onclick="resetAndRestart()" class="w-full mt-12 mb-10 text-[10px] text-gray-400 tracking-[0.4em] uppercase hover:text-gray-600 transition-all">最初からやり直す</button>
        </div>
    </div>

    <!-- SNS保存用ダミー -->
    <div id="sns-export-area">
        <div style="font-family: 'Cormorant Garamond', serif; font-size: 38px; color: #2d4a36; letter-spacing: 0.6em; margin-bottom: 60px; font-weight: bold;">MA ANALYSIS</div>
        <div style="font-family: 'Cormorant Garamond', serif; font-size: 240px; font-weight: 700; color: #2d4a36; margin-bottom: 30px; line-height: 1;" id="sns-score">0%</div>
        <div style="background: #d8e2dc; padding: 20px 60px; border-radius: 60px; font-size: 48px; color: #2d4a36; margin-bottom: 100px; font-family: 'Noto Sans JP'; font-weight: bold;" id="sns-mbti">ISFP-A</div>
        <div style="background: rgba(255,255,255,0.9); padding: 70px; border-radius: 90px; border: 1px solid rgba(0,0,0,0.03); width: 900px; display: flex; justify-content: center; box-shadow: 0 40px 80px rgba(0,0,0,0.05);">
            <div style="width: 750px; height: 650px;"><canvas id="snsChart"></canvas></div>
        </div>
        <div style="margin-top: 100px; color: #8ca38a; font-size: 26px; letter-spacing: 0.5em; font-family: 'Cormorant Garamond';">PRECISION PROFILE</div>
    </div>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-[var(--accent-green)] text-white px-10 py-3.5 rounded-full text-xs font-bold tracking-widest shadow-2xl opacity-0 transition-opacity duration-500 pointer-events-none z-50"></div>

    <script>
        // --- 10問の完全新規質問リスト ---
        // ユーザー「マ」の傾向に基づいた最高精度設定
        const questionsPool = [
            { q: "風の強い日、窓を少しだけ開けていたいと思う？", cat: 1, mbti: 'S', options: [{text:"風の音や、空気の乱れを肌で感じていたい", score:10}, {text:"埃が入るのが気になるので、しっかり閉める", score:4}, {text:"換気のために短時間だけ開ける", score:7}, {text:"特に何も考えず、その時の気分で決める", score:8}]},
            { q: "古い本の、独特の紙の匂いを嗅いだとき", cat: 1, mbti: 'S', options: [{text:"時間の堆積を、嗅覚を通してダイレクトに味わう", score:10}, {text:"「古いな」という客観的な事実だけを確認する", score:4}, {text:"誰かが読んでいた気配を感じて、少し想像を巡らす", score:8}, {text:"電子書籍の方が便利だなと頭をよぎる", score:5}]},
            { q: "歩いているとき、自分の足音のリズムに意識が向くことは？", cat: 1, mbti: 'Se', options: [{text:"無意識のリズムが心地よく、そのまま歩調に身を任せる", score:10}, {text:"目的地までの残り時間を計算し、速度を調節する", score:4}, {text:"周りの人の歩くペースに合わせてしまう", score:7}, {text:"靴の汚れや磨耗具合が気になってしまう", score:6}]},
            { q: "夕暮れの影が長く伸びていくのを見たとき", cat: 2, mbti: 'Fi', options: [{text:"世界の輪郭が溶けていくような感覚を、ただ見守る", score:10}, {text:"暗くなる前に家路を急ごうと、行動を加速させる", score:5}, {text:"影の形から、何か象徴的なイメージを連想する", score:7}, {text:"一日の成果を振り返り、明日の準備を思い描く", score:4}]},
            { q: "他人の前で、言葉を噛むなどの小さなミスをしたとき", cat: 4, mbti: 'A', options: [{text:"「それも自分だ」と、特に飾らずに笑って流せる", score:10}, {text:"恥ずかしさを感じて、しばらく脳内で反省する", score:5}, {text:"次は失敗しないように、より完璧に振る舞おうとする", score:4}, {text:"ミスを帳消しにするような、別の良いアウトプットをする", score:7}]},
            { q: "電車で隣が空いているとき、あえて一駅分だけ立っていようと思う？", cat: 0, mbti: 'P', options: [{text:"自分の重心や、窓の外の景色との距離感を味わいたいから立つ", score:10}, {text:"疲れを溜めないように、すぐに座って休む", score:5}, {text:"周りの状況を見て、他の人に席を譲りやすい位置にいる", score:7}, {text:"座ると眠ってしまいそうなので、あえて立つ", score:6}]},
            { q: "見たことのない不思議な形の植物を見つけたとき", cat: 2, mbti: 'Se', options: [{text:"名前を知る前に、その異質な形そのものを目に焼き付ける", score:10}, {text:"スマホで検索して、すぐに種類や特徴を調べたい", score:4}, {text:"写真を撮って、誰かにシェアして驚かせたい", score:8}, {text:"毒がないか、触っても安全かを論理的に判断する", score:5}]},
            { q: "広い空間（ホールやトンネル）で声が響くとき", cat: 1, mbti: 'S', options: [{text:"声が空気に溶けていく残響を、じっと聞き届ける", score:10}, {text:"自分の声がどう聞こえているか、客観的に分析する", score:5}, {text:"大きな声を出して、響きの限界を試したくなる", score:7}, {text:"響きすぎて落ち着かないので、早く抜け出したい", score:4}]},
            { q: "自分に宛てた手紙（下書き）が未送信のまま残っているとき", cat: 0, mbti: 'Fi', options: [{text:"その時の自分の純粋な欠片として、消さずに置いておく", score:10}, {text:"整理されていない状態が気持ち悪いので、削除する", score:4}, {text:"今の自分ならどう書くか、修正を加えて送信しようとする", score:7}, {text:"いつか何かの成果（記録）になるかもしれないと、保存する", score:8}]},
            { q: "満天の星空の下に一人でいるとき、あなたの存在は？", cat: 0, mbti: 'Fi', options: [{text:"宇宙の広さに呑み込まれ、ただの一点として透明になる", score:10}, {text:"自分の存在の小ささを嘆き、何かを残さなければと焦る", score:4}, {text:"星の名前や星座を特定し、知識を照らし合わせる", score:5}, {text:"この美しさを永遠に記録する方法を考え始める", score:7}]}
        ];

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let categoryScores = [0, 0, 0, 0, 0];
        let categoryCounts = [0, 0, 0, 0, 0];
        let mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };
        let history = []; 
        let radarChart = null;

        // --- クッキー機能 ---
        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- ロジック ---
        function startDiagnosis(isReset = false) {
            if (isReset) eraseCookie('ma_final_data');
            selectedQuestions = [...questionsPool];
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];
            mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const dotContainer = document.getElementById('progress-dots');
            dotContainer.innerHTML = '';
            for(let i=0; i<10; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dotContainer.appendChild(dot);
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentQuestionIndex));

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            [...q.options].sort(() => Math.random() - 0.5).forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn fade-in';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            const m = q.mbti;
            if(m) {
                if(opt.score >= 8) mbtiCounts[m] += 2;
                else if(opt.score >= 5) mbtiCounts[m] += 1;
            }

            history.push({ q: q.q, a: opt.text, score: opt.score, cat: q.cat, m: m });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;
            
            currentQuestionIndex++;
            saveToCookie();

            if (currentQuestionIndex < selectedQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            if(last.m) mbtiCounts[last.m] -= (last.score >= 8 ? 2 : (last.score >= 5 ? 1 : 0));
            saveToCookie();
            renderQuestion();
        }

        function saveToCookie() {
            const data = {
                idx: currentQuestionIndex, tot: totalScore, cs: categoryScores, cc: categoryCounts,
                hist: history, mbti: mbtiCounts, qids: selectedQuestions.map(q => questionsPool.indexOf(q))
            };
            setCookie('ma_final_data', JSON.stringify(data), 7);
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_final_data');
            if (saved) {
                const d = JSON.parse(saved);
                currentQuestionIndex = d.idx; totalScore = d.tot;
                categoryScores = d.cs; categoryCounts = d.cc;
                history = d.hist; mbtiCounts = d.mbti; 
                startDiagnosis();
                currentQuestionIndex = d.idx;
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            eraseCookie('ma_final_data');
            
            const data = { s: totalScore, cs: categoryScores, cc: categoryCounts, m: mbtiCounts };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const newUrl = window.location.pathname + '?d=' + encoded;
            window.history.pushState({path: newUrl}, '', newUrl);

            setTimeout(processResultDisplay, 100);
        }

        function processResultDisplay() {
            const finalScore = Math.min(100, Math.round((totalScore / 100) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;
            document.getElementById('sns-score').innerText = `${finalScore}%`;

            if (finalScore >= 95) document.getElementById('cert-badge').classList.remove('hidden');

            let avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            
            let mbti = "ISFP-A (冒険家)";
            if (finalScore < 98) {
                const i_e = mbtiCounts.I >= 1 ? "I" : "E";
                const s_n = mbtiCounts.S >= 1 ? "S" : "N";
                const f_t = mbtiCounts.F >= 1 ? "F" : "T";
                const p_j = mbtiCounts.P >= 1 ? "P" : "J";
                const a_t = finalScore >= 80 ? "-A" : "-T";
                const map = {"ISFP":"冒険家","ISFJ":"擁護者","ISTP":"巨匠","ISTJ":"管理者","INFP":"仲介者","INFJ":"提唱者","INTP":"論理学者","INTJ":"建築家","ESFP":"エンターテイナー","ESFJ":"領事","ESTP":"起業家","ESTJ":"幹部","ENFP":"広報運動家","ENFJ":"主人公","ENTP":"討論者","ENTJ":"指揮官"};
                const key = i_e+s_n+f_t+p_j;
                mbti = `${key} (${map[key] || '分析中'}) ${a_t}`;
            }
            document.getElementById('result-mbti').innerText = mbti;
            document.getElementById('sns-mbti').innerText = mbti.split(' ')[0];

            document.getElementById('result-type').innerText = finalScore >= 95 ? "【 完璧なる絶対のマ・アイデンティティ 】" : "【 極めて高いマ適合者 】";
            document.getElementById('result-desc').innerText = finalScore >= 95 ? 
                "あなたは、飾らない自然体の振る舞いと、何ものにも代えがたい内なる感覚を完全に一致させています。物事の成果や記録への意欲を持ちながらも、今この瞬間の「純粋な手触り」を誰よりも信じて生きるその在り方は、真の『マ』の完成形と言えます。" : 
                "あなたは周囲の状況と自らの内面の調和を重んじる、非常に優れた感性を持っています。適度な柔軟性を持って日常を彩るタイプです。";

            const tips = [
                "その「頑固さ」は、自分という宇宙を守るための尊い境界線です。",
                "言葉にできない「しっくり感」こそが、あなたを導く唯一の真実です。",
                "「成果」と「直感」の美しい共鳴を、これからも楽しみ続けてください。",
                "失敗は単なる色の欠片。それらを繋ぎ合わせて、あなただけの景色を。",
                "誰にも見られていない時の「なんとなく」が、マの最も深い源泉です。",
                "計画のない朝の光の中に、あなたの本当の力が眠っています。",
                "周囲の喧騒に呑まれそうな時は、足裏の感覚だけを信じて歩いて。",
                "飾らないあなたでいるとき、マの美しさは絶対的なものになります。"
            ];
            const seed = (finalScore + Math.floor(Math.random()*10)) % tips.length;
            document.getElementById('result-advice').innerText = tips[seed];

            // ログの書き出し
            let logText = "";
            history.forEach((h, i) => { logText += `Q${String(i+1).padStart(2,'0')}\n${h.q}\n=> ${h.a} (Score: ${h.score})\n\n`; });
            document.getElementById('adjustment-log').innerText = logText;

            renderChart(avgScores);
        }

        function renderChart(data) {
            const config = {
                type: 'radar',
                data: {
                    labels: ['内面性', '感覚', '調和度', '柔軟性', '自己安定'],
                    datasets: [{
                        data: data,
                        backgroundColor: 'rgba(58, 90, 64, 0.15)',
                        borderColor: '#3a5a40',
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0, max: 10, ticks: { display: false, stepSize: 2 },
                            grid: { color: 'rgba(58, 90, 64, 0.08)' },
                            angleLines: { color: 'rgba(58, 90, 64, 0.08)' },
                            pointLabels: { color: '#588157', font: { size: 12, family: 'Noto Sans JP', weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } },
                    animation: { duration: 1500 }
                }
            };
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart'), config);
            const snsCtx = document.getElementById('snsChart').getContext('2d');
            new Chart(snsCtx, { ...config, options: { ...config.options, scales: { r: { ...config.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40' } } } } });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            showToast("画像を生成しています...");
            if(type === 'sns') document.getElementById('sns-export-area').style.left = '0';
            html2canvas(document.getElementById(targetId), { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') document.getElementById('sns-export-area').style.left = '-9999px';
                showToast("保存完了");
            });
        }

        function shareLink() {
            navigator.clipboard.writeText(window.location.href);
            showToast("URLをコピーしました");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resetAndRestart() { eraseCookie('ma_final_data'); location.href = window.location.pathname; }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('d')) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(params.get('d')))));
                    totalScore = data.s; categoryScores = data.cs; categoryCounts = data.cc; mbtiCounts = data.m;
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    setTimeout(processResultDisplay, 200);
                } catch(e) {}
            } else if (getCookie('ma_final_data')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
