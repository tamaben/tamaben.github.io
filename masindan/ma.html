<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-base: #f7f9f7;
            --accent-green: #3a5a40;
            --soft-green: #a3b18a;
            --mint-green: #dad7cd;
            --glass-white: rgba(255, 255, 255, 0.5);
            --text-main: #344e41;
            --text-sub: #588157;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(163, 177, 138, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(58, 90, 64, 0.1) 0%, transparent 45%),
                linear-gradient(135deg, #ffffff 0%, #e9edc9 100%);
            margin: 0;
        }

        .font-serif-en { font-family: 'Cormorant Garamond', serif; }

        .app-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 1.5rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -12px rgba(58, 90, 64, 0.1);
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.25rem 1.75rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #ffffff;
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-size: 0.95rem;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .option-btn:hover {
            background: #ffffff;
            border-color: var(--accent-green);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(58, 90, 64, 0.1);
            color: var(--accent-green);
        }

        .score-number {
            font-weight: 700;
            color: var(--accent-green);
            text-shadow: 0 4px 15px rgba(58, 90, 64, 0.15);
        }

        .btn-green {
            background: var(--accent-green);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }

        .btn-green:hover { opacity: 0.95; transform: translateY(-1px); }

        .progress-dot-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(58, 90, 64, 0.1);
            transition: all 0.3s ease;
        }
        .progress-dot.active { background: var(--accent-green); transform: scale(1.4); }

        .log-area {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid #ffffff;
            border-radius: 1.5rem;
            max-height: 350px;
            overflow-y: auto;
            font-size: 0.75rem;
            padding: 1.5rem;
            text-align: left;
            scrollbar-width: thin;
        }

        #sns-export-area {
            position: fixed;
            left: -9999px;
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            background-image: radial-gradient(circle at 10% 10%, #f0f4f1 0%, transparent 50%), linear-gradient(135deg, #ffffff 0%, #f9fbf9 100%);

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar-thumb { background: var(--soft-green); border-radius: 10px; }
    </style>
</head>

        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function eraseCookie(name) { document.cookie = name +'=; Max-Age=-99999999; path=/'; }

        // --- 診断ロジック ---
        function startDiagnosis(isReset = false) {
            if (isReset) eraseCookie('ma_final_data');
            currentQuestionIndex = 0; totalScore = 0; history = [];
            categoryScores = [0, 0, 0, 0, 0]; categoryCounts = [0, 0, 0, 0, 0];
            mbtiCounts = { I:0, E:0, S:0, N:0, F:0, T:0, P:0, J:0, A:0, T_:0 };

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<20; i++) {
                const d = document.createElement('div');
                d.className = 'progress-dot';
                dots.appendChild(d);
            }
            renderQuestion();
        }

        function renderQuestion() {
            const q = questionsPool[currentQuestionIndex];
            document.getElementById('q-counter').innerText = `${String(currentQuestionIndex + 1).padStart(2, '0')} / 20`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('back-btn').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';

            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentQuestionIndex));

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const shuffled = [...q.options].sort(() => Math.random() - 0.5);
            shuffled.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn fade-in';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(q, opt);
                container.appendChild(btn);
            });
        }

        function handleAnswer(q, opt) {
            const m = q.mbti;
            if(m) {
                if(opt.score >= 8) mbtiCounts[m] += 2;
                else if(opt.score >= 5) mbtiCounts[m] += 1;
            }

            history.push({ q: q.q, a: opt.text, score: opt.score, cat: q.cat, m: m });
            totalScore += opt.score;
            categoryScores[q.cat] += opt.score;
            categoryCounts[q.cat]++;

            currentQuestionIndex++;
            saveToCookie();

            if (currentQuestionIndex < questionsPool.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex <= 0) return;
            currentQuestionIndex--;
            const last = history.pop();
            totalScore -= last.score;
            categoryScores[last.cat] -= last.score;
            categoryCounts[last.cat]--;
            if(last.m) mbtiCounts[last.m] -= (last.score >= 8 ? 2 : (last.score >= 5 ? 1 : 0));
            saveToCookie();
            renderQuestion();
        }

        function saveToCookie() {
            const data = {
                idx: currentQuestionIndex, tot: totalScore, cs: categoryScores, cc: categoryCounts,
                hist: history, mbti: mbtiCounts
            };
            setCookie('ma_final_data', JSON.stringify(data), 7);
        }

        function resumeDiagnosis() {
            const saved = getCookie('ma_final_data');
            if (saved) {
                const d = JSON.parse(saved);
                currentQuestionIndex = d.idx; totalScore = d.tot;
                categoryScores = d.cs; categoryCounts = d.cc;
                history = d.hist; mbtiCounts = d.mbti; 
                startDiagnosis();
                currentQuestionIndex = d.idx;
                renderQuestion();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            eraseCookie('ma_final_data');

            // URLパラメータ更新
            const data = { s: totalScore, cs: categoryScores, cc: categoryCounts, m: mbtiCounts };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const newUrl = window.location.pathname + '?d=' + encoded;
            window.history.pushState({path: newUrl}, '', newUrl);

            setTimeout(processResult, 100);
        }

        function processResult() {
            const finalScore = Math.min(100, Math.round((totalScore / 200) * 100));
            document.getElementById('result-score').innerText = `${finalScore}%`;
            document.getElementById('sns-score').innerText = `${finalScore}%`;

            if (finalScore >= 95) document.getElementById('cert-badge').classList.remove('hidden');

            const i_e = mbtiCounts.I >= 5 ? "I" : "E";
            const s_n = mbtiCounts.S >= 5 ? "S" : "N";
            const f_t = mbtiCounts.F >= 5 ? "F" : "T";
            const p_j = mbtiCounts.P >= 5 ? "P" : "J";
            const a_t = finalScore >= 80 ? "-A" : "-T";
            
            const mbtiMap = {"ISFP":"冒険家","ISFJ":"擁護者","ISTP":"巨匠","ISTJ":"管理者","INFP":"仲介者","INFJ":"提唱者","INTP":"論理学者","INTJ":"建築家","ESFP":"エンターテイナー","ESFJ":"領事","ESTP":"起業家","ESTJ":"幹部","ENFP":"広報運動家","ENFJ":"主人公","ENTP":"討論者","ENTJ":"指揮官"};
            const core = i_e+s_n+f_t+p_j;
            const mbtiName = finalScore >= 98 ? "ISFP-A (冒険家)" : `${core} (${mbtiMap[core] || '分析中'}) ${a_t}`;
            document.getElementById('result-mbti').innerText = mbtiName;
            document.getElementById('sns-mbti').innerText = mbtiName.split(' ')[0];

            document.getElementById('result-desc').innerText = finalScore >= 95 ? 
                "あなたは、飾らない自然体の振る舞いと、揺るぎない内なる感覚を完全な形で共存させています。物事の良し悪しを性急に判断せず、今この瞬間の「手触り」を信じて生きるその在り方こそが、真の『マ』の正体です。ISFP-Aとしての柔軟で強靭な精神性が理想的な調和を見せています。" : 
                "あなたは周囲の状況と自分の内面のバランスを大切にする、非常に安定した感性を持っています。適度な柔軟性を持ち、日常に自分なりの色彩を添えられるタイプです。";

            const tips = [
                "「頑固さ」は、あなただけの聖域を守るための誇りです。",
                "言葉にできない「しっくり感」を、人生の唯一の指針にしてください。",
                "誰にも見られていない時の「なんとなく」が、マの源泉です。",
                "失敗を単なる色の欠片として捉える。そのしなやかさを大切に。",
                "自分の「心地よさ」を優先することは、世界への最大の貢献です。",
                "計画を立てない勇気が、あなたの人生に美しい偶然を運びます。",
                "周囲の音に溶け込むような、透明な時間を一日一度は持って。",
                "飾らないあなたでいるとき、マの美しさは最大化されます。"
            ];
            const seed = (finalScore + Math.floor(Math.random()*10)) % tips.length;
            document.getElementById('result-advice').innerText = tips[seed];

            // ログ書き出し
            let logText = "";
            history.forEach((h, i) => { logText += `Q${String(i+1).padStart(2,'0')}\n${h.q}\n=> ${h.a} (Score: ${h.score})\n\n`; });
            document.getElementById('adjustment-log').innerText = logText;

            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const avgScores = categoryScores.map((s, i) => categoryCounts[i] > 0 ? s / categoryCounts[i] : 5);
            const config = {
                type: 'radar',
                data: {
                    labels: ['内面性', '現実感', '調和度', '柔軟性', '自己安定'],
                    datasets: [{
                        data: avgScores,
                        backgroundColor: 'rgba(58, 90, 64, 0.12)',
                        borderColor: '#3a5a40',
                        borderWidth: 2.5,
                        pointRadius: 0
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0, max: 10, ticks: { display: false },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { color: '#588157', font: { size: 10, weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } },
                    animation: { duration: 1800 }
                }
            };
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, config);

            // SNS用
            const snsCtx = document.getElementById('snsChart').getContext('2d');
            new Chart(snsCtx, {
                ...config,
                options: {
                    ...config.options,
                    scales: {
                        r: { ...config.options.scales.r, pointLabels: { font: { size: 28 }, color: '#3a5a40' } }
                    }
                }
            });
        }

        function downloadImage(type) {
            const targetId = (type === 'sns') ? 'sns-export-area' : 'capture-area';
            const fileName = (type === 'sns') ? 'マ診断_SNS.png' : 'マ診断_レポート.png';
            showToast("画像を生成しています...");
            if(type === 'sns') document.getElementById('sns-export-area').style.left = '0';
            html2canvas(document.getElementById(targetId), { 
                backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = fileName; link.href = canvas.toDataURL('image/png'); link.click();
                if(type === 'sns') document.getElementById('sns-export-area').style.left = '-9999px';
                showToast("保存完了しました");
            });
        }

        function shareLink() {
            navigator.clipboard.writeText(window.location.href);
            showToast("リンクをコピーしました");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function resetAndRestart() { eraseCookie('ma_final_data'); location.href = window.location.pathname; }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('d')) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(params.get('d')))));
                    totalScore = data.s; categoryScores = data.cs; categoryCounts = data.cc; mbtiCounts = data.m;
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    setTimeout(processResult, 200);
                } catch(e) {}
            } else if (getCookie('ma_final_data')) {
                document.getElementById('resume-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
